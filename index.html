{n:'08',tc:'g',tag:'Phase 6 — Disqualification',t:"Reconnaître le prospect qui n'est pas prêt",i:"Un non bien géré vaut mieux qu'un oui forcé. Mais avant le non, il y a une phase encore plus importante : savoir reconnaître le prospect qui ne devrait pas aller plus loin — et avoir le courage de le lui dire avec bienveillance.\n\nPrésenter ton programme à quelqu'un qui n'est pas prêt, c'est lui faire perdre son temps et gaspiller ton énergie. Le vrai service, dans ce cas, c'est la disqualification.",pts:[{c:'g',b:'Les signaux de disqualification — posture de touriste',t:" : Why pas assez profond — il n'a pas réussi à articuler une vraie raison émotionnelle. Pas de responsabilisation — il parle de ses problèmes comme si c'était la faute des circonstances ou des autres. Réponses de surface — il répond vite, sans chercher, sans émotion. Absence de momentum — quand tu demandes 'pourquoi maintenant ?', il n'a pas de réponse convaincante. Ces signaux ne sont pas des jugements — ce sont des données."},{c:'g',b:'Le test de la douleur',t:" : si après avoir appliqué les 5 pourquoi + mirroring sur 15-20 minutes tu n'as toujours pas accédé à une vraie douleur émotionnelle — c'est un signal. La question directe : 'Je vais être honnête avec toi — j'ai du mal à comprendre ce qui te motive profondément à changer. Est-ce que toi-même tu le sais ?'"},{c:'g',b:'La disqualification bienveillante — le script',t:" : 'Je vais être direct avec toi parce que je pense que c'est ce dont tu as besoin. D'après notre échange, je ne pense pas que ce soit le bon moment pour toi — pas parce que tu n'en es pas capable, mais parce que je ne sens pas encore la conviction que quelque chose doit changer maintenant. Et sans ça, même le meilleur programme ne fonctionnera pas.'"},{c:'g',b:'Le nurturing — le travail à faire avant de revenir',t:" : donne des exercices concrets avant la prochaine conversation. 1. Écrire noir sur blanc : qu'est-ce que tu perds chaque mois à rester là où tu es — en argent, en temps, en énergie ? 2. Définir ton objectif dans 12 mois en une phrase concrète et mesurable. 3. Identifier les 3 choses qui dépendaient de toi et que tu n'as pas faites. Ces exercices préparent une vraie décision — pas une décision émotionnelle de l'instant."},{c:'g',b:'Le follow-up structuré',t:" : 'Je te propose qu'on reprenne dans [X semaines] après que tu auras fait ce travail. Si à ce moment-là tu as la clarté que tu n'as pas aujourd'hui, on pourra avancer ensemble.' → Un prospect qui revient après avoir fait ce travail est infiniment plus engagé qu'un prospect closé dans la précipitation."}],ex:{l:'Script de disqualification',t:"'Je vais être honnête avec toi. J'aurais pu te présenter le programme aujourd'hui — mais je ne le ferai pas. Pas parce que tu n'es pas capable. Parce que je pense que tu n'as pas encore la clarté nécessaire pour prendre une décision qui tient dans le temps. Et je préfère te dire ça maintenant plutôt que de t'embarquer dans quelque chose dont tu ne tireras pas le maximum.'"},gold:{l:'La règle',t:"Un prospect disqualifié avec bienveillance te respectera plus qu'un prospect closé sous pression. Et dans 80% des cas, il reviendra — parce que tu es la seule personne qui lui a dit la vérité."}},
{n:'09',tc:'g',tag:'Phase 7 — Paiement',t:"Gestion du paiement — acompte et engagement émotionnel",i:"La phase paiement n'est pas une phase logistique. C'est une phase d'engagement émotionnel.\n\nQuand un prospect dit 'je suis partant mais je ne peux pas payer maintenant', ton rôle est de trouver la façon de l'engager immédiatement — pas de le laisser repartir dans la nature. Un prospect qui repart sans avoir posé un premier acte d'engagement retourne dans sa zone de confort. Et la zone de confort, même inconfortable, est rassurante pour son cerveau.",pts:[{c:'g',b:'Pourquoi l\'acompte est un outil neurologique — pas logistique',t:" : Cialdini l'a documenté dans Influence : une fois qu'on a pris un premier engagement, le cerveau cherche à être cohérent avec lui. L'acompte n'est pas juste de l'argent — c'est un ancrage. Le prospect qui pose un acompte a dit oui à lui-même. Il a pris une position. Son cerveau va maintenant travailler pour justifier et honorer cette position."},{c:'g',b:'La formulation de l\'acompte — ne pas en faire un frein',t:" : 'Pour réserver ta place dès aujourd'hui et bloquer le démarrage, on peut commencer avec un acompte de [X]. Le solde arrive à [date/étape]. Ça te convient ?' → Simple. Factuel. Pas de justification excessive. L'acompte est présenté comme une facilité, pas comme une condition."},{c:'g',b:'Ce que l\'acompte débloque',t:" : accès à un premier contenu ou à une première session. Confirmation de la place. Contact direct pour commencer à construire la relation. Ce premier contenu n'est pas anecdotique — il crée une première victoire qui renforce l'engagement et réduit le risque de rétractation."},{c:'g',b:'La gestion du paiement en plusieurs fois',t:" : si le prospect ne peut pas payer en one shot : 'On peut découper ça en [X] fois. La première échéance c'est [Y] maintenant, les suivantes à [rythme]. Ça te permet de démarrer immédiatement.' → L'échelonnement réduit la barrière cognitive à l'entrée. Mais attention : ne pas proposer d'échelonnement avant d'avoir compris pourquoi le one shot est impossible — parfois c'est une objection camouflée."},{c:'g',b:'Pourquoi ne pas laisser filer — la neuroscience du retour dans la zone de confort',t:" : le cerveau humain a un biais de statu quo puissant. Même une situation douloureuse est rassurante parce qu'elle est connue. Un prospect qui repart sans engagement retourne dans cet environnement connu — et le oui émotionnel de l'appel se dissout en 24 à 48 heures. Le temps est l'ennemi de la décision. Un engagement immédiat — même partiel — contrecarre ce biais."}],ex:{l:'Script d\'acompte',t:"'Écoute, je comprends que le paiement complet aujourd'hui c'est compliqué. Voilà ce qu'on peut faire : tu poses [X] maintenant pour bloquer ta place et on démarre dès cette semaine. Le reste arrive à [date]. Ça te permet d'avancer sans attendre. Qu'est-ce qui t'en empêche ?' → Miroir sur la réponse."},gold:{l:'La règle absolue',t:"Ne jamais laisser un prospect engagé repartir sans un premier acte concret. L'engagement partiel vaut mieux que la promesse totale. Une promesse sans acte, c'est du vent — pour lui et pour toi."}}
]},
6:{cat:'Avance',title:"Fausses croyances & <span class='ag'>Objections</span>",desc:"Les objections ne sont pas des ennemies. Elles sont des signaux. La méthode : Accueillir -> Creuser -> Recadrer. Dans cet ordre, toujours.",
chs:[
{n:'01',tc:'g',tag:'Fondations',t:"Ce qu'est vraiment une objection",i:"La majorite des closers débutants traitent les objections comme des obstacles a surmonter. Les closers qui performent les traitent comme des donnees a comprendre.\n\nUne objection n'est presque jamais ce qu'elle dit être. 'C'est trop cher' ne veut pas dire que le prospect n'a pas d'argent — ça veut dire qu'il ne voit pas encore la valeur. 'J'ai besoin d'y réfléchir' ne veut pas dire qu'il a besoin de temps — ça veut dire qu'il lui manque quelque chose pour décider.\n\nLa seule vraie objection, c'est l'argent — quand le prospect n'a genuinement pas les moyens. Toutes les autres sont des symptomes d'une découverte incomplete. Si tu as bien creuse, si tu as vraiment compris la douleur et fait verbaliser le cout de l'inaction — les objections n'arrivent presque plus.",pts:[{c:'g',b:'Ecran de fumee vs objection reelle',t:" : une objection de surface cache presque toujours quelque chose d'autre. Avant de répondre, creuse : 'Quand tu dis [objection], tu veux dire quoi exactement pour toi ?' La vraie objection emerge toujours au 2e ou 3e niveau."},{c:'g',b:'Signal d interet',t:" : un prospect qui objecte est encore dans la conversation. Il cherche une raison de dire oui. Ton job : l'aider a trouver cette raison. Un prospect qui n'est pas interesse raccroche — il n'objecte pas."},{c:'g',b:'La pause avant de répondre',t:" : répondre immédiatement a une objection, c'est le pattern du closer sous pression. Ca dit : 'J'avais prevu ta question et j'ai une réponse prete.' 2 à 3 secondes de silence d'abord. Ca dit : 'J'entends ce que tu dis, je prends ça au serieux.'"}],ex:{l:'Diagnostic avant de traiter',t:"Avant de répondre a n'importe quelle objection, pose toujours cette question : 'En dehors de ça, est-ce qu'il y a autre chose qui te ferait hesiter ?' Tu traités toutes les objections en une fois — pas une par une."},gold:null},
{n:'02',tc:'g',tag:'Croyance 1',t:"\"C'est une arnaque\" — l'armure contre la deception",i:"Cette objection est l'une des plus delicates — parce qu'elle n'est presque jamais rationnelle. Elle vient d'une blessure émotionnelle, souvent pas la sienne. Cette personne a vu quelqu'un se faire avoir, ou elle a construit une identité autour de 'moi je me fais pas manipuler'.\n\nLa regle absolue : ne jamais defendre. Des que tu te defendes, tu confirmes qu'il y a quelque chose a defendre. Le prospect lit ça immédiatement et se ferme davantage.\n\nA la place, entres dans son cadre. Valide sa méfiance. Puis deplaces-le.",pts:[{c:'g',b:'Etape 1 — Valider la méfiance',t:" : 'Tu as raison d'être prudent. La majorite des formations en ligne sont du vent. C'est une bonne posture.' Ca desarme. Il ne s'attendait pas a ça."},{c:'g',b:'Etape 2 — Entrer dans sa définition',t:" : 'Quand tu dis arnaque, c'est quoi pour toi concrètement ? Qu'est-ce qui ferait qu'une formation est legitime a tes yeux ?' Il te donne ses criteres. Tu peux maintenant y répondre avec ses propres mots."},{c:'g',b:'Etape 3 — Creuser la liberté',t:" : 'Tu m'as parle de liberté financiere tout a l'heure. C'est quoi exactement ta définition de ça ?' Cette question le ramene a ce qu'il veut vraiment — et crée une tension entre sa méfiance et son désir."}],ex:{l:'Analogie de l enfant et du velo',t:"'Un enfant qui a vu son ami tomber du velo peut refuser d'apprendre a faire du velo pendant des annees. Ce n'est pas sa chute qu'il porte — c'est la mémoire d'une chute. Est-ce que c'est possible que tu portes la méfiance de quelqu'un d'autre ?'"},gold:{l:'Script de traitement complet',t:"'Qu'est-ce qui aujourd'hui, concrètement, pourrait t'aider a voir que ce qu'on fait n'est pas du reve qu'on vend ? Je te pose la question sincèrement.' Puis silence. Il va te donner exactement ce dont il a besoin pour se convaincre."}},
{n:'03',tc:'g',tag:'Croyances 2&3',t:"\"C'est risque\" & \"J'ai pas eu les opportunités\"",i:"Ces deux objections ont un point commun : elles semblent rationnelles, mais elles sont emotionnelles.\n\n'C'est risque' peut être deux choses complètement differentes. Soit un risque financier reel — et dans ce cas tu le respectes et tu ne forces pas. Soit une peur émotionnelle deguisee en calcul — la peur de s'engager, la peur de l'echec, la peur de se faire juger. Avant de répondre, tu dois savoir lequel des deux tu as en face de toi.\n\n'J'ai pas eu les opportunités' est une façon de proteger son ego. Si c'est la faute des circonstances, je reste intact. Cette croyance empeche toute responsabilisation — et donc toute progression.",pts:[{c:'g',b:'Qualifier le risque d abord',t:" : 'Quand tu parles de risque — c'est financier ou c'est plus la peur de t'engager et de ne pas voir les résultats ?' Cette question seule change toute la suite de la conversation."},{c:'g',b:'L analogie avion',t:" : 'Quelqu'un peut refuser de prendre l'avion a cause du risque — mais conduire sur l'autoroute chaque matin sans y penser. Statistiquement, l'autoroute est bien plus dangereuse. Le risque n'est pas calcule — il est ressenti. Est-ce que c'est possible que ça soit pareil ici ?'"},{c:'g',b:'Miroir sur les opportunités',t:" : 'Si demain matin quelqu'un te deposait l'opportunité parfaite — financee, sans risque, garantie — qu'est-ce qui se passerait en toi ?' S'il trouve encore une raison de ne pas y aller, l'objection n'est pas les opportunités."}],ex:null,gold:{l:'Recadrage sur le vrai risque',t:"'Le vrai risque, des fois, c'est pas d'investir. C'est de rester exactement la ou tu es dans 12 mois et de se demander pourquoi on n'a rien change. Quel est le cout de ne rien faire ?'"}},
{n:'04',tc:'g',tag:'Croyance 4',t:"\"Tu me garantis que je vais réussir ?\"",i:"Cette question est un transfert de responsabilite. C'est humain — completemet humain. Cette personne veut que quelqu'un d'autre porte le risque de son choix. Elle a peur que si ça ne marche pas, ce soit sa faute. Alors elle cherche quelqu'un a qui remettre cette responsabilite.\n\nTon job n'est pas de lui donner cette garantie — parce que tu ne peux pas l'honorer honnement. Et si tu la donnes, tu créés une dynamique toxique des le depart : elle va tout attendre de toi et ne rien faire elle-même.\n\nTon job est de nommer ce transfert avec bienveillance — et de le renvoyer vers elle.",pts:[{c:'g',b:'Reponse honnete et directe',t:" : 'Non. Et je vais être transparent : personne ne peut te garantir ça. Moi-même je ne peux pas me garantir que je serai la demain matin. Si quelqu'un te dit qu'il peut te garantir le succès — fuis.'"},{c:'g',b:'Ce que tu garantis',t:" : 'Ce que je peux te garantir, c'est ma présence, ma méthode, mon engagement total a cote de toi. Je serai la à chaque étape. Mais le résultat — il depend de toi autant que de moi. C'est un partenariat, pas une delegation.'"},{c:'g',b:'L analogie du professeur de natation',t:" : 'Le meilleur professeur de natation peut t'apprendre tous les mouvements, corriger chaque geste, être present à chaque session. Mais la piscine ne nage pas a ta place.'"}],ex:null,gold:{l:'Question de responsabilisation',t:"'La vraie question, c'est pas est-ce que je te garantis. C'est : est-ce que toi, tu t'engages vraiment ? Parce que si l'engagement est total de ton cote, les chances de reussite sont incomparablement plus elevees.' Silence. Il doit répondre."}},
{n:'05',tc:'g',tag:'Methode universelle',t:"Le cadre des 3 temps — applicable a toutes les objections",i:"Peu importe l'objection, le cadre est toujours le même. Toujours dans cet ordre. Ne jamais sauter une étape.\n\n1. ACCUEILLIR — 2. CREUSER — 3. RECADRER\n\nL'erreur la plus commune : sauter directement au recadrage. Ca ne fonctionne pas parce que le prospect n'a pas ete entendu. Et quelqu'un qui ne se sent pas entendu ne peut pas entendre.",pts:[{c:'g',b:'1. Accueillir — valider l émotion',t:" : jamais 'je comprends' seul — ça sonne automatique. Plutot : 'C'est une question que je trouve vraiment legitime.' / 'Je suis content que tu souleves ça, parce que c'est important.' Jamais valider la croyance — valider l'émotion."},{c:'g',b:'2. Creuser — remonter a la source',t:" : une seule question, ouverte, qui va plus loin. 'Quand tu dis [objection] — qu'est-ce qui te fait penser ça concrètement ?' / 'C'est quoi derriere ça ?' / 'Ca vient d'ou cette impression ?' La vraie objection est toujours en dessous."},{c:'g',b:'3. Recadrer — élargir la perspective',t:" : jamais 'tu as tort'. Toujours 'et si on regardait ça sous un angle different ?' Le recadrage ne contredit pas — il propose une autre façon de voir. Le prospect doit avoir l'impression que la nouvelle perspective lui appartient."}],ex:null,gold:{l:'L intention derriere la méthode',t:"Si tu travailles avec une vraie intention de servir, le challenge devient un cadeau — pas une pression. Le prospect le ressent. Et c'est cette intention qui fait toute la difference entre un closer qui ferme et un closer qui aide."}}
]},
7:{cat:'Performance',title:"Ferocite & <span class='ag'>Flow</span>",desc:"L'excellence a toujours un cout. Ce module construit l'état de performance optimal comme une habitude. Sources : Le Flow (module 4) + La Tenacite + La Passion + La Journee Feroce + L'Habitude de Ferocite.",
chs:[
{n:'01',tc:'g',tag:'Neurosciences',t:"Le Flow — Etat de performance optimal",i:"McKinsey : 5x plus productif dans le Flow. Definition technique : un état de conscience optimal dans lequel tu te sens au mieux de ta forme et performes au mieux de tes capacites. Ces moments d'attention totalement soutenue et d'absorption complete. L'action et la conscience commencent a fusionner. Le sens de soi-même s'evanouit. Le temps se dilate ou s'accelere. Hypofrontalite transitoire : dans le Flow, tu utilises MOINS de cerveau. 5 neurochimiques liberes simultanement : noradrenaline, dopamine, serotonine, anandamide, endorphines.",pts:[{c:'g',b:'Ondes cerebrales',t:" : Beta (état normal) -> Alpha -> frontiere Alpha-Theta -> Gamma (moment aha). Dans le Flow, tu es en permanence au bord du maximum de créativité."},{c:'g',b:'Declencheur universel',t:" : le Flow suit la concentration. Il ne peut se produire que lorsque toute ton attention est ici et maintenant — pas sur la commission."},{c:'g',b:'Le Flow n est pas force',t:" : c'est un état que l'on invite, en creant les bonnes conditions. Tout ce qu'on developpe dans ce programme augmente mecaniquement la quantite de Flow dans ta vie."}],ex:{l:'Lien direct avec le closing',t:"Quand tu es vraiment present face a quelqu'un — quand tu l'ecoutes sans préparer ta réponse — cette qualité de présence se ressent et crée une qualité de connexion que la technique seule ne peut pas produire. La science du Flow remonte aux annees 1870. McKinsey : dans le Flow, la productivite augmente de 500%."},gold:null},
{n:'02',tc:'g',tag:'Motivation',t:"La passion — Commencer par la curiosite",i:"La passion ne commence pas avec la certitude — elle commence avec la curiosite. Curiosite et peur utilisent la même molecule (noradrenaline) dans des directions opposees.",pts:[{c:'g',b:'Grit (Duckworth)',t:" : grit = passion x persévérance. La passion se regenere quand la volonte s'epuise."},{c:'g',b:'La liste des 25',t:" : 25 choses qui te rendent profondement curieux. Sois spécifique."}],ex:null,gold:null},
{n:'03',tc:'g',tag:'Tenacite',t:"La volonte & la persévérance",i:"La volonte est une ressource limitée. Tu te reveilles avec ta reserve maximale et elle s'erode. Mange le crapaud en premier.",pts:[{c:'g',b:'Mange le crapaud',t:" : ta tache la plus difficile avec ton énergie maximale."},{c:'g',b:'Resets partiels',t:" : sieste (max 40 min), exercice, meditation."},{c:'g',b:'Les 4%',t:" : pousser legerement au-dela de sa zone de confort."}],ex:{l:'William James',t:"\"L'être humain vit habituellement bien en dessous de ses limites. C'est une habitude d'inferiorite par rapport a son moi complet.\""},gold:null},
{n:'04',tc:'g',tag:'Mindset',t:"Controle des pensees",i:"L'amygdale est biaisee vers le négatif : 6 a 9 informations négatives pour chaque positive. Mais ça se recalibre.",pts:[{c:'g',b:'Gratitude',t:" : 3 choses le soir. Developpe l'une. Effets après 2-3 semaines."},{c:'g',b:'Meditation',t:" : 4 jours pour les premiers benefices. 2 semaines pour élargir le gap pensee-émotion."},{c:'g',b:'Tenir parole a soi-même',t:" : la parole donnee a soi-même a le même poids que la parole donnee a quelqu'un d'autre."}],ex:null,gold:null},
{n:'05',tc:'g',tag:'Operationnel',t:"La journee feroce",i:"Ce que tu fais toujours vs ce que tu ne fais jamais. Ta vie est définie autant par tes non que par tes oui.",pts:[{c:'g',b:'Toujours',t:" : routines precises alignees avec ton purpose, sans exception."},{c:'g',b:'Jamais',t:" : frontieres claires qui protegent ton énergie."},{c:'g',b:'La regle absolue',t:" : tu n'ecris dans ta liste que ce que tu vas vraiment faire."}],ex:null,gold:null}
]},
8:{cat:'Croissance',title:"Performer & <span class='ag'>Grandir</span>",desc:"Concret et operationnel. Passer de la pratique a la professionnalisation.",
chs:[
{n:'01',tc:'g',tag:'Operationnel',t:"Trouver tes premiers clients",i:"La regle des 100 appels : tes 100 premiers, tu les rates. C'est normal, prevu, nécessaire.",pts:[{c:'g',b:'Canaux',t:" : LinkedIn, groupes d'infopreneurs, bouche a oreille."},{c:'g',b:'Message',t:" : \"Je suis closer spécialisé en [niche]. Vous cherchez quelqu'un ?\""},{c:'g',b:'Positionner ton profil',t:" : le marche doit te trouver, pas l'inverse."}],ex:{l:'Premier pas',t:"Contacte 5 infopreneurs aujourd'hui. Pas demain."},gold:null},
{n:'02',tc:'g',tag:'Operationnel',t:"Construire ton CRM",i:"Un closer sans CRM, c'est un chef sans recette.",pts:[{c:'g',b:'Colonnes',t:" : Nom / Source / Statut / Date / Profil DISC / Commission."},{c:'g',b:'Scoring psycho',t:" : note chaque prospect sur son profil DISC, ses objections, son urgence."},{c:'g',b:'Debrief',t:" : 10 minutes après chaque call."}],ex:null,gold:null},
{n:'03',tc:'g',tag:'Performance',t:"Analyser tes appels",i:"Les meilleurs closers reecoulent leurs appels. Pas pour se juger — pour se calibrer. Ratio : 30% toi / 70% prospect.",pts:[{c:'g',b:'Les 6 questions',t:" : état interne ? schéma détecte ? quand ai-je contredit ? quelle anomalie ? variable faible ? petite flamme ?"},{c:'g',b:'Outils',t:" : Fathom, Fireflies.ai ou Otter.ai pour analyser le ratio."}],ex:null,gold:null},
{n:'04',tc:'g',tag:'Leadership',t:"Passer au niveau superieur",i:"Le meilleur closing ne se sent pas. Le prospect a l'impression d'avoir décidé tout seul.",pts:[{c:'g',b:'Specialisation',t:" : le marche doit te trouver."},{c:'g',b:'Personal branding',t:" : LinkedIn, contenu, preuves sociales."},{c:'g',b:'Le mentoring',t:" : enseigner force a maitriser."}],ex:{l:'Question finale',t:"\"Dans 12 mois, tu veux voir que tu as vraiment commence — ou que tu t'es encore prepare ?\""},gold:null}
]}
};
var ANC=[
{n:'00',tc:'p',tag:'Fondations',t:"Comprendre l'ancrage",i:"L'ancrage crée une tension entre ce que le prospect a dit être et ce qu'il est tente de faire. C'est lui qui resout cette tension — en ta faveur.",pts:[{c:'p',b:'Engagement (Cialdini)',t:" : une fois qu'une personne se definit à voix haute, le cerveau protege cette image."},{c:'p',b:'Dissociation sociale',t:" : le cerveau definit 'qui je suis' autant par opposition que par similitude."},{c:'p',b:'Synchronie neuronale',t:" : quand tu exposes ta vulnérabilité, la méfiance baisse."}],ex:{l:'Règle absolue',t:"Un ancrage mal incarne fait l'effet inverse. Il doit sonner naturel — jamais calcule."},gold:{l:'Important',t:"Un ancrage ne se cite jamais explicitement en closing. Il se reactive implicitement : 'Est-ce que la, c'est aligne pour toi ?'"},scripts:null},
{n:'01',tc:'p',tag:'Format 1 - Connexion',t:"Ancre directe — le signal identitaire",i:"Tu poses une question qui force le prospect a se définir lui-même. Peu importe la réponse — tu gagnes soit une ancre reutilisable, soit une information diagnostique precieuse.",pts:[{c:'p',b:'Timing optimal',t:" : connexion ou début de diagnostic."},{c:'p',b:'Profil adapte',t:" : fonctionne bien avec les profils D et I."},{c:'p',b:'Lien découverte',t:" : la réponse oriente immédiatement la suite."}],ex:null,gold:null,scripts:'s1'},
{n:'02',tc:'t',tag:'Format 2 - Diagnostic',t:"Ancre par contraste — la dissociation sociale",i:"Tu decris un groupe négatif sans parler de lui. Il se dissocie activement. Si ensuite il hesite, c'est lui qui doit gérer l'incoherence.",pts:[{c:'p',b:'Timing optimal',t:" : fin de diagnostic ou transition vers la présentation."},{c:'p',b:'Mecanisme',t:" : le prospect ne peut plus objecter de la même façon."},{c:'p',b:'Variante découverte',t:" : 'La plupart des gens dans cette situation ont essaye 2-3 choses seuls... 6 mois plus tard au même endroit. T'as l'impression d'être dans ce pattern ?'"}],ex:null,gold:null,scripts:'s2'},
{n:'03',tc:'r',tag:'Format 3 - Transition',t:"Auto-admission — désarmer l'amygdale",i:"Tu exposes ta vulnérabilité passee en premier. Ca desarme la resistance. Condition : doit être vrai.",pts:[{c:'p',b:'Timing optimal',t:" : transition avant le pitch. Jamais en milieu de diagnostic."},{c:'p',b:'Profil adapte',t:" : particulierement efficace avec les profils Mefiants et Stables."},{c:'p',b:'Condition',t:" : doit être vrai. Une auto-admission fabriquee se détecte immédiatement."}],ex:null,gold:null,scripts:'s3'},
{n:'04',tc:'p',tag:'Boite a outils',t:"Scripts complets — les 3 formats",i:"Le bon format, au bon moment, avec le bon profil. Les 3 formats se combinent dans un même appel.",pts:[{c:'p',b:'Combinaison optimale',t:" : Phase 1 -> Ancre directe. Fin diagnostic -> Ancre contraste. Avant pitch -> Auto-admission."}],ex:{l:'Sequence complete',t:"Phase 1 -> signal identitaire. Phase 3-4 -> dissociation + tension. Avant pitch -> espace de vérité. Closing -> 'Est-ce que la, c'est aligne pour toi ?'"},gold:{l:'A ne jamais faire',t:"2 ancrages consecutifs. Auto-admission fabriquee. Citer explicitement l'ancre en closing."},scripts:null}
];
var SCRIPTS={
s1:[
{cl:'s1',lb:"Script — Passage a l'action",tx:"XY, je vais te poser une question directe — t'as toujours ete quelqu'un qui passe a l'action quand tu vois quelque chose d'aligne, ou t'as besoin d'avoir tous les éléments avant de te décider ?",no:"Si 'passe a l'action' -> Ancre posée. En closing : 'Est-ce que la, c'est aligne pour toi ?'. Si 'j'ai besoin d'éléments' -> Profil Analyseur ou Stable identifié."},
{cl:'s1',lb:"Script — Decision seul ou en groupe",tx:"Quand tu investis sur toi-même — c'est quelque chose que tu décides seul ou t'as besoin de valider avec quelqu'un d'autre ?",no:"Si 'seul' -> Ancre contre 'j'en parle a ma femme' plus tard. Si 'je validé' -> Profil Empathique PCM identifié."},
{cl:'s1',lb:"Script — L'ouverture relationnelle",tx:"T'es toujours aussi ouvert comme ça avec les gens que tu rencontres, ou c'est quelque chose que t'as appris a développer ?",no:"Il confirme l'ouverture et s'y engage."}
],
s2:[
{cl:'s2',lb:"Script — Le pattern d'analyse infinie",tx:"Tu sais ce que j'observé avec la majorite des gens dans cet espace — ils attendent toujours d'être prets a 100% avant d'agir. Et ils restent bloques dans une analyse infinie. Parce qu'on le sait tous les deux, le bon moment parfait... il n'existe pas. Ceux qui avancent, c'est pas parce qu'ils avaient toutes les réponses — c'est parce qu'ils ont décidé que l'inconfort d'avancer était plus acceptable que l'inconfort de rester.",no:"Silence. -> 'C'est quelque chose que tu reconnais ?'"},
{cl:'s2',lb:"Script — Le pattern seul sans méthode",tx:"La plupart des gens que je vois dans cette situation ont déjà essaye 2-3 choses seuls. Et 6 mois plus tard, ils sont exactement au même endroit. T'as l'impression d'être dans ce pattern ?",no:"Si oui -> il verbalise son propre blocage. Si non -> il te donne exactement ce qui le differencie."}
],
s3:[
{cl:'s3',lb:"Script — La posture et la technique",tx:"Je vais être transparent avec toi — moi aussi au début je pensais que ce business c'était juste une question de trouver le bon produit, les bons chiffres. Et finalement j'ai compris que c'était 80% de posture et 20% de technique. J'aurais economise enormement de temps si quelqu'un me l'avait dit des le depart.",no:"Immediatement après : 'C'est un peu la ou t'en es toi aussi ?' Sa garde critique baisse."},
{cl:'s3',lb:"Script — Anticiper objections arnaque & risque",tx:"Je vais te dire quelque chose — quand j'ai commence a regarder des accompagnements comme ça, ma premiere reaction c'était de me dire 'c'est peut-être une arnaque'. Et la question que je me posais c'était : est-ce que la douleur de rester la ou j'etais était plus grande que la peur d'investir ? Et a un moment, ça a bascule.",no:"Ce script anticipe les croyances 1 et 3 avant qu'elles soient exprimees."}
]
};
var ANAL=[
{cat:"Croyance — Risque",catcl:'r',t:"L'autoroute et l'avion",scene:"Quelqu'un refuse de prendre l'avion 'a cause du risque'. Mais il conduit sur l'autoroute chaque matin sans y penser. Le risque n'est pas calcule — il est ressenti.",link:"Ce que ça dit : le prospect n'analyse pas vraiment le risque. Son amygdale ne fait pas de statistiques.",profils:["Tous profils","Efficace sur Analytique"],quand:"Quand le prospect dit 'c'est risque' sans quantifier.",comment:"Lance-la avec curiosite. 'Est-ce que c'est objectif ou c'est plus une sensation ?' Lance l'image, puis laisse le silence travailler."},
{cat:"Croyance — Garantie",catcl:'t',t:"Le professeur de natation",scene:"Un professeur de natation peut t'apprendre les mouvements, corriger ta technique. Mais la piscine ne nage pas a ta place.",link:"Ce que ça dit : le prospect veut externaliser le résultat. L'analogie rend visible cette dynamique sans l'accuser.",profils:["Tous profils","Puissant sur Empathique et Stable"],quand:"Quand le prospect demande 'est-ce que tu me garantis que je vais réussir ?'",comment:"'Moi-même je ne peux pas me garantir que je serai la demain matin.' Puis : 'La vraie question c'est est-ce que toi tu t'engages vraiment ?'"},
{cat:"Croyance — Arnaque",catcl:'r',t:"L'enfant et le velo",scene:"Un enfant qui a vu son ami tomber du velo peut refuser d'apprendre pendant des annees. Ce n'est pas sa chute — c'est la mémoire d'une chute.",link:"Ce que ça dit : la méfiance du prospect n'est souvent pas la sienne. Ce n'est pas de la méfiance envers toi — c'est une armure.",profils:["Mefiant chronique","Tous profils avec blessure passee"],quand:"Quand le prospect utilisé le mot 'arnaque'.",comment:"Plante l'image et tu te tais. C'est le prospect qui fait le lien."},
{cat:"Decouverte — Vraie douleur",catcl:'t',t:"Le médecin et la douleur projetee",scene:"Un patient dit qu'il a mal a l'epaule. Le bon médecin ne traite pas l'epaule tout de suite. Traiter le symptome sans trouver la cause, c'est rater le diagnostic.",link:"Ce que ça dit : la premiere douleur exprimee n'est presque jamais la vraie. 'Je veux gagner plus d'argent' cache 'je veux que ma famille me respecte'.",profils:["Tous profils","Analogie d'enseignement"],quand:"En formation, pour expliquer pourquoi il faut creuser.",comment:"Si ton élève comprend ça vraiment — pas intellectuellement, mais dans ses tripes — tout le reste devient logique."},
{cat:"Inaction — Hesitation",catcl:'p',t:"Le plongeoir",scene:"Quelqu'un est au bord d'un plongeoir depuis 10 minutes. Il sait nager. Ce dont il a besoin, ce n'est pas d'une information supplementaire — c'est d'un signal interne qui dit 'c'est OK de sauter'.",link:"Ce que ça dit : quand le prospect dit 'j'ai besoin d'y réfléchir', c'est presque jamais un manque d'information. C'est un manque de permission interne.",profils:["Stable / Empathique","Fuyant"],quand:"Quand le prospect dit 'j'ai besoin d'y réfléchir' pour la 2e ou 3e fois.",comment:"'J'ai l'impression que la décision elle est la — c'est juste l'autorisation qui manque.'"},
{cat:"Mindset — Detachement",catcl:'p',t:"La mouche et l'abeille",scene:"La mouche cherche la pourriture même dans un jardin fleuri. L'abeille trouve le nectar même dans un desert. Meme environnement — deux résultats radicalement differents.",link:"Ce que ça dit : ton focus avant l'appel décide lequel tu seras. Commission -> mouche. Transformation du prospect -> abeille.",profils:["Usage interne","Pour tes élèves en coaching"],quand:"En formation, pour expliquer le rituel pre-appel.",comment:"'Aujourd'hui, t'es la mouche ou l'abeille ?' Ca suffit."},

{cat:"Momentum — Curiosite vs Engagement",catcl:'t',t:"Le spectateur et le joueur",scene:"Un spectateur regarde un match depuis les tribunes. Il connait les regles, voit les erreurs, sait ce qu'il faudrait faire. Un joueur est sur le terrain. Ce n'est pas la connaissance qui les separe — c'est la décision d'entrer dans le jeu.",link:"Ce que ça dit : beaucoup de gens veulent lancer un business en ligne. Ils regardent, s'informent. Mais il y a un fosse entre la curiosite et l'engagement. Ce fosse a un nom : la décision.",profils:["Tous profils","Puissant en fin de découverte"],quand:"Quand le prospect est interesse mais pas encore décidé. Quand il dit 'ça m'attire mais j'hesite'.",comment:"'Est-ce que tu es la en spectateur — ou tu es pret a entrer sur le terrain ?' Simple, direct, sans pression. Silence après."},

    chs: [
      {n:'01',tc:'g',tag:'Protocole',t:"La préparation neurologique",i:"La plupart des closers arrivent sur un appel sans preparation. Les closers qui performent ont compris que l\'appel se gagne avant de commencer — pas en connaissant mieux l\'offre, mais en etant dans le bon état neurologique quand tu decroches.",pts:[{c:'g',b:"Pourquoi la préparation change tout",t:"Ton prospect évalue ton état dans les premières secondes — inconsciemment. Si ton cortisol est élevé, ta voix le trahit. La préparation crée les conditions pour arriver en puissance calme — pas en mode besoin."}],ex:{l:"Principe fondateur",t:"Ce n\'est pas ce que tu dis qui fait la différence. C\'est l\'état dans lequel tu es quand tu le dis."},gold:null,scripts:null},
      {n:'02',tc:'g',tag:"Cohérence Cardiaque",t:"Le protocole 365",i:"La cohérence cardiaque est la technique de régulation du système nerveux la mieux documentée pour la performance sous pression. Source : Rollin McCraty, HeartMath Institute — Heart Rate Variability (Global Advances in Health and Medicine, 2015). Source complementaire : David Servan-Schreiber, Guerir (Laffont, 2003).",pts:[{c:'g',b:"Le protocole exact — Methode 365",t:"3 fois par jour · 6 respirations par minute · 5 minutes. Avant un appel : 2 à 5 minutes suffisent. Inspiration par le nez : 5 secondes. Expiration par la bouche : 5 secondes. Dos droit, pieds à plat."},{c:'g',b:"Ce que ca produit physiologiquement",t:"Activation du nerf vague — baisse immédiate du cortisol. Augmentation de la variabilité de la fréquence cardiaque (VFC). Synchronisation coeur-cerveau — le cortex préfrontal reprend le contrôle sur l\'amygdale. Libération d\'ocytocine — connexion interpersonnelle renforcée. Augmentation de la DHEA — état d\'alerte calme."},{c:'g',b:"Lien direct avec tes appels",t:"2 minutes de coherence cardiaque avant l\'appel changent les 12 variables neurologiques que ton prospect capte — avant que tu n\'aies dit un mot."}],ex:{l:"Application immédiate",t:"Rappel 5 min avant. Ferme les yeux. 5s inspiration · 5s expiration. 6 cycles minimum. Définis ton intention : je viens diagnostiquer, pas vendre. Decroche."},gold:{l:"Source principale",t:"McCraty R., Shaffer F. (2015). Heart Rate Variability: New Perspectives on Physiological Mechanisms. Global Advances in Health and Medicine, 4(1), 46-61. heartmath.org"},scripts:null},
      {n:'03',tc:'g',tag:"Confirmation",t:"Le message dans la première minute",i:"Donnee comportementale documentée : contacter un prospect dans la première minute suivant sa réservation augmente le taux de show-up significativement. Source : etude MIT et InsideSales.com — James Oldroyd, The Short Life of Online Sales Leads (Harvard Business Review, 2007). Les équipes qui contactent dans la première minute ont 7x plus de chances de qualifier le lead.",pts:[{c:'g',b:"Pourquoi ça fonctionne neurologiquement",t:"Le prospect vient de reserver — sa dopamine est haute, son engagement est maximal. Un message dans la minute renforce l\'engagement avant que le doute s\'installe. Plus le temps passe, plus le cerveau rationalise le désengagement."},{c:'g',b:"Le message de confirmation — modèle",t:"Salut Prenom, je viens de voir ta reservation pour jour a heure. Je suis la, on va bien travailler. Si quelque chose change de ton côté, dis-le moi directement. A tout a l\'heure. Court, direct, aucune fioriture."},{c:'g',b:"Séquence 60 minutes avant",t:"J-60 min : lis la fiche prospect, identifie son profil DISC. J-10 min : cohérence cardiaque, 6 cycles. J-2 min : définis ton intention. Pas \'je veux closer\' — mais \'je viens comprendre ou il en est et lui montrer le chemin le plus court\'."}],ex:{l:"Règle absolue",t:"Ne jamais arriver sur un appel sans avoir recontacté le prospect dans les 24h précédentes. Chaque message dans le bon timing est un investissement direct dans le show-up."},gold:{l:"Reference",t:"Oldroyd J. (2007). The Short Life of Online Sales Leads. Harvard Business Review, 85(8)."},scripts:null}

function buildExercise(mi){
var exs={};
exs[1]={t:"Exercice — Mindset & Identite",s:"Le mindset ne se lit pas. Il se pratique. Ces exercices sont a faire avant tes appels, pas après.",steps:[{t:"Le journal de débrief post-appel",d:"Apres chaque appel, prends 10 minutes. Reponds par écrit a ces 3 questions : Quel était mon état interne avant de décrocher ? A quel moment ai-je senti une pression sur le résultat ? Qu'est-ce que j'aurais fait differemment si j'etais en puissance calme ? Fais ça sur 10 appels consecutifs. Tu vas voir des patterns emerger."},{t:"L'exercice du détachement avant l'appel",d:"Avant ton prochain appel, ecris sur un papier : 'Je suis indifferent au résultat de cet appel. Mon seul objectif est de comprendre cette personne.' Pose le papier. Lis-le à voix haute. Puis decroche. Observe comment ça change ta façon d'écouter et de répondre."},{t:"Le rituel pre-appel 14 jours de suite",d:"Pendant 14 jours, applique le protocole complet avant chaque appel sans exception : coherence cardiaque 3 min + intention à voix haute + lecture du profil. Note après chaque appel si tu as ressenti une difference. La constance sur 14 jours crée un ancrage neurologique reel."}],checks:["J'ai fait le journal de débrief sur 5 appels consecutifs","J'ai identifié mes 2 principaux declencheurs de mode besoin","J'ai applique le rituel pre-appel 14 jours de suite","J'ai enregistré un appel et évalue mon ratio de parole (cible : 30/70)","J'ai identifié un moment ou j'ai tue un silence — et ce que j'aurais pu faire","J'ai demande un retour a mon mentor sur mon état interne sur un appel"],rp:{sc:"Scenario : ton mentor joue un prospect qui te pose des questions difficiles sur le prix et les garanties des les 2 premieres minutes — avant que tu aies eu le temps de faire de la découverte. Ton objectif : maintenir ta posture, ne pas ceder a la pression, reorienter vers la découverte sans brusquer.",cr:["As-tu maintenu un rythme calme et une voix posée ?","As-tu resiste a la tentation de pitcher trop tot ?","Comment as-tu gere la question sur le prix avant d'avoir fait la découverte ?","As-tu tenu les silences sans les combler ?","Ton état interne était-il visible dans tà voix ?"]}};
exs[2]={t:"Exercice — Neurosciences appliquees",s:"La theorie ne sert a rien si elle ne change pas ce que tu fais sur l'appel. Ces exercices ancrent les concepts dans la pratique.",steps:[{t:"Cartographier le cadre cognitif d'un prospect reel",d:"Sur ton prochain appel, applique les 3 questions de diagnostic dans l'ordre exact : 1. Qu'est-ce que tu as déjà essaye ? 2. Qu'est-ce qui a bloque ? 3. Comment tu saurais qu'une décision est la bonne pour toi ? Note les réponses mot pour mot. Apres l'appel, identifié la croyance centrale derriere chaque réponse."},{t:"L'exercice de l'aversion a la perte",d:"Sur 3 appels, note le moment exact ou tu utilises une formulation orientée gain vs une formulation orientée perte. Compare les reactions du prospect dans les deux cas. La difference de reaction te montrera concrètement pourquoi 'qu'est-ce que ça te coute de rester la' fonctionne mieux que 'imagine ce que tu peux gagner'."},{t:"Ecouter les variables non-verbales sur un enregistrement",d:"Enregistre un de tes appels. Reecoute-le en te concentrant uniquement sur les variables non-verbales : ton rythme, tes silences, ton intonation en fin de phrase. Pas sur le contenu — sur la forme. Demande a ton mentor d'écouter 5 minutes et de te donner un retour sur ta posture vocale uniquement."}],checks:["J'ai applique les 3 questions de diagnostic dans l'ordre sur 3 appels","J'ai identifié la croyance centrale derriere au moins une objection","J'ai compare formulation gain vs formulation perte sur 2 appels","J'ai écoute un enregistrement en mode variables non-verbales uniquement","J'ai recu un retour de mon mentor sur ma posture vocale","J'ai identifié le schéma cognitif dominant d'un prospect en moins de 5 minutes"],rp:{sc:"Scenario : ton mentor joue un prospect qui arrive avec un cadre cognitif négatif très marque ('j'ai déjà essaye ce genre de chose et ça n'a jamais marche'). Ton objectif : cartographier son cadre, introduire une anomalie, et proposer un nouveau schéma — sans jamais contredire frontalement.",cr:["As-tu validé son expérience avant d'essayer de deplacer le cadre ?","As-tu trouve une anomalie pertinente dans son propre discours ?","As-tu utilisé la question 'qu'est-ce qui t'a amene a accepter cet appel aujourd'hui' ?","As-tu evite de sur-expliquer ou d'argumenter ?","Le prospect avait-il l'impression d'avoir fait le chemin lui-même ?"]}};
exs[3]={t:"Exercice — Detection de profils DISC + PCM",s:"La detection de profil, ça se travaille. L'objectif : identifier le canal en moins de 3 minutes, automatiquement.",steps:[{t:"Le jeu de la detection en 60 secondes",d:"Sur tes 10 prochains appels, consacre les 60 premieres secondes uniquement a détecter le profil. Note : vitesse de parole, 1er sujet aborde, ton général. Ecris le profil probable avant de continuer. Apres l'appel, validé si tu avais raison. Objectif : 7 bonnes predictions sur 10 appels."},{t:"Adapter son canal en temps reel",d:"Sur un appel, si tu sens que le prospect se ferme (réponses courtes, monosyllabes, ton distant) — c'est que tu utilises le mauvais canal. Fais une pause. Identifie quel canal tu utilises. Passes au canal oppose. Note ce qui change dans la dynamique de la conversation."},{t:"Le roleplay de profils extremes",d:"Demande a ton mentor de jouer successivement un Dominant pur (impatient, coupe la parole, demande le ROI direct) et un Stable pur (lent, parle de sa famille, cherche la sécurité). Pratique le changement de canal entre les deux. L'objectif : sentir la difference dans ton corps, pas juste la comprendre intellectuellement."}],checks:["J'ai détecte correctement le profil sur 7 appels sur 10","J'ai utilisé le canal directif sur un profil D et note la reaction","J'ai utilisé le canal nourricier sur un profil S et note la reaction","J'ai identifié un prospect en stress niveau 2 et adapte mon approche","J'ai fait le roleplay de profils extremes avec mon mentor","Je peux nommer le canal de communication de chaque profil sans hesiter"],rp:{sc:"Roleplay en 2 parties. Partie 1 : ton mentor joue un Analytique en stress (beaucoup de questions, ton critique, 'j'ai besoin de plus d'informations'). Partie 2 : il change de profil et joue un Empathique en stress (très doux, dit oui a tout mais n'ose pas s'engager). Tu dois détecter le changement et adapter ton canal en temps reel.",cr:["As-tu détecte le profil dans les 2-3 premieres minutes ?","As-tu utilisé le bon canal des le début ou tu as du corriger en cours ?","As-tu gere le stress du prospect sans perdre ta posture ?","As-tu détecte le changement de profil entre les deux parties ?","Quel signal t'a indique que tu utilisais le mauvais canal ?"]}};
exs[4]={t:"Exercice — Structure de l'appel",s:"La structure s'automatise avec la répétition. L'objectif : que chaque phase soit naturelle, pas mecanique.",steps:[{t:"L'appel en mode observation pure",d:"Sur ton prochain appel, fixe-toi un seul objectif : ne rien dire pendant les 5 premieres minutes sauf des questions ouvertes et du mirroring. Pas d'explication, pas de pitch, pas de commentaire. Juste des questions et du silence. Note ce que le prospect revele spontanement quand tu lui laisses vraiment l'espace."},{t:"Chronometrer chaque phase sur 3 appels",d:"Sur 3 appels, note l'heure de début de chaque phase : connexion, découverte, solutions, cout d'inaction, pitch, closing. Compare avec la structure cible (0-5 / 5-25 / 25-40 / 40-55 min). Si une phase est trop courte, tu sais exactement ou travailler."},{t:"Maitriser la transition découverte vers pitch",d:"Pratique cette phrase jusqu'a ce qu'elle soit naturelle : 'D'après tout ce que tu m'as partage — tu veux [X], tu te sens bloque par [Y], et ce que tu ne veux plus c'est [Z]. Est-ce que je me trompe quelque part ?' Silence. Puis : 'Est-ce que tu penses qu'on peut t'aider a aller la ?' C'est la transition la plus importante de l'appel."}],checks:["J'ai fait 3 appels en chronometrant chaque phase","J'ai tenu 5 minutes de questions et mirroring sans pitcher sur un appel","J'ai utilisé la transition découverte-pitch exacte sur 3 appels","Mon ratio de parole est en dessous de 40% sur au moins 2 appels","J'ai tenu le silence après la question de fermeture au moins une fois","J'ai gere un non proprement et envoye le message de suivi 48h après"],rp:{sc:"Appel complet en roleplay — 45 minutes. Ton mentor joue un prospect interesse mais hesitant, avec une objection en fin d'appel ('j'ai besoin d'en parler a ma femme'). Tu dois passer par toutes les phases dans le bon ordre et dans les bons timings. L'évaluation porte sur la fluidite des transitions et la naturalite de chaque phase.",cr:["Les phases se sont-elles enchainees naturellement ou mecaniquement ?","As-tu respecte les timings approximatifs de chaque phase ?","La transition découverte-pitch était-elle fluide ?","As-tu tenu le silence après la fermeture ?","Comment as-tu traite l'objection 'j'en parle a ma femme' ?"]}};
exs[5]={t:"Exercice — Phase de découverte",s:"La découverte se pratique à part. C'est une competence en soi — pas juste une étape de l'appel.",steps:[{t:"L'exercice des 5 pourquoi sur un vrai prospect",d:"Sur ton prochain appel, choisis une réponse du prospect et applique les 5 pourquoi complets. 'J'ai pas le temps' -> 'Pas le temps pour quoi ?' -> réponse -> nouvelle question -> etc. Ne t'arretes pas avant le 4e ou 5e niveau. Note la difference entre la 1ere réponse et la 5e — c'est la vraie douleur."},{t:"La découverte sans jamais nommer la douleur",d:"Sur 3 appels, fixe-toi une regle : tu n'es pas autorise a nommer toi-même la douleur du prospect. Tu ne peux que poser des questions pour qu'il la nomme lui-même. Note combien de fois tu as eu envie de 'aider' en nommant — c'est exactement ce qu'il faut apprendre a retenir."},{t:"Le résumé-validation parfait",d:"Apres chaque découverte, fais le résumé-validation avec ses mots exacts — pas les tiens. Puis pose la question : 'Est-ce que je me trompe quelque part ?' Ecoute attentivement ce qu'il corrige. Ce qu'il corrige, c'est la vraie douleur. Note les corrections systematiquement."}],checks:["J'ai applique les 5 pourquoi complets sur au moins 2 appels","J'ai fait un appel entier sans nommer la douleur a sa place","J'ai utilisé les 5 categories de questions sur un même appel","J'ai fait un résumé-validation avec ses mots exacts sur 3 appels","J'ai utilisé les questions Momentum en fin de découverte","J'ai traite l'objection 'je vais me lancer seul' de façon preventive pendant la découverte"],rp:{sc:"Roleplay découverte pure — 20 minutes. Ton mentor joue un prospect qui a des réponses de surface ('ça va, c'est juste que je voudrais gagner plus'). Ton objectif : creuser jusqu'a la vraie douleur identitaire ou relationnelle. Tu n'as pas le droit de pitcher, pas le droit de parler du programme. Juste des questions et du mirroring.",cr:["As-tu atteint la 3e couche de la douleur (identitaire ou relationnelle) ?","As-tu evite de nommer la douleur a sa place ?","Le prospect avait-il l'impression d'avoir fait le chemin lui-même ?","As-tu utilisé des questions miroir efficacement ?","Quel moment du roleplay t'a paru le plus difficile — pourquoi ?"]}};
exs[6]={t:"Exercice — Fausses croyances & Objections",s:"Les objections se traitent en amont. Et quand elles arrivent quand même, elles se traitent avec méthode.",steps:[{t:"Cartographier tes 5 objections frequentes",d:"Fais la liste des 5 objections que tu entends le plus souvent. Pour chacune : identifié la vraie croyance derriere, formule la question d'accueil, la question de creusage, et le recadrage. Pas de script — des directions. Pratique chacune à voix haute jusqu'a ce que ça sonne naturel et non mecanique."},{t:"L'exercice du cadre des 3 temps",d:"Sur ton prochain appel qui contient une objection : applique le cadre des 3 temps en le nommant mentalement à chaque étape. 'La je suis en train d'accueillir.' 'La je creuse.' 'La je recadre.' Ca ralentit ton cerveau et evite de sauter directement au recadrage par réflexe conditionne."},{t:"Anticiper les objections pendant la découverte",d:"Sur tes 5 prochains appels, identifié dans la découverte les signaux qui annoncent une objection probable. Exemple : si le prospect mentionné qu'il a 'déjà essaye des trucs similaires' -> objection arnaque probable. Traite-la pendant la découverte, pas en fin d'appel."}],checks:["J'ai cartographie mes 5 objections frequentes avec le cadre des 3 temps","J'ai traite une objection sans me defendre et note la reaction du prospect","J'ai utilisé la question 'en dehors de ça, y'a-t-il autre chose ?' avant de traiter","J'ai anticipe et traite une objection pendant la découverte","J'ai fait une sortie propre sur un non et envoye le suivi 48h après","J'ai recu un retour de mon mentor sur mon traitement d'objection"],rp:{sc:"Scenario objections en cascade. Ton mentor sort 3 objections en sequence : 'c'est trop cher', puis 'j'ai besoin d'y réfléchir', puis 'je vais d'abord essayer seul'. Ton objectif : traiter chaque objection avec le cadre des 3 temps, sans jamais te defendre, et identifier la vraie objection derriere les trois de surface.",cr:["As-tu fait une pause avant de répondre à chaque objection ?","As-tu accueilli avant de creuser, et creuse avant de recadrer — dans cet ordre ?","As-tu identifié la vraie objection derriere les trois de surface ?","As-tu evite de te defendre ou de justifier le prix ?","La conversation restait-elle fluide ou sentait-on le traitement ?"]}};
exs[7]={t:"Exercice — Ferocite & Flow",s:"La performance ne s'improvise pas. Elle se construit par des habitudes precises qui tiennent dans le temps.",steps:[{t:"Construire ta liste toujours / jamais",d:"Prends 20 minutes. Ecris ta liste de ce que tu feras TOUJOURS (ritual pre-appel, débrief post-appel, etc.) et ta liste de ce que tu ne feras JAMAIS (checker les reseaux avant un appel, faire un appel sans préparation, etc.). Affiche ces listes. Evalue-toi chaque semaine sur les deux colonnes."},{t:"Le défi des 10 jours consecutifs",d:"Choisis une habitude de performance que tu veux ancrer : coherence cardiaque, meditation, débrief post-appel. Fais-la 10 jours de suite sans exception. Une seule. Pas plusieurs a la fois. La régularité sur une habitude vaut mieux que l'irregularite sur dix."},{t:"Tracker ton état de Flow",d:"Sur tes 10 prochains appels, note après chacun ton niveau de Flow sur 10 : etais-tu vraiment present ? As-tu eu des moments d'acuite ou tu sentais le prospect ? Note ce qui precedait les appels a Flow élève vs les appels a Flow bas."}],checks:["Ma liste toujours / jamais est ecrite et affichee","J'ai tenu une habitude 10 jours consecutifs sans exception","J'ai tracker mon état de Flow sur 10 appels","J'ai identifié ce qui crée mes etats de Flow les plus élèves","J'ai mange le crapaud en premier pendant 5 jours consecutifs","J'ai fait un débrief écrit après chaque appel pendant 2 semaines"],rp:{sc:"Scenario de maintien sous pression. Ton mentor te fait faire 3 roleplays en sequence rapide (15 min chacun), sans pause. L'objectif : observer comment ta posture et ton énergie evoluent entre le 1er et le 3e. Sur le 3e, ton mentor joue un prospect difficile et agressif.",cr:["Ton état interne sur le 3e appel était-il comparable au 1er ?","Quels signaux indiquaient une baisse d'énergie ou de présence ?","As-tu maintenu ton rituel entre les appels ?","Comment tà voix et ton rythme ont-ils évolue ?","Qu'est-ce que tu ferais differemment pour maintenir ton état ?"]}};
exs[8]={t:"Exercice — Performer & Grandir",s:"La professionnalisation, ça se construit. Ces exercices sont operationnels — pas theoriques.",steps:[{t:"Construire ton CRM en 1h",d:"Ouvre un Google Sheets. Cree ces colonnes : Prenom | Source | Profil DISC | Statut | Date prochain contact | Objection principale | Notes débrief | Commission. Remplis-le avec tes 10 derniers prospects. Mets une prochaine action sur chacun. A partir d'aujourd'hui, chaque prospect a une prochaine action planifiee."},{t:"Le débrief structure sur 10 appels",d:"Sur tes 10 prochains appels, reponds par écrit aux 6 questions après chaque appel : Quel était mon état interne ? Quel schéma cognitif j'ai détecte ? Quand ai-je contredit le cadre ? Quelle anomalie aurait pu deplacer le schéma ? Sur quelle variable était ma plus grande lacune ? Quelle était la 'petite flamme' du prospect ?"},{t:"Contacter 5 infopreneurs cette semaine",d:"Pas la semaine prochaine. Cette semaine. Identifie 5 infopreneurs dans ta niche. Envoie un message court et direct : 'Je suis closer spécialisé en [niche]. J'aide les infopreneurs a convertir leurs prospects en clients. Est-ce que vous avez un besoin en ce moment ?' 5 messages, cette semaine, pas la suivante."}],checks:["Mon CRM est construit avec les bonnes colonnes","Chaque prospect dans mon CRM a une prochaine action planifiee","J'ai fait le débrief structure sur 5 appels consecutifs","J'ai contacte 5 infopreneurs cette semaine","J'ai enregistré et reecoute 3 de mes appels","Mon ratio de parole moyen sur 10 appels est en dessous de 40%"],rp:{sc:"Simulation de prospection. Ton mentor joue un infopreneur que tu contactes pour la premiere fois. Il est occupe, un peu sceptique, et te demande ce que tu vaux en 2 minutes. Ton objectif : te présenter sans pitcher ton programme, créer de la curiosite, et obtenir un appel de découverte.",cr:["As-tu evite de pitcher ton programme directement ?","As-tu crée de la curiosite plutot que de la conviction ?","As-tu obtenu un engagement pour un prochain echange ?","Ta présentation durait-elle moins de 2 minutes ?","Comment as-tu gere le scepticisme initial de l'infopreneur ?"]}};
exs[9]={t:"Exercice — Maitriser l'ancrage",s:"3 formats. 3 timings. Une seule regle : ça doit sonner naturel.",steps:[{t:"Ecris ton auto-admission vraie",d:"Qu'est-ce que tu pensais de ce business avant de le comprendre vraiment ? Si c'est fabrique, ça ne fonctionnera pas."},{t:"Teste les 3 formats sur un appel reel",d:"Ancre directe en ouverture. Ancre contraste en fin de diagnostic. Auto-admission avant le pitch."},{t:"Reactive l'ancre en closing",d:"Sans citer l'ancre : 'Est-ce que la, avec tout ce qu'on s'est dit, c'est aligne pour toi ?'"}],checks:["Mon auto-admission vraie est ecrite et testee","J'ai place une ancre directe en ouverture sur 3 appels","J'ai utilisé l'ancre contraste en fin de diagnostic","J'ai fait une auto-admission avant le pitch","J'ai reactive l'ancre implicitement en closing","J'ai enregistré et reecoute avec mon mentor"],rp:{sc:"Ton mentor joue un prospect méfiant qui dit 'j'ai besoin d'y réfléchir'. Tu dois avoir pose les 3 ancrages aux bons moments. L'évaluation porte sur le naturel, pas sur la technique.",cr:["L'ancre directe sonnait-elle naturelle ou calculee ?","L'ancre contraste a-t-elle crée une reaction visible ?","L'auto-admission était-elle vraie et incarnee ?","As-tu reactive l'ancre sans la citer ?","La tension interne était-elle palpable ?"]}};
exs[10]={t:"Exercice — Incarner les analogies",s:"Connaitre une image ne suffit pas. L'objectif : qu'elle sonne comme la tienne.",steps:[{t:"Memorise puis oublie le script",d:"Lis chaque analogie plusieurs fois. Puis ferme la page. Raconte-la avec tes mots. Si tu la recites mot pour mot, elle n'est pas encore incarnee."},{t:"Enregistre-toi en train de la poser",d:"Sur un roleplay ou un vrai appel. Reecoute : est-ce que ça sonne naturel ? Il y a du silence après ?"},{t:"Une analogie par semaine sur un appel reel",d:"Pas toutes a la fois. Une par semaine, sur le bon profil, au bon moment."}],checks:["J'ai reformule avec mes propres mots 3 analogies","J'ai enregistré l'une d'elles sur un appel reel","J'ai note la reaction du prospect après le silence","J'ai identifié quelle analogie fonctionne sur quel profil","J'ai demande un retour a mon mentor sur l'incarnation"],rp:{sc:"Roleplay : ton mentor donne une objection au hasard. Tu dois placer l'analogie adaptee, naturellement, sans l'annoncer.",cr:["L'analogie était-elle adaptee a l'objection ?","A-t-elle sonne naturelle ou recitee ?","As-tu laisse le silence après l'image ?","As-tu attendu la reaction avant de continuer ?","Aurais-tu pu choisir une analogie differente — laquelle ?"]}};
var ex=exs[mi];
if(!ex)return'<div style="font-size:12px;color:#64748B;padding:20px 0;text-align:center">Exercices bientot disponibles.</div>';
var sh=ex.steps.map(function(s,i){return'<div class="estep"><div class="esn">'+(i+1)+'</div><div class="esb"><div class="estt">'+s.t+'</div><div class="esd">'+s.d+'</div></div></div>';}).join('');
var ch=ex.checks.map(function(c,i){var k='ex'+mi+'_'+i,dk=!!PROG[k];return'<div class="cki '+(dk?'done':'')+'\" data-ck="'+k+'" onclick="tickCk(\''+k+'\')"><div class="ckb">'+(dk?'&#10003;':'')+'</div><div class="ckt">'+c+'</div></div>';}).join('');
var cr=ex.rp.cr.map(function(c){return'<li>'+c+'</li>';}).join('');
return'<div class="exc"><div class="ext">'+ex.t+'</div><div class="exs">'+ex.s+'</div>'+sh+'</div><div class="exc"><div class="ext">Checklist de progression</div><div style="margin-top:6px">'+ch+'</div></div><div class="rpb"><div class="rpt">Roleplay — mise en situation</div><div class="rpsc">'+ex.rp.sc+'</div><div class="rpcl">Criteres d\'évaluation</div><ul class="rpcr">'+cr+'</ul></div>';
}
function buildDashboard(){
  var td=0,ta=0,rows=[];
  var nm={1:'Fondations',2:'Neurosciences',3:'Profils DISC+PCM',4:'Structure appel',6:'Fausses croyances',8:'Performer',11:'Avant-Appel'};
  var modKeys=[1,2,3,4,6,8];
  modKeys.forEach(function(i){var m=MODS[i];if(!m)return;var t=m.chs.length,d=0;m.chs.forEach(function(_,ci){if(PROG[key(i,ci)])d++;});td+=d;ta+=t;rows.push({n:nm[i]||'Module '+i,pct:Math.round(d/t*100),tp:'g'});});
  if(MODS[11]){var m11=MODS[11],t11=m11.chs.length,d11=0;m11.chs.forEach(function(_,ci){if(PROG[key(11,ci)])d11++;});}
  var at=ANC.length,ad=0;ANC.forEach(function(_,ci){if(PROG[key(9,ci)])ad++;});td+=ad;ta+=at;rows.push({n:"Bonus — L\'Ancrage",pct:Math.round(ad/at*100),tp:'p'});
  var alt=ANAL.length,ald=0;ANAL.forEach(function(_,ci){if(PROG[key(10,ci)])ald++;});td+=ald;ta+=alt;rows.push({n:'Bonus — Analogies',pct:Math.round(ald/alt*100),tp:'t'});
  var g=Math.round(td/ta*100);
  var nx=g===0?'Commence par le Module 0 — Fondations & Mindset.':g<30?'Continue dans l\'ordre. Chaque module s\'appuie sur le précédent.':g<60?'Intègre les bonus quand les fondations sont solides.':'Formation complète. Forme à ton tour.';
  var rh=rows.map(function(r){return'<div class="pr"><div class="prn">'+r.n+'</div><div class="prt"><div class="prtb"><div class="prtf '+r.tp+'" style="width:'+r.pct+'%"></div></div></div><div class="prp">'+r.pct+'%</div></div>';}).join('');
  return'<div class="dash-grid"><div class="dash-card"><div class="dash-card-title">Chapitres complétés</div><div style="font-family:var(--serif,serif);font-size:40px;color:var(--or);line-height:1">'+td+'</div><div style="font-size:12px;color:var(--gris-light);margin-top:6px">sur '+ta+' au total</div></div><div class="dash-card"><div class="dash-card-title">Progression globale</div><div style="font-size:40px;color:var(--or);line-height:1;font-weight:600">'+g+'%</div><div style="height:3px;background:#222;border-radius:2px;margin-top:10px"><div style="height:100%;width:'+g+'%;background:var(--or);border-radius:2px"></div></div></div></div><div class="dash-card" style="margin-bottom:16px"><div class="dash-card-title">Progression par module</div>'+rh+'</div><div class="next-box"><div class="next-label">Prochaine étape</div><div class="next-text">'+nx+'</div></div>';
}
function buildBody(){
  if(CM===0)return buildDashboard();
  if(CT==='exercices')return buildExercise(CM);
  if(CM===9)return buildAnchor();
  if(CM===10)return buildAnalogies();
  return buildChapters(CM);
}
function renderPage(){
  var area=document.getElementById('main');if(!area)return;
  if(CM===0){area.innerHTML='<div class="mh"><div class="mcat g">Vue d\'ensemble</div><div class="mtit">Tableau de <span class="ag">bord</span></div><div class="mdesc">Suis ta progression. Coche les chapitres termines directement dans le contenu.</div></div><div class="body">'+buildDashboard()+'</div>';return;}
  var isA=CM===9,isN=CM===10,pc=isA||isN;
  var cat,tit,desc;
  if(isA){cat='Bonus - Technique avancee';tit='<span class="ap">L\'Ancrage</span>';desc="3 formats de questions calibrees. Integre naturellement a la découverte selon le profil et le moment.";}
  else if(isN){cat='Bonus - Technique incarnee';tit='<span class="at">Les Analogies</span>';desc="9 analogies calibrees. Ce qui fait la difference : l'incarnation, pas la technique.";}
  else{var mo=MODS[CM];cat=mo.cat;tit=mo.title;desc=mo.desc;}
  var cl=isA?'p':isN?'t':'g';
  area.innerHTML='<div class="mh"><div class="mcat '+cl+'">'+cat+'</div><div class="mtit">'+tit+'</div><div class="mdesc">'+desc+'</div></div><div class="tabs"><div class="tab on'+(pc?' p':'')+'" data-tab="cours" onclick="switchTab(\'cours\')">Cours</div><div class="tab'+(pc?' p':'')+'" data-tab="exercices" onclick="switchTab(\'exercices\')">Exercices & Roleplay</div></div><div class="body" id="ba">'+buildBody()+'</div>';
  document.querySelectorAll('.tab').forEach(function(el){el.classList.toggle('on',el.dataset.tab===CT)});
}
function renderAdmin(){
  var students=lSt();
  var cards=students.map(function(s){
    var prog=lProg(s.code),td=0,ta=0;
    for(var i=1;i<=8;i++){var m=MODS[i];if(!m)continue;var t=m.chs.length,d=0;m.chs.forEach(function(_,ci){if(prog[key(i,ci)])d++;});td+=d;ta+=t;}
    ANC.forEach(function(_,ci){if(prog[key(9,ci)])td++;});ta+=ANC.length;
    ANAL.forEach(function(_,ci){if(prog[key(10,ci)])td++;});ta+=ANAL.length;
    var pct=Math.round(td/ta*100);
    var nm={1:'Fondations',2:'Neuro',3:'Profils',4:'Structure',5:'Decouverte',6:'Objections',7:'Flow',8:'Performer'};
    var bars='';
    for(var i=1;i<=8;i++){var m=MODS[i];if(!m)continue;var t=m.chs.length,d=0;m.chs.forEach(function(_,ci){if(prog[key(i,ci)])d++;});var p=Math.round(d/t*100);bars+='<div class="strow"><div class="strn">'+nm[i]+'</div><div class="sttr"><div class="stbf" style="width:'+p+'%"></div></div><div class="stpp">'+p+'%</div></div>';}
    return'<div class="stcard"><div class="stg"><div class="stav">'+(s.initials||s.name.substring(0,2).toUpperCase())+'</div><div><div class="stnm">'+s.name+'</div><div class="stco">'+s.code+'</div></div><div class="stpc">'+pct+'%</div></div><div class="stbars">'+bars+'</div></div>';
  }).join('');
  document.getElementById('root').innerHTML='<div class="platform"><div class="sb"><div class="sb-top"><div class="sb-brand">Mentoring Closing</div><div class="sb-user">Admin</div><span class="sb-out" onclick="logout()">&#8592; Deconnexion</span></div><div class="sb-kpis"><div class="kpi"><b>'+students.length+'</b><span>Eleves</span></div></div><div class="sb-sec">Vue admin</div><div class="ni on" style="border-left-color:#B8922A"><div class="nn" style="background:#FBF5E8;color:#B8922A;font-size:8px">A</div><div class="nt"><div class="ntitle">Progression élèves</div></div></div></div><div class="main"><div class="mh"><div class="mcat g">Administration</div><div class="mtit">Progression des <span class="ag">élèves</span></div><div class="mdesc">Vue globale de l\'avancement. Mise a jour en temps reel.</div></div><div class="admin-w"><div>'+cards+'</div><div class="add-s" onclick="document.getElementById(\'af\').classList.toggle(\'show\')">+ Ajouter un élève</div><div class="add-f" id="af"><input id="an" placeholder="Prenom de l\'élève" /><input id="ac" placeholder="Code d\'accès (ex: PIERRE2024)" /><div class="add-row"><button class="btn-ok" onclick="addSt()">Ajouter</button><button class="btn-no" onclick="document.getElementById(\'af\').classList.remove(\'show\')">Annuler</button></div><div class="add-err" id="ae"></div></div></div></div></div>';
}
function addSt(){
  var name=document.getElementById('an').value.trim();
  var code=document.getElementById('ac').value.trim().toUpperCase();
  if(!name||!code){document.getElementById('ae').textContent='Prenom et code requis.';return}
  if(code===ADMIN){document.getElementById('ae').textContent='Code reserve.';return}
  var st=lSt();
  if(st.find(function(s){return s.code===code})){document.getElementById('ae').textContent='Ce code existe déjà.';return}
  st.push({name:name,code:code,initials:name.substring(0,2).toUpperCase()});
  sSt(st);renderAdmin();
}
