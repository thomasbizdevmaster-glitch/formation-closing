<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation Closing — Thomas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --noir:#0A0A0A;--noir-card:#141414;--noir-mid:#1E1E1E;--noir-sb:#111111;
  --or:#C9A84C;--or-pale:#E8D49A;--or-bg:rgba(201,168,76,0.08);--or-border:rgba(201,168,76,0.2);
  --ivoire:#F5F0E8;--ivoire-mid:#EDE7D9;--blanc:#FFFFFF;
  --gris:#888880;--gris-light:#444440;
  --vert:#2A6B4F;--vert-bg:rgba(42,107,79,0.12);
  --bleu:#2A4B6B;--bleu-bg:rgba(42,75,107,0.12);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--noir);color:var(--ivoire);-webkit-font-smoothing:antialiased;margin:0}
#root{min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--noir)}
.login-card{max-width:400px;width:100%;text-align:center}
.l-brand{font-family:'Playfair Display',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--or);margin-bottom:36px;display:block}
.l-title{font-family:'Playfair Display',serif;font-size:38px;color:var(--blanc);line-height:1.15;margin-bottom:8px}
.l-sub{font-size:13px;color:var(--gris);margin-bottom:36px;line-height:1.7}
.l-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gris);margin-bottom:10px;text-align:left;display:block}
#ci{width:100%;background:var(--noir-mid);border:1px solid #2A2A2A;border-radius:6px;padding:14px 18px;font-size:20px;color:var(--blanc);text-align:center;letter-spacing:6px;font-weight:600;outline:none;transition:border 0.2s;font-family:'Inter',sans-serif}
#ci:focus{border-color:var(--or)}
.l-btn{width:100%;margin-top:12px;background:var(--or);color:var(--noir);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:14px;border-radius:6px;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.2s}
.l-btn:hover{opacity:0.85}
#cerr{font-size:12px;color:#E07070;margin-top:10px;min-height:18px}
.l-err{font-size:12px;color:#E07070;margin-top:10px;min-height:18px}
.l-hint{font-size:11px;color:var(--gris-light);margin-top:20px;line-height:1.7}
.platform{display:flex;min-height:100vh}
.sb{width:240px;flex-shrink:0;background:var(--noir-sb);border-right:1px solid #1A1A1A;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-top{padding:20px 16px 14px;border-bottom:1px solid #1A1A1A}
.sb-brand{font-family:'Playfair Display',serif;font-size:14px;color:var(--blanc);margin-bottom:2px}
.sb-user{font-size:10px;color:var(--or);letter-spacing:1px;margin-bottom:8px}
.sb-out{font-size:11px;color:var(--gris-light);cursor:pointer;letter-spacing:0.5px;background:none;border:none;font-family:'Inter',sans-serif}
.sb-out:hover{color:var(--gris)}
.sb-kpis{display:flex;gap:0;border-top:1px solid #1A1A1A;margin-top:12px;padding-top:12px}
.kpi{flex:1;text-align:center}
.kpi b{display:block;font-family:'Playfair Display',serif;font-size:18px;color:var(--or);font-weight:600}
.kpi span{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gris-light)}
.sb-sec{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gris-light);padding:14px 16px 8px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,0.03)}
.ni.on{background:var(--or-bg);border-left-color:var(--or)}
.bon .nn{background:rgba(42,75,107,0.3) !important;border-color:rgba(42,75,107,0.4) !important;color:#6B9FD4 !important}
.bon.on .nn{background:var(--bleu) !important;border-color:var(--bleu) !important;color:var(--blanc) !important}
.nn{width:24px;height:24px;border-radius:50%;background:#1E1E1E;border:1px solid #2A2A2A;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--gris);flex-shrink:0;transition:all 0.2s}
.ni.on .nn{background:var(--or) !important;border-color:var(--or) !important;color:var(--noir) !important}
.nt{flex:1;min-width:0}
.ntitle{font-size:12px;color:var(--gris);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni.on .ntitle{color:var(--ivoire);font-weight:500}
.nbar{height:2px;background:#222;border-radius:2px;margin-top:4px}
.nfill{height:100%;background:var(--or);border-radius:2px;transition:width 0.3s}
.nct{font-size:10px;color:var(--gris-light);flex-shrink:0}
.main-area{flex:1;overflow-y:auto;min-width:0}
.mh{padding:36px 44px 20px;border-bottom:1px solid #1A1A1A}
.mcat{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--or);margin-bottom:10px}
.mcat.g{color:var(--or)}.mcat.p{color:#6B9FD4}.mcat.t{color:#6BAF8A}
.mtit{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,32px);color:var(--blanc);line-height:1.2;margin-bottom:8px}
.mdesc{font-size:13px;color:var(--gris);line-height:1.75;max-width:600px}
.body{padding:24px 44px 48px}
.tabs{display:flex;gap:0;border-bottom:1px solid #1A1A1A;padding:0 44px}
.tab{padding:12px 18px;font-size:11px;font-weight:500;letter-spacing:1.5px;color:var(--gris-light);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;text-transform:uppercase}
.tab.on{color:var(--or);border-bottom-color:var(--or)}
.ch{border:1px solid #1A1A1A;border-radius:8px;margin-bottom:8px;overflow:hidden;background:var(--noir-card)}
.chh{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;transition:background 0.15s}
.chh:hover{background:var(--noir-mid)}
.chn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.chn.g{background:var(--or-bg);color:var(--or);border:1px solid var(--or-border)}
.chn.p{background:var(--bleu-bg);color:#6B9FD4;border:1px solid rgba(107,159,212,0.3)}
.chn.t{background:var(--vert-bg);color:#6BAF8A;border:1px solid rgba(107,175,138,0.3)}
.chl{flex:1;font-size:13px;font-weight:500;color:var(--ivoire-mid)}
.ck{width:20px;height:20px;border-radius:4px;border:1.5px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--vert);transition:all 0.15s;flex-shrink:0}
.ck.done{background:var(--vert);border-color:var(--vert);color:var(--blanc)}
.ça{font-size:10px;color:var(--gris-light);flex-shrink:0}
.cbd{display:none;padding:18px 20px 20px;border-top:1px solid #1A1A1A}
.cbd.open{display:block}
.tag{display:inline-block;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:4px;margin-bottom:12px;font-weight:600}
.tag.g{background:var(--or-bg);color:var(--or);border:1px solid var(--or-border)}
.tag.p{background:var(--bleu-bg);color:#6B9FD4;border:1px solid rgba(107,159,212,0.2)}
.tag.t{background:var(--vert-bg);color:#6BAF8A;border:1px solid rgba(107,175,138,0.2)}
.ci{font-size:13px;color:rgba(245,240,232,0.65);line-height:1.85;margin-bottom:16px}
.pt{display:flex;gap:10px;margin-bottom:10px}
.pd{width:4px;flex-shrink:0;border-radius:2px;margin-top:4px;background:var(--or);min-height:14px}
.pd.p{background:#6B9FD4}.pd.t{background:#6BAF8A}
.ptx{font-size:13px;color:rgba(245,240,232,0.65);line-height:1.75}
.ptx b{color:var(--ivoire);font-weight:600;display:block;margin-bottom:3px}
.ibox{background:var(--or-bg);border:1px solid var(--or-border);border-radius:6px;padding:14px 16px;margin-top:14px}
.ibox .il{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:6px;font-weight:600}
.ibox .it{font-size:13px;color:var(--ivoire);line-height:1.75;font-style:italic}
.gbox{background:rgba(201,168,76,0.04);border:1px solid var(--or-border);border-radius:6px;padding:14px 16px;margin-top:10px}
.gbox .gl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or-pale);margin-bottom:6px;font-weight:600}
.gbox .gt{font-size:13px;color:rgba(245,240,232,0.6);line-height:1.75}
.pdfs{margin-top:20px;display:flex;flex-wrap:wrap;gap:8px}
.pdf-card{background:var(--noir-mid);border:1px solid #252525;border-radius:6px;padding:12px 16px;cursor:pointer;transition:border-color 0.2s;text-decoration:none;display:block}
.pdf-card:hover{border-color:var(--or-border)}
.pdn{font-size:10px;letter-spacing:1px;color:var(--or);margin-bottom:3px;font-weight:600}
.pdt{font-size:13px;color:var(--ivoire-mid);line-height:1.4;margin-bottom:2px}
.pdd{font-size:11px;color:var(--gris-light)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.dash-card{background:var(--noir-card);border:1px solid #1A1A1A;border-radius:8px;padding:18px 20px}
.dash-card-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gris-light);margin-bottom:12px}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prn{font-size:12px;color:var(--gris);flex:1}
.prt{flex:1;max-width:100px}
.prtb{height:3px;background:#222;border-radius:2px}
.prtf{height:100%;border-radius:2px;transition:width 0.3s}
.prtf.g{background:var(--or)}.prtf.p{background:#6B9FD4}.prtf.t{background:#6BAF8A}
.prp{font-size:11px;color:var(--gris-light);min-width:32px;text-align:right}
.next-box{background:var(--or-bg);border:1px solid var(--or-border);border-radius:8px;padding:16px 20px;margin-top:16px}
.next-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:6px}
.next-text{font-size:13px;color:var(--ivoire);line-height:1.6}
.rp-wrap{background:var(--noir-card);border:1px solid #1A1A1A;border-radius:8px;padding:20px;margin-top:16px}
.rp-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gris-light);margin-bottom:8px}
.rp-sc{font-size:13px;font-weight:600;color:var(--ivoire);margin-bottom:12px}
.rp-steps{list-style:none;counter-reset:rp}
.rp-steps li{display:flex;gap:10px;font-size:12px;color:var(--gris);line-height:1.7;margin-bottom:6px}
.rp-steps li::before{content:counter(rp);counter-increment:rp;width:18px;height:18px;border-radius:50%;background:#1E1E1E;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--or);flex-shrink:0;margin-top:2px}
.ag{color:var(--or);font-style:italic}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--noir)}
::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:4px}
@media(max-width:768px){.sb{width:0;display:none}.body{padding:20px}.mh{padding:24px 20px 16px}.tabs{padding:0 20px}.dash-grid{grid-template-columns:1fr}}
/* EXERCISES */
.exc{background:var(--noir-card);border:1px solid #1A1A1A;border-radius:8px;padding:20px 22px;margin-bottom:12px}
.ext{font-family:'Playfair Display',serif;font-size:17px;color:var(--blanc);margin-bottom:8px}
.exs{font-size:13px;color:var(--gris);line-height:1.75;margin-bottom:16px;border-left:2px solid var(--or);padding-left:14px}
.estep{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.esn{width:26px;height:26px;border-radius:50%;background:var(--or-bg);border:1px solid var(--or-border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--or);flex-shrink:0;margin-top:2px}
.esb{flex:1}
.estt{font-size:13px;font-weight:600;color:var(--ivoire);margin-bottom:4px}
.esd{font-size:12px;color:var(--gris);line-height:1.75}
/* CHECKLIST */
.cki{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:6px;cursor:pointer;transition:background 0.15s;border:1px solid transparent;margin-bottom:6px}
.cki:hover{background:var(--noir-mid)}
.cki.done{background:var(--vert-bg);border-color:rgba(42,107,79,0.2)}
.ckb{width:18px;height:18px;border-radius:4px;border:1.5px solid #333;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--vert);flex-shrink:0;margin-top:1px;transition:all 0.15s}
.cki.done .ckb{background:var(--vert);border-color:var(--vert);color:var(--blanc)}
.ckt{font-size:13px;color:var(--gris);line-height:1.6}
.cki.done .ckt{color:var(--ivoire-mid)}
/* ROLEPLAY */
.rpb{background:var(--noir-mid);border:1px solid #252525;border-radius:8px;padding:18px 20px;margin-top:8px}
.rpt{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gris-light);margin-bottom:8px;font-weight:600}
.rpsc{font-size:13px;font-weight:600;color:var(--ivoire);margin-bottom:12px}
.rpcl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gris-light);margin-bottom:8px}
.rpcr{list-style:none;counter-reset:rpc}
.rpcr li{display:flex;gap:8px;font-size:12px;color:var(--gris);line-height:1.7;margin-bottom:5px}
.rpcr li::before{content:counter(rpc);counter-increment:rpc;width:16px;height:16px;border-radius:50%;background:#1E1E1E;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--or);flex-shrink:0;margin-top:2px}
/* ANCHOR BONUS */
.anc-banner{background:var(--or-bg);border:1px solid var(--or-border);border-radius:8px;padding:16px 20px;font-size:14px;color:var(--ivoire);line-height:1.75;margin-bottom:20px}
.fgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.fc{background:var(--noir-card);border:1px solid #1A1A1A;border-radius:8px;padding:16px}
.f1{border-top:2px solid var(--or)}
.f2{border-top:2px solid #6B9FD4}
.f3{border-top:2px solid #6BAF8A}
.fn{font-size:13px;font-weight:600;color:var(--ivoire);margin-bottom:6px}
.fd{font-size:12px;color:var(--gris);line-height:1.6;margin-bottom:8px}
.ft{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gris-light)}
/* ANALOGIES */
.anl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.anl-card{background:var(--noir-card);border:1px solid #1A1A1A;border-radius:8px;padding:16px}
.anl-title{font-size:13px;font-weight:600;color:var(--ivoire);margin-bottom:6px}
.anl-text{font-size:12px;color:var(--gris);line-height:1.7}
@media(max-width:600px){.fgrid{grid-template-columns:1fr}.anl-grid{grid-template-columns:1fr}}

/* BONUS ANALOGIES */
.ana-warn{background:var(--or-bg);border:1px solid var(--or-border);border-radius:8px;padding:16px 20px;margin-bottom:20px}
.awh{font-size:13px;font-weight:600;color:var(--or);margin-bottom:6px}
.awb{font-size:13px;color:rgba(245,240,232,0.7);line-height:1.75}
.awb b{color:var(--ivoire)}
.ac{background:var(--noir-card);border:1px solid #1A1A1A;border-radius:8px;margin-bottom:8px;overflow:hidden}
.ach{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;transition:background 0.15s}
.ach:hover{background:var(--noir-mid)}
.atitle{flex:1;font-size:13px;font-weight:500;color:var(--ivoire-mid)}
.abd{display:none;padding:16px 20px;border-top:1px solid #1A1A1A}
.abd.open{display:block}
.aprofils{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pchip{font-size:10px;background:var(--bleu-bg);color:#6B9FD4;border:1px solid rgba(107,159,212,0.2);border-radius:4px;padding:3px 8px;letter-spacing:0.5px}
.aex{background:var(--or-bg);border:1px solid var(--or-border);border-radius:6px;padding:12px 16px;margin-top:12px}
.aexl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:6px;font-weight:600}
.aext{font-size:13px;color:var(--ivoire);line-height:1.75;font-style:italic}
</style>
</head>
<body>
<div id="root"></div>
<script>
var ADMIN='THOMAS_ADMIN';
var CU=null,CM=0,CT='cours',PROG={};
var DEF_ST=[{name:'Élève',code:'CLOSED',initials:'CL'}];
function lProg(c){try{var s=localStorage.getItem('p_'+c);return s?JSON.parse(s):{}}catch(e){return{}}}
function sProg(c,d){try{localStorage.setItem('p_'+c,JSON.stringify(d))}catch(e){}}
function lSt(){try{var s=localStorage.getItem('stu_v2');return s?JSON.parse(s):DEF_ST}catch(e){return DEF_ST}}
function sSt(l){try{localStorage.setItem('stu_v2',JSON.stringify(l))}catch(e){}}
function key(m,c){return m+'_'+c}
function login(){
  var code=document.getElementById('ci').value.trim().toUpperCase();
  if(!code){document.getElementById('cerr').textContent="Entre ton code d'accès.";return}
  if(code===ADMIN){CU={name:'Admin',code:ADMIN,isAdmin:true};PROG={};renderApp();return}
  var st=lSt(),s=st.find(function(x){return x.code===code});
  if(!s){document.getElementById('cerr').textContent='Code incorrect. Verifie avec ton coach.';return}
  CU=Object.assign({},s);PROG=lProg(code);renderApp();
}
function logout(){CU=null;PROG={};CM=0;CT='cours';renderLogin()}
function tick(m,c,e){
  if(e)e.stopPropagation();
  var k=key(m,c);PROG[k]=!PROG[k];sProg(CU.code,PROG);
  var el=document.getElementById('tk-'+m+'-'+c);
  if(el){el.classList.toggle('done',PROG[k]);el.innerHTML=PROG[k]?'&#10003;':'';}
  refreshBars();
}
function tickCk(k){
  PROG[k]=!PROG[k];sProg(CU.code,PROG);
  document.querySelectorAll('[data-ck="'+k+'"]').forEach(function(el){
    el.classList.toggle('done',!!PROG[k]);
    var b=el.querySelector('.ckb');if(b)b.innerHTML=PROG[k]?'&#10003;':'';
  });
}
function toggleCh(m,c){
  var b=document.getElementById('bd-'+m+'-'+c),h=document.getElementById('hd-'+m+'-'+c),a=document.getElementById('ar-'+m+'-'+c);
  if(!b)return;var o=b.classList.contains('open');
  b.classList.toggle('open',!o);if(h)h.classList.toggle('open',!o);if(a)a.classList.toggle('open',!o);
}
function toggleA(i){
  var b=document.getElementById('ab-'+i),a=document.getElementById('aa-'+i);
  if(!b)return;var o=b.classList.contains('op');b.classList.toggle('op',!o);if(a)a.classList.toggle('op',!o);
}
var MODS={
1:{cat:'Fondations',title:'Mindset & <span class="ag">Identite</span>',desc:"Le closing est un metier de performance. Comme un sportif de haut niveau, ce sont la discipline, la constance et les répétitions qui font la difference — pas le talent.",
chs:[
{n:'00',tc:'g',tag:'Intro — Le metier de Closer',t:"Pourquoi le Closing est un sport de haut niveau",i:"Avant de rentrer dans la technique, je veux que tu comprennes quelque chose de fondamental sur ce metier. Le closing, c'est un metier de performance. Exactement comme un sport. Et comme dans n'importe quel sport, ce n'est pas le talent brut qui fait les résultats — c'est la discipline, la constance, et la capacite a répéter les bons gestes encore et encore, même quand ça ne marche pas, même quand tu as une mauvaise serie, même quand tu doutes.\n\nUn boxeur ne devient pas champion en lisant des livres sur la boxe. Il devient champion en montant sur le ring, en encaissant des coups, en analysant ses echecs, et en revenant le lendemain. C'est exactement ce que tu vas faire.\n\nLe closer débutant cherche la bonne formule, le script parfait, la technique qui va tout changer. Le closer qui performe comprend que ce n'est pas ce qu'il dit qui fait la difference — c'est l'état dans lequel il est quand il le dit, la constance avec laquelle il applique les principes, et la profondeur avec laquelle il comprend son prospect.\n\nCe que ce programme va te donner, c'est la méthode. Mais la méthode sans répétition, c'est de la theorie. Et la theorie ne paie pas de commission. Ce qui paie, c'est d'aller sur le terrain, d'appliquer, de se tromper, de debriefer, et de recommencer. Chaque appel est une session d'entrainement. Chaque objection est une répétition. Chaque non est une donnee.",pts:[{c:'g',b:'La discipline avant la technique',t:" : un closer qui applique une méthode correcte a 80% chaque jour bat un closer qui applique une méthode parfaite une fois sur trois. La régularité bat le genie."},{c:'g',b:'La répétition creatrice de sens',t:" : les 50 premiers appels, tu appliques. Les 100 suivants, tu comprends pourquoi ça marche. A partir de 200 appels, tu commences a sentir les conversations. C'est la que tout change."},{c:'g',b:'Le débrief comme outil de progression',t:" : après chaque appel, 10 minutes. Qu'est-ce qui a bien marche ? Qu'est-ce que j'aurais pu creuser ? Quel était mon état interne ? Sans ce débrief, tu repetes les memes erreurs."}],ex:{l:'La regle des 100 appels',t:"Tes 100 premiers appels, tu les rates. C'est normal. C'est prevu. C'est nécessaire. Ne cherche pas a les réussir — cherche a apprendre quelque chose sur chacun. Le closer qui accepte ça avance 3 fois plus vite que celui qui veut performer des le premier jour."},gold:{l:'Ce que ce programme exige de toi',t:"Une chose. Une seule. Que tu appliques. Pas que tu comprennes — ça c'est là partie facile. Que tu appliques, que tu te trompes, que tu notes, et que tu recommences. C'est le seul chemin vers la performance."}},
{n:'01',tc:'g',tag:'Definition',t:"Ce qu'est vraiment le closing",i:"Le closing, ce n'est pas de la vente. Et comprendre cette distinction va changer complètement ta façon d'aborder chaque appel.\n\nUn vendeur cherche a convaincre. Son énergie est focalisee sur comment amener l'autre a dire oui. Il pousse. Il présente. Il argumente. Et le prospect le sent — et se ferme.\n\nUn closer cherche a comprendre. Son énergie est focalisee sur le prospect — sur ce qu'il vit, ce qu'il ressent, ce qu'il veut vraiment. Et paradoxalement, c'est cette approche qui crée le oui — parce que le prospect a l'impression d'avoir décidé tout seul. Parce que c'est exactement ce qui s'est passe.\n\nPense a un médecin. Quand tu arrives dans son cabinet, il ne te vend pas une ordonnance. Il te pose des questions. Il t'examine. Il écoute. Et seulement une fois qu'il a compris ce dont tu as besoin, il prescrit. Si l'ordonnance n'est pas nécessaire, il ne la prescrit pas — même si çà lui couterait une consultation. C'est ça l'integrite du diagnostic. C'est exactement cette posture que tu dois adopter sur chaque appel.",pts:[{c:'g',b:'Diagnostiquer avant de prescrire',t:" : tu ne parles jamais de ton programme avant d'avoir compris en profondeur la situation du prospect. Jamais. Meme si tu sens qu'il est interesse. Meme si tu sens que ça matche. Tu continues a creuser."},{c:'g',b:'Detachement total du résultat',t:" : la vente se sent quand tu en as besoin. Quand tu as besoin du oui, tu parles trop vite, tu remplis les silences, tu sur-expliques. Et le prospect détecte ça avant que tu aies dit un mot — son amygdale analyse ton état en millisecondes."},{c:'g',b:'Servir d abord',t:" : ton seul objectif sur cet appel, c'est d'aider cette personne a prendre la meilleure décision pour elle. Pas pour toi. Pour elle. Meme si la meilleure décision est de ne pas travailler avec toi."}],ex:{l:'Analogie médecin',t:"Imagine un médecin qui, des que tu pousses la porte, te dit : 'Vous avez besoin d'une operation. Ca coute 5000 euros.' Sans t'examiner. Sans t'écouter. Tu t'en irais en courant — et tu aurais raison. C'est pourtant exactement ce que font la plupart des closers débutants : ils pitchent avant de comprendre. Ne sois pas ce médecin-la."},gold:{l:'Les 3 regles absolues',t:"1. Tu es la pour servir le prospect dans son meilleur interet. 2. Les meilleures décisions pour lui sont généralement en dehors de sa zone de confort. 3. Ton prospect va se battre corps et ame pour rester dans cette zone de confort. → Ton job : l'aider a voir ce que lui-même ne voit pas encore."}},
{n:'02',tc:'g',tag:'Prise de conscience',t:"Les saisons du closer — tu n'échappes pas à la règle",i:"Il y a quelque chose que personne ne te dit quand tu commences le closing. Et cette chose-là, si tu ne la comprends pas, va te faire abandonner exactement au mauvais moment.\n\nUn musicien de jazz le sait. Un athlète de haut niveau le sait. Tout professionnel qui performe sur le long terme le sait : il y a des saisons. Des saisons hautes et des saisons basses. Des périodes où tout coule, où chaque appel semble facile, où les oui arrivent naturellement. Et des périodes où rien ne rentre, où tu remets en question tout ce que tu crois savoir.\n\nLe closing ne fait pas exception. Tu n'y échappes pas. Personne n'y échappe.",pts:[{c:'g',b:"Les 3 saisons du closer",t:" : La saison froide — tu closes peu, les appels sont difficiles, tu doutes. Les causes possibles : qualité des leads, ton état interne, un plateau de compétence. Ce n'est pas un signe que tu es mauvais — c'est un signe que quelque chose doit être ajusté. La saison tiède — tu closes régulièrement, tu te sens en rythme, tu construis. La saison chaude — tout coule, les oui arrivent, tu sens que tu es en flow. Et derrière chaque vente, quelque chose de profondément humain : la gratitude. Donner de la valeur à quelqu'un et être reconnu pour ça — c'est puissant."},{c:'g',b:"Pourquoi les descentes font mal — et pourquoi c'est normal",t:" : Quand tu closes bien, ton cerveau libère de la dopamine. Le succès crée une attente de succès. Quand la saison froide arrive, le contraste est brutal — et le cerveau interprète ça comme un échec identitaire. C'est là que la plupart abandonnent. Pas parce qu'ils ne sont pas capables — mais parce qu'ils n'étaient pas préparés à cette réalité."},{c:'g',b:"Ce qui limite les descentes — le niveau",t:" : plus ton niveau monte, plus les saisons froides durent moins longtemps et font moins mal. Pourquoi ? Parce qu'un closer de haut niveau est moins à la demande — c'est lui qu'on cherche. Ses appels sont mieux qualifiés. Sa posture est plus stable parce qu'elle ne dépend pas du résultat d'un seul appel. L'antidote aux descentes, ce n'est pas de les éviter — c'est de monter de niveau pour les raccourcir."},{c:'g',b:"La règle que tu ne peux pas contourner",t:" : tu passeras par toutes les saisons. La différence entre ceux qui durent et ceux qui abandonnent n'est pas le talent — c'est la préparation psychologique. Savoir qu'une descente arrive avant qu'elle arrive. Comprendre qu'une descente n'est pas une identité — c'est une information. Et continuer à travailler pendant la descente, pas malgré elle."}],ex:{l:"Exercice — le baromètre hebdomadaire",t:"Chaque semaine, note de 1 à 10 : ton niveau d'énergie, la qualité de tes appels, et ton état interne général. Sur 3 mois, tu vas voir tes propres cycles apparaître. Et une fois que tu connais tes cycles, tu peux les anticiper — et ne plus les subir."},gold:{l:"L'analogie du sportif",t:"Un athlète de haut niveau ne s'arrête pas d'entraîner parce qu'il a une mauvaise semaine. Il comprend que la mauvaise semaine fait partie du processus. Il cherche ce qui l'a causée. Il ajuste. Il continue. Le closing, c'est un sport de performance. Et la performance, ça se construit dans la durée — pas dans les pics."}},
{n:'03',tc:'g',tag:'Mindset',t:"L'identité du closer — force vs besoin",i:"80% du travail du closer se passe avant de dire un mot. C'est l'état interne. C'est l'endroit depuis lequel tu parles.\n\nQuand tu arrives sur un appel en mode besoin — tu as besoin de cette commission, tu as besoin qu'il dise oui, tu as besoin d'être aime et validé — tout ce que tu dis sonne faux. Pas parce que tu mens. Parce que ton cerveau gère sa propre douleur en même temps qu'il essaie de gérer celle du prospect. Et ça, le prospect le sent avant que tu aies dit quoi que ce soit.\n\nLa neurochimie du mode besoin : cortisol élève + testosterone basse = hierarchie sociale inversee. En termes simples : celui qui a besoin perd le pouvoir. Le prospect détecte inconsciemment que tu es en position basse — et il ne fait pas confiance aux gens en position basse pour prendre de bonnes décisions.\n\nEn revanche, quand tu arrives en puissance calme — detache du résultat, focalise uniquement sur la transformation du prospect — quelque chose de different se passe. Tu peux poser les vraies questions. Tu peux tenir les silences. Tu peux accueillir la resistance sans te defendre. Et le prospect, inconsciemment, te fait confiance.\n\nCette posture ne s'improvise pas. Elle se travaille avant chaque appel, elle se construit avec le temps, et elle ne sera jamais acquise une fois pour toutes. C'est comme un muscle — tu dois l'entretenir.",pts:[{c:'g',b:'Les dettes émotionnelles qui tuent la performance',t:" : besoin d'être aime/validé = cherche a plaire plutot qu'a être utile. Peur du rejet = surexplique, evite les silences, cherche des signaux de validation. Besoin de la commission = mode besoin activé, détecte immédiatement par l'amygdale du prospect."},{c:'g',b:'Puissance calme — ce que ça ressemble concrètement',t:" : tu poses une question difficile et tu attends. Silence de 15 secondes. Tu ne le remplis pas. Le prospect finit par parler. Tu reponds lentement, sans urgence. Tu accueilles une objection comme une information, pas comme une attaque. Tu dis non si le programme ne correspond pas."},{c:'g',b:'HeartMath — la science derriere',t:" : le coeur envoie ses signaux au cerveau plus vite que l'inverse. Ton état interieur précède ta parole. Le prospect ressent ton état avant que tu aies dit un mot — pas parce qu'il est intuitif, mais parce que son système nerveux lit le tien."}],ex:{l:'Test de congruence',t:"Avant ton prochain appel, pose-toi cette question : si je savais avec certitude que cette personne va dire non a la fin — est-ce que je ferais quand même cet appel avec la même qualité d'écoute et de présence ? Si la réponse est non, tu es en mode besoin. Travaille ça avant de décrocher."},gold:{l:'Question fondamentale a te poser régulièrement',t:"'Si j'enlevais la commission de l'equation — est-ce que je ferais encore ce travail ?' Si la réponse est oui, tu travailles depuis un endroit sain. Si c'est non ou hesitant, c'est un signal important a prendre au serieux."}},
{n:'03',tc:'g',tag:'Protocole',t:"Le rituel pre-appel — les 3 étapes obligatoires",i:"La préparation d'un appel de closing ne commence pas quand tu decroches. Elle commence 10 a 15 minutes avant. Ce protocole n'est pas optionnel — c'est la difference entre un appel ou tu es vraiment present et un appel ou tu geres ta propre anxiete pendant que le prospect parle.\n\nAmy Cuddy (Harvard) a démontré que la posture haute pendant 2 minutes avant une situation de performance diminue significativement le cortisol et augmente la testosterone. Tu n'as pas besoin d'attendre d'être confiant pour performer — tu performes pour devenir confiant.\n\nLe protocole en 3 étapes, dans cet ordre précis :",pts:[{c:'g',b:'1. Énergie — cohérence cardiaque',t:" : 6 respirations par minute, 5 secondes d'inspiration par le nez, 5 secondes d'expiration par la bouche. 2 à 5 minutes avant l'appel. Source : Rollin McCraty, HeartMath Institute (2015). Effets mesurés : baisse du cortisol, activation du nerf vague, synchronisation cœur-cerveau. Debout, dos droit. L'objectif : être dans son corps, pas dans sa tête."},{c:'g',b:'2. Intention — déclarer à voix haute',t:" : 'Je viens pour diagnostiquer et servir, pas pour vendre.' Dit à voix haute, pas dans ta tête. Ça ancre l'intention dans le corps et calibre l'état interne. Puis : 'Mon seul objectif aujourd'hui est de comprendre cette personne mieux qu'elle ne se comprend elle-même.'"},{c:'g',b:'3. Adaptation — lire le profil et lâcher',t:" : lis ce que tu sais du prospect — son contexte, ses enjeux probables, son profil DISC probable. Identifie 2-3 hypothèses sur sa douleur principale. Puis lâche complètement le résultat. Ce qui se passe sur cet appel n'est pas une mesure de ta valeur."},{c:'g',b:'4. Le message de confirmation — dans la première minute',t:" : donnée documentée (MIT/InsideSales.com, Oldroyd 2007) : contacter un prospect dans la première minute suivant sa réservation augmente le taux de show-up significativement. Son cerveau vient de prendre une décision — sa dopamine est haute. Un message rapide ancre l'engagement avant que le doute s'installe. Modèle : 'Salut [Prénom], je viens de voir ta réservation pour [heure]. Je suis là. À tout à l'heure.' Court, direct, aucune fioriture."}],ex:{l:'Le protocole complet — séquence',t:"J-60 min : envoie le message de confirmation. J-10 min : cohérence cardiaque, 6 cycles. J-2 min : déclare ton intention à voix haute. Décroche seulement quand tu es en paix avec les deux scénarios possibles."},gold:{l:'Source clé',t:"McCraty R., Shaffer F. (2015). Heart Rate Variability. Global Advances in Health and Medicine, 4(1), 46-61. — Oldroyd J. (2007). The Short Life of Online Sales Leads. Harvard Business Review, 85(8)."}},,
{n:'04',tc:'g',tag:'Analyse',t:"Les 3 erreurs fatales — et pourquoi elles arrivent",i:"Ces erreurs ne viennent pas d'un manque de technique. Elles viennent d'un mauvais état interne. Et c'est pour ça qu'elles sont si difficiles a corriger — ce n'est pas ce que tu fais qui est en cause, c'est l'endroit depuis lequel tu le fais.\n\nChaque erreur est un signal. Si tu te retrouves a faire l'une de ces trois choses, c'est que ton système nerveux est passe en mode survie. La bonne nouvelle : une fois que tu sais reconnaître ces signaux, tu peux te recalibrer en temps reel.",pts:[{c:'g',b:'Erreur 1 — Tuer le silence',t:" : le silence après une question importante, c'est le prospect qui reflechit. C'est exactement ce que tu veux. Quand tu le combles, tu interromps son processus de réflexion, tu envoies un signal de malaise, et tu perds la position haute. La regle : après chaque question importante, attends. Meme si c'est 20 secondes. Meme si c'est inconfortable. C'est dans ce silence que les vraies réponses emergent."},{c:'g',b:'Erreur 2 — Parler plus de 40% du temps',t:" : si tu parles plus que ton prospect, tu vends. Tu ne closes pas. Le ratio ideal : 30% toi, 70% lui. Sur tes prochains appels, compte mentalement. Des que tu te surprends a faire de longs monologues, c'est que tu n'as pas assez creuse en découverte — et tu compenses avec du pitch."},{c:'g',b:'Erreur 3 — Repondre immédiatement aux objections',t:" : répondre sans pause, c'est le pattern du closer sous pression. L'amygdale du prospect le lit comme : 'il a peur, il se defend.' 2 à 3 secondes de pause avant de répondre a une objection montrent que tu accueilles — pas que tu te defends. Cette pause change complètement la dynamique de la conversation."}],ex:{l:'Cas concret — les 3 erreurs en sequence',t:"Prospect : 'Je sais pas, j'ai besoin d'y réfléchir.' Debutant (erreur 1+2+3) : repond immédiatement, explique pendant 3 minutes pourquoi c'est une bonne décision, remplit tous les silences. Resultat : le prospect se ferme. Closer : 3 secondes de silence, puis : 'Reflechir a quoi exactement ?' Silence. Le prospect parle. Tu ecoutes. La vraie objection emerge."},gold:null}
]},
2:{cat:'Neurosciences',title:'Neurosciences & <span class="ag">Decision</span>',desc:"Le cerveau émotionnel décide en premier — toujours. 9 piliers. Le PDF de reference est disponible en bas de ce module.",
chs:[
{n:'01',tc:'g',tag:'Pilier 1 — Cerveau émotionnel',t:"L'amygdale décide en premier",i:"Imagine que ton cerveau est une maison à deux étages. Au rez-de-chaussée, un gardien — rapide, instinctif, émotionnel. À l'étage, un analyste — lent, logique, rationnel. Le gardien décide si la porte s'ouvre ou se ferme. L'analyste arrive après — uniquement pour justifier. | <b>L'amygdale — le gardien</b> Petite structure au centre du cerveau, de la taille d'une amande. Son seul rôle : détecter en millisecondes si la situation est une menace ou une opportunité. Elle ne réfléchit pas — elle réagit. Sur un appel, elle évalue dès les premières secondes : 'Cette personne est-elle en position de force ou de besoin ?' Si elle tranche menace, aucun argument ne passe. | <b>Le cortex préfrontal — l'analyste</b> La partie avant du cerveau, juste derrière le front. Logique, analyse, prise de recul. Mais il entre en jeu APRÈS l'amygdale. Antonio Damasio l'a démontré cliniquement : des patients avec des lésions du cortex préfrontal analysaient parfaitement une situation mais étaient incapables de décider. Sans émotion, pas de décision. La logique ne convainc pas — elle valide. | <b>Le cortisol — ce que ton corps trahit</b> Le cortisol c'est l'hormone du stress. Quand tu arrives sur un appel avec un besoin de commission ou une peur du rejet, ton corps en libère. Ta voix change légèrement, tes silences sont moins stables, ta posture se referme. Ton prospect ne l'analyse pas consciemment — mais l'amygdale le capte en temps réel. Un closer en mode besoin perd avant d'avoir parlé. | <b>Système 1 et Système 2 — Kahneman</b> Daniel Kahneman, Prix Nobel : Système 1 = rapide, automatique, émotionnel (l'amygdale). Système 2 = lent, analytique, rationnel (le cortex préfrontal). Le Système 1 décide. Le Système 2 justifie. Quand tu argumentes longuement, tu t'adresses au mauvais système. La décision est déjà prise.",pts:[{c:'g',b:'Application directe',t:"'Qu\'est-ce que tu ne vivrais plus si dans 6 mois rien n\'a changé ?' → Active l\'amygdale sur la perte. Kahneman l\'a mesuré : perdre fait 2x plus mal que gagner fait du bien. La décision est prise bien avant la présentation de l\'offre."}],ex:{l:'Application directe',t:"'Qu'est-ce que tu ne vivrais plus si dans 6 mois rien n'a change ?' -> Active l'amygdale sur la perte. 10x plus puissant qu'une promesse de gain. La présentation de l'offre ne declenche pas la décision — elle la confirme ou l'infirme."},gold:{l:'Bannir absolument',t:"'Imagine ce que tu peux gagner.' -> Remplace par : 'Qu'est-ce que ça te coute de rester la ou tu es ?' (Kahneman/Tversky). Le prospect a déjà décidé avant que tu ne présentés ton offre. Ton role : créer les conditions emotionnelles qui permettent a son cerveau de dire oui."}},
{n:'02',tc:'g',tag:'Pilier 2 — Dettes emotionnelles',t:"Les dettes émotionnelles du closer",i:"<b>Ce qui se passe dans ton cerveau quand tu as besoin de closer</b> Quand tu arrives sur un appel avec une pression — besoin de commission, peur du rejet, attachement au résultat — ton amygdale s'active. Elle libère du cortisol (hormone du stress) et réduit l'activité du cortex préfrontal. Résultat concret : tu écoutes moins bien, tu remplis les silences par nervosité, tu sur-expliques face aux objections. | <b>La neurochimie de la hiérarchie sociale</b> Le rapport testostérone/cortisol détermine la posture perçue. Ratio élevé (testostérone haute, cortisol bas) = posture haute, voix stable, tolérance au silence. Ratio faible (cortisol dominant) = posture basse, voix qui monte, malaise face aux objections. Ce ratio est lisible — inconsciemment — par l'amygdale de ton prospect en quelques secondes. | Les dettes émotionnelles — tout ce qui n'est pas encore réglé en soi — coûtent cher en performance. Quand tes dettes sont actives, ton cerveau gère sa propre douleur pendant que tu es censé gérer celle du prospect.",pts:[{c:'g',b:'Besoin d être validé',t:" : cherche a être AIME plutot qu'UTILE — perd sa posture immédiatement."},{c:'g',b:'Peur de l echec / du rejet',t:" : surexplique, evite les silences, cherche des signaux de validation constamment."},{c:'g',b:'Besoin de la commission',t:" : mode besoin activé — détecte immédiatement par l'amygdale du prospect. Neurochimie : cortisol élève + testosterone basse = hierarchie sociale inversee. Celui qui a besoin perd le pouvoir."}],ex:{l:'Ce que ça demande concrètement',t:"Identifier ses propres declencheurs émotionnels avant chaque appel. Travailler ses blessures passees — la connaissance de soi est un outil de performance. Coherence cardiaque entre les appels pour recharger sa batterie. Arriver sur chaque appel dans l'ordre : énergie -> intention -> adaptation."},gold:null},
{n:'03',tc:'g',tag:'Pilier 3 — Cadre cognitif',t:"Le cadre cognitif du prospect",i:"Ton prospect n'arrive jamais vierge. Il arrive avec un historique complet : achats regrettes, promesses non tenues, closers déjà croises. Tout ça s'est encode sous forme de schémas cognitifs automatiques — son cadre cognitif. Ce cadre filtre tout ce que tu vas dire avant même que tu le dises. Quand tu attaques une croyance centrale, le cerveau reagit exactement comme s'il subissait une douleur physique — la croyance se renforce biologiquement. Ton prospect arrive avec une remorque. Ton premier travail : comprendre ce qu'elle contient.",pts:[{c:'g',b:'3 questions de diagnostic (dans cet ordre)',t:" : 1. 'Qu'est-ce que tu as déjà essaye pour résoudre ça ?' -> revele le schéma dominant. 2. 'Qu'est-ce qui fait que jusque-la tu n'as pas encore regle ça ?' -> revele la croyance de resistance centrale. 3. 'Comment est-ce que tu saurais qu'une décision est la bonne pour toi ?' -> revele le critere de coherence."},{c:'g',b:'Erreur 1 — Contredire',t:" : 'Notre programme est different...' -> activé la vigilance neurologique, mode protection, la croyance se renforce."},{c:'g',b:'Erreur 2 — Surexpliquer',t:" : noyer sous les arguments -> sature le cortex préfrontal, consolide le cadre que tu voulais deplacer."}],ex:{l:'Croyances frequentes derriere les objections',t:"'Je n'ai pas le temps' = croyance sur ses priorites ou peur de l'echec. 'C'est trop cher' = rapport a la valeur de soi. 'J'ai besoin d'en parler a mon partenaire' = peur de la responsabilite personnelle. 'Je vais y réfléchir' = manque de confiance ou peur de l'engagement. 'J'ai déjà essaye des trucs similaires' = blessure passee non resolue."},gold:{l:'Question d anomalie',t:"'Qu'est-ce qui t'a amene a accepter cet appel aujourd'hui, alors que tu aurais pu decliner ?' -> Le prospect accede a là partie de lui qui contredit son propre filtre. La flamme subsiste toujours."}},
{n:'04',tc:'g',tag:'Pilier 4 — Aversion a la perte',t:"Aversion a la perte & urgence authentique",i:"Mise en lumiere par Kahneman et Tversky (Prix Nobel 2002). L'aversion a la perte est l'un des mécanismes neurologiques les plus puissants. Perdre 50 000 fait deux fois plus mal que gagner 50 000 fait du bien. Ratio stable : perdre 1000 = douleur equivalente a ne pas gagner 2000 a 2500. C'est précisément l'aversion a la perte qui crée l'urgence authentique — pas les bonus, pas les deadlines artificielles.",pts:[{c:'g',b:"Cout de l'inaction",t:" : 'Si dans 6 mois tu n'as pas change ça, que t'aura-t-il coute en temps, argent, opportunités ?'"},{c:'g',b:'La fenetre qui se ferme',t:" : 'Quand est-ce que le moment sera meilleur que maintenant ?'"},{c:'g',b:'Projection dans le regret',t:" : 'Dans 1 an, qu'est-ce que tu veux te dire sur ce que tu as décidé aujourd'hui ?'"}],ex:null,gold:{l:'Principe fondamental',t:"Ne lui vends pas ce qu'il va gagner. Montre-lui ce qu'il perd chaque jour qu'il attend. Gain 1000 = ressenti +10. Perte 1000 = ressenti -20 a -25. Signer un programme a 3000 = excitation moderee. Rater l'opportunité a 3000 = regret intense."}},
{n:'05',tc:'g',tag:'Pilier 5 — Travailler avec le cadre',t:"Travailler avec le cadre — les 3 étapes",i:"Une fois le cadre cognitif lu, la regle est simple : ne jamais attaquer la croyance frontalement. Entrer dans le cadre d'abord — puis le deplacer. Methode en 3 étapes, toujours dans cet ordre précis.",pts:[{c:'g',b:'1. Valider l expérience',t:" : accueillir le filtre sans le combattre. Formules : 'Tu as potentiellement...' / 'J'imagine que...' / 'Qu'est-ce qui te fait dire ça ?' L'amygdale baisse la garde. Valider n'est pas être d'accord — c'est montrer que tu comprends."},{c:'g',b:'2. Introduire l anomalie',t:" : introduire une information qui ne rentre pas dans le cadre. Creer un doute, une incoherence. Le cerveau va chercher comment integrer cette incoherence : c'est le début du deplacement."},{c:'g',b:'3. Proposer un nouveau schéma par le comportement',t:" : ne pas dire 'je suis different'. Le montrer — par ta posture, tes silences, tes questions precises, ton détachement du résultat. Posture de médecin : tu diagnostiques, tu ne suppliques pas."}],ex:{l:'Ce que ça donne en pratique',t:"Des questions spécifiques creent une micro-surprise qui ouvre le prospect plutot que d'activer sa méfiance. Le cerveau met a jour son schéma base sur ce qu'il voit, pas sur ce qu'on lui dit. L'état d'ouverture génère est obligatoire pour créer l'urgence."},gold:null},
{n:'06',tc:'g',tag:'Pilier 6 — 12 Variables',t:"Les 12 variables que le prospect évalue",i:"Le cerveau du prospect recueille des données sur 12 variables (vocales, comportementales, structurelles) pour construire son jugement — et décider si tu es en position de force ou de besoin. Ces signaux sont traités par le Système 1 : inconsciemment et instantanément. Les 3 variables d'ancrage prioritaires : Silence · Cadence et tonalité · Détachement du résultat.",pts:[{c:'g',b:'1. Cadence vocale',t:" : voix lente et posée = système parasympathique activé, cortisol réduit chez le prospect. Voix rapide et tendue = signal d'alerte. Gérer ton rythme tout au long de l'appel — surtout dans les moments de tension."},{c:'g',b:'2. Gestion du silence',t:" : le silence indique qui est le plus à l'aise. Combler le silence = signal de malaise. Après une question difficile : le silence génère une pression interne chez le prospect lui-même — laisse-la travailler."},{c:'g',b:'3. Intonation en fin de phrase',t:" : une affirmation qui sonne comme une question (intonation montante) = insécurité perçue. Une intonation descendante en fin d'affirmation = marqueur de posture haute. Travaille ce point sur tes enregistrements."},{c:'g',b:'4. Vitesse de réponse aux objections',t:" : répondre immédiatement = tu te défends. 2 à 3 secondes de pause avant de répondre = tu accueilles. Cette pause seule change la perception du prospect sur ta posture."},{c:'g',b:'5. Vocabulaire utilisé',t:" : les mots choisis révèlent l'état interne. Trop de qualificatifs excessifs = sur-compensation. Vocabulaire neutre et factuel = confiance naturelle. Utilise ses mots à lui, pas les tiens."},{c:'g',b:'6. Formulation des questions',t:" : questions ouvertes = curiosité sincère et posture haute. Questions fermées répétées = interrogatoire ou anxiété. La qualité de tes questions révèle la qualité de ta présence."},{c:'g',b:'7. Gestion des interruptions',t:" : couper le prospect = impatience ou anxiété. Laisser les silences sans intervenir = maîtrise. Quand il s'arrête, attends encore 2 secondes avant de parler."},{c:'g',b:'8. Réactivité aux signaux émotionnels',t:" : un closer en mode besoin ne détecte pas les signaux émotionnels — il est focalisé sur son script. Un closer en puissance calme entend ce qui est dit ET ce qui n'est pas dit. Le non-dit est souvent plus important."},{c:'g',b:'9. Posture physique (appels vidéo)',t:" : dos droit, regard caméra, environnement neutre = sérieux et présence. Penché en avant = anxiété ou désir de convaincre. La posture physique impacte directement la neurochimie : assis droit = plus de testostérone, moins de cortisol."},{c:'g',b:'10. Cohérence verbal et non-verbal',t:" : dire 'je suis totalement détaché du résultat' avec une voix qui tremble = incohérence détectée immédiatement. Le cerveau du prospect compare en permanence ce que tu dis et comment tu le dis."},{c:'g',b:'11. Gestion des moments de pression',t:" : quand le prospect dit quelque chose d'inconfortable — ta réaction dans les 3 premières secondes dit tout. Agitation = besoin. Calme = force."},{c:'g',b:'12. Congruence globale — la variable méta',t:" : le cerveau est spécialisé pour détecter l'incohérence entre ce qu'une personne dit et ce qu'elle fait. Un état interne instable annule les 11 autres variables. La congruence vient de l'intérieur — elle ne se joue pas."}],ex:{l:"Grille d'auto-confrontation à faire sur chaque appel",t:"Quel était mon état interne avant l'appel ? Quel schéma cognitif actif j'ai détecté dans les 3 premières minutes ? À quel moment ai-je involontairement contredit son cadre ? Quelle anomalie aurait pu perturber le schéma ? Sur quelle variable était ma plus grande lacune ? Quelle était la 'petite flamme' du prospect ?"},gold:null},
{n:'07',tc:'g',tag:'Pilier 7 — Posture & état interne',t:"Posture, leadership & état interne",i:"L'état interne represente 80% du travail du closer. C'est la premiere chose que le prospect va lire — et elle ne peut pas être cachee. La bonne nouvelle : la posture peut être travaillée. La mauvaise : elle n'est jamais acquise une fois pour toutes. L'intention n'est pas une technique — c'est une posture profonde qui se ressent. Ton focus avant l'appel décide lequel tu seras.",pts:[{c:'g',b:'Closer en mode besoin',t:" : focalise commission, ressent la pression, surexplique face a la resistance, recherche des signaux de validation, remplit les silences par nervosite, se justifie quand attaque."},{c:'g',b:'Closer en puissance calme',t:" : focalise transformation, detache du résultat — présence totale, accueille la resistance comme une donnee, arrive avec neutralite : 'Je viens pour toi, pas pour moi'."},{c:'g',b:'Protocole pre-appel (dans cet ordre)',t:" : 1. Energie — coherence cardiaque, respiration, mouvement. 2. Intention — 'Je viens pour diagnostiquer et servir, pas pour vendre'. 3. Adaptation — lire le profil, identifier les angles, lacher le résultat."},{c:'g',b:'Citation fondatrice',t:" : 'Aide le prospect avec l'intention et l'humilite que tu aurais envers ta propre famille.'"}],ex:{l:'Synthese — Cartographie d un appel',t:"Pre-appel : énergie + intention. Ouverture 0-5 min : évaluation menace ou sécurité. Diagnostic 5-15 min : 3 questions de cartographie dans l'ordre. Gestion du cadre 15-30 min : valider -> anomalie -> nouveau schéma. Amplification 25-35 min : quantifier le cout de l'inaction. Presentation offre 35-45 min : donner les arguments pour justifier la décision. Closing 45-55 min : retour Système 1, la décision finale est toujours émotionnelle."},gold:{l:'Citation du guide',t:"'Le meilleur closing ne se sent pas. Le prospect a l'impression d'avoir décidé tout seul. Parce que c'est exactement ce qui s'est passe.'"}},
{n:'08',tc:'g',tag:'Pilier 8 — Biochimie',t:"La biochimie de la performance",i:"Les 12 variables (Pilier 06) sont toutes basées sur ton état interne. Et l'état interne, ce n'est pas du mindset abstrait — c'est de la biochimie : mesurable, prévisible, actionnable. Quatre molécules pilotent ta performance sur un appel. Le prospect ne perçoit pas directement ta confiance — il perçoit l'état de ton système nerveux.",pts:[{c:'g',b:'Cortisol — hormone du stress',t:" : niveau élève = perte de précision, silences percus comme des signaux négatifs. Tu deviens réactif plutot que directif."},{c:'g',b:'Dopamine — la présence réelle',t:" : faible taux = appels en mode automatique, voix plate, curiosite éteinte. Genère par l'anticipation d'une récompense sincere."},{c:'g',b:'Ratio Testostérone / Cortisol',t:" : détermine si une objection te déstabilise ou non. Ratio favorable = voix stable, tolérance au silence. Ratio défavorable = voix qui monte, malaise face aux objections."},{c:'g',b:'Ocytocine — la connexion',t:" : régule la confiance interpersonnelle. Écoute plus réelle, moins simulée. Activee par des interactions positives avant l'appel et l'absence de conflits non résolus."},{c:'g',b:'La respiration — ton seul levier d entrée volontaire',t:" : cohérence cardiaque : inspire 4 temps, expire 6 temps — 2 minutes suffisent avant un appel. Utilisable aussi en direct face à un prospect stressé pour l'aider à se calmer."}],ex:{l:'Les 3 profils neurochimiques — identifie le tien',t:"Cortisol dominant : performant en conditions normales, perd en précision quand l'enjeu monte. Levier : réduire les déclencheurs 30 min avant l'appel. | Dominant déficitaire : solide sur les premiers appels, baisse après plusieurs appels difficiles consécutifs. Levier : micro-victoires intentionnelles. | Suractivation sympathique : parle trop vite, n'accepte pas les silences. Levier : ancrage physique avant l'appel, réduire caféine et conflits."},gold:{l:'Principe fondamental',t:"L'état interne se prépare bien avant l'appel — parfois des la veille. La paix intérieure, c'est de la bande passante cognitive disponible pour le prospect."}},
{n:'09',tc:'g',tag:'Pilier 9 — Cerveau prédictif',t:"Le cerveau prédictif & la décision sécure",i:"Toutes les séances précédentes répondent à une seule question fondamentale : comment réduire neurologiquement la menace liée à la décision ? Le closing est l'art de rendre une décision neurologiquement sûre. Le cerveau humain (Karl Friston, 'machine bayésienne') anticipe constamment ce qui va arriver et réagit à ses propres prédictions. Quand une personne entre dans un cadre commercial, elle anticipe une tentative de manipulation — avant même le début de l'échange.",pts:[{c:'g',b:'La réactance psychologique',t:" : quand le prospect se sent contraint, son cerveau perçoit une menace sur sa liberté de décision. Il cesse de traiter l'offre pour reprendre le controle. Laisser toujours au prospect l'impression qu'il garde le controle et possède une porte de sortie."},{c:'g',b:'La charge cognitive',t:" : la mémoire de travail ne peut traiter que 4 a 7 éléments sous le stress. Trop d'informations = le prospect choisit l'option la moins coûteuse cognitivement : ne pas décider. Regle des 3 : ne présenter que 3 éléments majeurs."},{c:'g',b:'Douleur certaine vs amélioration incertaine',t:" : le cerveau préfère souvent rester dans une douleur connue plutot que choisir une amélioration incertaine. Un prospect qui ne peut pas visualiser le parcours après l'achat génère un pic de stress. Décris les premieres 48h apres le oui."},{c:'g',b:'L erreur de prédiction & le pattern interrupt',t:" : si ton discours est trop prévisible, le cerveau passe en pilotage automatique. Une rupture de pattern réactive l'attention. L'intérêt réel porté à la personne crée une rupture de schéma plus puissante que n'importe quelle technique."},{c:'g',b:'La permission inversée',t:" : 'Je veux juste que tu sois clair avec moi — si tu sens que ce n'est pas pour toi, dis-le maintenant.' Cette technique désactive la réactance, calme l'alarme neurologique et laisse le cortex préfrontal évaluer logiquement."}],ex:{l:'Zone de sécurité vs zone de menace',t:"MENACE : pression sur la liberté de choix, trop d'informations, parcours post-achat flou, discours prévisible. SÉCURITÉ : prospect en controle, 3 éléments clairs, visualisation précise du parcours client, pattern interrupt authentique, permission inversée."},gold:{l:'Principe final',t:"Le closing est l'art de rendre une décision neurologiquement sûre. Ton rôle n'est pas de convaincre — c'est d'éliminer les raisons de ne pas décider."}}
]},
3:{cat:'Psychologie',title:'Profils <span class="ag">DISC + PCM</span>',desc:"Chaque prospect est cable differemment. Si tu utilises le mauvais canal, ton message ne passe pas — même s'il est parfait. Source : Guide Closing Profils Psychologiques Complet (DISC + PCM).",
chs:[
{n:'01',tc:'g',tag:'Detection',t:"Detecter un profil en 3 minutes",i:"Le Process Communication Model (PCM), developpe par Taibi Kahler pour la NASA, identifié 6 types de personnalité bases sur les besoins psychologiques. Contrairement au DISC, le PCM identifié ce dont ton prospect a BESOIN pour se sentir en sécurité et décider. Chaque type a un canal de communication privilegie — si tu utilises le mauvais canal, ton message ne passe pas, même s'il est parfait.",pts:[{c:'g',b:'Vitesse',t:" : rapide = Dominant / Influent / Promoteur. Lent = Stable / Analytique / Imagineur."},{c:'g',b:'1er sujet',t:" : Resultats/ROI = Dominant. Reves/lifestyle = Influent. Famille/sécurité = Stable. Questions/logique = Analytique. Valeurs/ethique = Perseverant. Silence = Imagineur."},{c:'g',b:'Ton',t:" : Ferme/direct = Dominant. Chaleureux/enthousiaste = Influent. Doux/lent = Stable. Neutre/factuel = Analytique. Convaincu/moral = Perseverant. Calme/minimal = Imagineur."},{c:'g',b:'3 niveaux de stress PCM a détecter',t:" : Niveau 1 (Driver) : legere tension — recuperable avec le bon canal. Niveau 2 (Masque) : mode defensif — il ne t'entend plus. Niveau 3 (Desespoir) : rupture totale — appel perdu, ne force plus."}],ex:{l:'Regle de triangulation',t:"D -> chiffres et résultats. I -> vision et enthousiasme. S -> sécurité et douceur. C -> méthode et preuves. Un seul critere ne suffit pas — triangule vitesse + 1er sujet + ton."},gold:null},
{n:'02',tc:'g',tag:'DISC Rouge',t:"Dominant / Promoteur PCM",i:"Besoin : Challenge, action immédiate, impact direct sur les résultats. Canal : Directif — phrases courtes, sans tournures polies. Stress : Impatient -> manipulateur -> raccroche. Pose la question du prix des les 5 premieres minutes. Compare mais décide vite une fois convaincu. Max 12 min. Chiffres d'abord. Canal directif PCM.",pts:[{c:'g',b:"Ce qu'il veut entendre",t:" : ROI, rapidite, controle."},{c:'g',b:'Ce qui le ferme',t:" : trop d'émotions, trop de process, trop de temps perdu."},{c:'g',b:'Signaux de detection',t:" : ton ferme et direct, phrases courtes, coupe la parole, demande le ROI concret immédiatement."}],ex:{l:'Scripts calibres (Promoteur PCM)',t:"'Directement — mes élèves font en moyenne 1500 EUR de profit net au 3eme mois.' | 'Je vais pas te faire perdre de temps. T'es la pour un résultat précis.' | 'T'as pas besoin que je te convainque. Est-ce que c'est maintenant ou pas ?' | '3 étapes, 1 résultat. T'es in ou pas ?' | 'Voila les chiffres. Voila ce que ça te coute de ne pas agir maintenant.' | 'Les gens qui ont ton profil closent en général au 1er appel. Qu'est-ce qui te retient ?'"},gold:{l:'A ne jamais faire',t:"Sur-expliquer ou répéter. Hesiter sur le prix. Canal trop doux — il perd interet immédiatement."}},
{n:'03',tc:'g',tag:'DISC Vert',t:"Stable / Empathique PCM",i:"Besoin : Etre reconnu en tant que personne. Canal : Nourricier. 2 appels souvent necessaires.",pts:[{c:'g',b:'Canal nourricier',t:" : commence par l'humain avant le business."},{c:'g',b:'Son levier',t:" : sa famille. \"Ta famille — ils savent que tu cherches une solution ?\""},{c:'g',b:'Ne jamais brusquer',t:" : construis la confiance d'abord."}],ex:{l:'Phrase',t:"\"Je veux pas que tu dises oui parce que tu te sens oblige.\""},gold:{l:'A ne jamais faire',t:"Pression directe. Ultimatums. Canal directif."}},
{n:'04',tc:'g',tag:'DISC Bleu',t:"Analytique / Analyseur PCM",i:"Besoin : Reconnaissance de sa logique. Canal : Interrogatif. Pose beaucoup de questions precises.",pts:[{c:'g',b:"Ce qu'il demande",t:" : preuves, méthode, donnees."},{c:'g',b:'Son objection',t:" : \"J'ai besoin de plus d'informations\" = pas encore convaincu."}],ex:{l:'Script',t:"\"Voila exactement comment chaque semaine est structuree. Tu veux rentrer dans le detail ?\""},gold:{l:'A ne jamais faire',t:"Envoyer des PDFs — renforce la procrastination. Etre defensif."}},
{n:'05',tc:'g',tag:'Avance',t:"Profils terrain — Mefiant & Fuyant",i:"Mefiant : blessure passee. Valider sa méfiance comme une force. Fuyant : déjà en stress niveau 2. Ne pas forcer.",pts:[{c:'g',b:'Mefiant',t:" : \"T'as raison d'être méfiant. La majorite des formations en ligne sont des arnaques. Je suis d'accord.\""},{c:'g',b:'Fuyant',t:" : \"Reflechir a quoi exactement ? Une seule chose.\""},{c:'g',b:'Date précise',t:" : \"Je te propose jusqu'a vendredi.\""}],ex:{l:'Question miroir',t:"\"T'as peur de quoi — que ça ne marche pas, ou que ça marche et que ça change ta vie ?\""},gold:null}
]},
4:{cat:'Structure',title:"Structure de <span class='ag'>l'Appel</span>",desc:"8 phases. La découverte est le cœur — si elle est bien faite, le closing se fait presque seul. Le mirroring est l'outil transversal qui traverse tout l'appel.",
chs:[
{n:'00',tc:'g',tag:'Fondation — Tout l\'appel',t:"Le mirroring — l'outil qui traverse tout",i:"Avant de rentrer dans les phases, il faut comprendre un outil qui va traverser l'intégralité de l'appel — du début à la dernière seconde. Chris Voss, ex-négociateur du FBI, l'appelle le mirroring. En neuroscience, on l'appelle l'isopraxie.\n\nC'est le neurocomportement par lequel les humains se copient les uns les autres pour se rassurer. Quand deux personnes sont en phase, elles synchronisent inconsciemment leur vocabulaire, leur tempo, leur intonation. C'est un signal que la confiance est en train de s'établir.\n\nDans le contexte d'un appel de closing, le miroir est simple : tu répètes les 2-3 derniers mots importants que ton prospect vient de dire. C'est tout. Et pourtant, l'effet est radical — il l'incite à développer, à aller plus loin, à révéler ce qu'il n'aurait pas dit autrement.",pts:[{c:'g',b:'Pourquoi ça fonctionne — la neuroscience',t:" : le miroir active un instinct profond. Nous craignons ce qui est différent et sommes attirés par ce qui nous ressemble. Quand tu répètes ses mots, tu envoies un signal inconscient à son amygdale : 'On est pareils.' La garde baisse. L'accès s'ouvre. C'est pour ça que le mirroring est plus puissant que n'importe quelle technique de questionnement — il agit avant que le Système 2 ait eu le temps d'analyser."},{c:'g',b:'Comment le pratiquer — la technique exacte',t:" : répète les 2-3 derniers mots importants sur un ton légèrement interrogatif. Puis silence. Exemple : le prospect dit 'J'ai pas vraiment eu le temps de me former.' → Tu réponds : 'Pas eu le temps...' → Silence → Il développe. C'est tout. Pas de commentaire. Pas d'interprétation. Ses mots, répétés."},{c:'g',b:'Quand l\'utiliser — tout au long de l\'appel',t:" : Phase 1 — pour créer la connexion initiale. Phase 2-3 — pour creuser la découverte sans poser de nouvelles questions. Phase objections — pour faire émerger la vraie résistance derrière l'objection de surface. Phase fermeture — pour laisser le prospect verbaliser lui-même sa décision. Le mirroring n'est pas une technique de closing — c'est une façon d'être en conversation."},{c:'g',b:'Au-delà du closing — dans la vie',t:" : ce que Voss décrit dans son livre, c'est que les années passées à négocier ont transformé sa façon d'être dans toutes ses relations. Le mirroring, l'écoute active, les questions calibrées — ce sont des outils de connexion humaine. Un bon closer devient un meilleur communicant dans tous les domaines de sa vie."}],ex:{l:'Exercice pratique — 48h de mirroring',t:"Pendant 2 jours, dans toutes tes conversations — au téléphone, en personne, en famille — pratique le miroir. Chaque fois que quelqu'un dit quelque chose, répète les 2-3 derniers mots. Observe ce qui se passe. Les gens vont naturellement développer, corriger, préciser. Tu vas commencer à voir la différence entre ce que les gens disent en surface et ce qu'ils pensent vraiment."},gold:{l:'Citation Voss',t:"'En répétant ce que les gens disent, vous enclenchez un instinct naturel de clarification et d'explication. Votre interlocuteur va développer, préciser, révéler.' — Chris Voss, Ne coupez jamais la poire en deux."}},
{n:'01',tc:'g',tag:'Phase 0 — Avant l\'appel',t:"Préparation mentale & posture",i:"L'appel se gagne avant de décrocher. Tu es un humain qui parle à un autre humain — mais vous n'êtes pas là pour la même raison. Le prospect est là pour avoir des informations. Toi, tu es là pour l'aider à trouver son problème — conscient ou non — et l'aider à prendre la meilleure décision pour lui.\n\nLes 3 règles : 1. Tu es là pour servir, pas pour vendre. 2. Les meilleures décisions pour ton prospect sont souvent en dehors de sa zone de confort. 3. Il va se battre corps et âme pour y rester. Ton rôle : l'accompagner à en sortir.",pts:[{c:'g',b:'Détachement total',t:" : la vente se sent quand tu en as besoin — et le prospect se ferme immédiatement. Si ton cortisol est élevé, ta voix le trahit. L'amygdale de ton prospect lit le signal en temps réel."},{c:'g',b:'Le protocole en 3 étapes',t:" : 1. Énergie — cohérence cardiaque, 5s inspiration, 5s expiration, 6 cycles minimum. 2. Intention — 'Je viens diagnostiquer et servir, pas vendre.' Dit à voix haute. 3. Adaptation — lis le profil, identifie les angles probables, puis lâche le résultat."},{c:'g',b:'Le message de confirmation — dans la première minute',t:" : contacter un prospect dans la première minute suivant sa réservation augmente significativement le taux de show-up (Oldroyd, HBR 2007). Sa dopamine est haute — un message dans la minute ancre l'engagement avant que le doute s'installe. Modèle : 'Salut [Prénom], je viens de voir ta réservation pour [heure]. Je suis là. À tout à l'heure.'"}],ex:{l:'Le mantra pré-appel',t:"Debout, dos droit. 'Mon seul objectif aujourd'hui : comprendre cette personne mieux qu'elle ne se comprend elle-même.' x 3. Silence de 30 secondes. Tu décroches seulement quand tu es vraiment là."},gold:null},
{n:'02',tc:'g',tag:'Phase 1 — 0-5 min',t:"La connexion humaine",i:"L'appel se gagne ou se perd dans les 90 premières secondes. L'amygdale de ton prospect t'évalue avant que tu aies dit quoi que ce soit de substantiel : est-ce que cette personne est en position de force ou de besoin ?\n\nLa connexion n'est pas de la manipulation — c'est la condition neurologique pour que la conversation puisse avoir lieu.",pts:[{c:'g',b:'Questions d\'ouverture — focus sur lui',t:" : 'Qu'est-ce qui a attiré ton attention — le live, le groupe, la pub ?' / 'Est-ce que t'as trouvé ce que tu cherchais ou tu cherches encore ?' / 'Est-ce que tu sais vraiment ce que tu recherches ?' Ces questions mettent le focus sur lui dès la première seconde."},{c:'g',b:'Le mirroring dès la première réponse',t:" : dès qu'il répond, tu le mets en pratique. Il dit 'Je cherche encore.' → Tu répètes : 'Tu cherches encore...' → Silence → Il développe. C'est ici que la dynamique se pose. Celui qui écoute le plus, contrôle le plus."},{c:'g',b:'Écoute active — la voix du négociateur',t:" : Voss parle de la 'voix d'animateur de talk-show nocturne' — calme, posée, légèrement descendante. Elle signale la sécurité. Elle active le système parasympathique du prospect. Elle crée les conditions pour qu'il s'ouvre."}],ex:{l:'Ouverture type',t:"'Avant qu'on commence, je voulais juste te dire que cet appel c'est le tien — mon rôle c'est de comprendre ta situation, pas de te convaincre de quoi que ce soit. Qu'est-ce qui t'a amené à le prendre aujourd'hui ?'"},gold:null},
{n:'03',tc:'g',tag:'Phase 2 — 5-15 min',t:"Découverte — La situation actuelle & les fausses croyances",i:"On cherche à comprendre ce qu'il a déjà mis en place. L'objectif : accumuler le maximum de data sans juger, sans interpréter, sans projeter.\n\nLa règle absolue : tu ne nommes jamais la douleur à sa place. Si tu dis 'donc ce que tu veux vraiment c'est la liberté' — tu lui voles sa douleur. Elle ne lui appartient plus. C'est lui qui doit mettre les mots dessus.",pts:[{c:'g',b:'Comprendre la situation actuelle',t:" : 'Qu'est-ce que tu fais concrètement en ce moment pour changer ta situation ?' / 'Depuis combien de temps tu fais comme ça ?' / 'Qu'est-ce qui t'a amené à fonctionner de cette façon ?' → Écoute. Note mentalement. Miroir sur les réponses importantes."},{c:'g',b:'Révéler les fausses croyances',t:" : 'Qu'est-ce que tu as déjà mis en place jusqu'à présent ?' / 'Pourquoi tu penses que ça n'a pas fonctionné ?' / 'Qu'est-ce qui a manqué selon toi ?' Les réponses révèlent les croyances limitantes. 'J'ai pas eu le temps' = croyance sur les priorités. 'J'ai pas trouvé l'opportunité' = croyance sur sa propre agentivité. Ne les confronte pas — note-les pour plus tard."},{c:'g',b:'La responsabilisation',t:" : si le prospect est là aujourd'hui, c'est le résultat de décisions qu'il a prises — ou pas prises. Ne pas faire de choix est en soi une décision. La responsabilisation n'est pas de la culpabilisation — c'est de l'agentivité. Questions : 'Avec du recul, qu'est-ce que tu aurais pu faire différemment ?' / 'Qu'est-ce qui dépendait de toi dans cette situation ?' / 'Qu'est-ce qui t'a empêché de mettre ça en place plus tôt ?'"},{c:'g',b:'La règle des 5 pourquoi + mirroring',t:" : chaque réponse mérite soit une question de creusage, soit un miroir. 'J'ai pas le temps.' → Miroir : 'Pas le temps...' → Il développe → 'Qu'est-ce qui prend tout ton temps ?' → Miroir → 'Et si ça changeait dans 2 ans ?' La vraie information est toujours au 4e ou 5e niveau."}],ex:{l:'Questions calibrées pour aller plus loin',t:"'Qu'est-ce que tu veux dire par là ?' / 'Qu'est-ce qui provoque ça selon toi ?' / 'Pourquoi c'est important pour toi maintenant ?' / 'Peux-tu me donner un exemple concret ?' → Ces questions calibrées ouvrent sans pression — la réponse appartient toujours au prospect."},gold:null},
{n:'04',tc:'g',tag:'Phase 3 — 15-25 min',t:"Découverte — Le vrai why et la vraie douleur",i:"La vraie douleur n'est jamais financière. Elle est toujours identitaire ou relationnelle. L'argent est le symptôme — jamais la cause.\n\nLes 3 couches : surface ('je veux gagner plus') → cause ('parce que je suis bloqué dans mon emploi') → racine ('je n'ai pas le temps pour ma famille et ça me ronge'). La vraie douleur est toujours à la 3e couche.",pts:[{c:'g',b:'Creuser l\'impact émotionnel',t:" : 'Concrètement ça t'impacte comment au quotidien ?' / 'Comment tu te sens quand tu fais face à ça ?' / 'Et dans ta vie perso — ça a un impact aussi ?' Label émotionnel si il hésite : 'On dirait que c'est quelque chose qui pèse depuis un moment...' → Miroir sur ce qu'il dit ensuite."},{c:'g',b:'Le vrai why — niveau 2',t:" : 'Pourquoi c'est important pour toi maintenant ?' / 'Qu'est-ce que ça représenterait pour toi de réussir ça ?' / 'Si tu atteignais cet objectif, qu'est-ce qui changerait concrètement dans ta vie ?' Ce niveau active l'amygdale — pas le niveau surface."},{c:'g',b:'La question de la perte — la plus puissante de l\'appel',t:" : 'Qu'est-ce que tu ne vivrais plus si dans 12 mois rien n'a changé ?' → Silence minimum 10 secondes. C'est dans ce silence que la vraie réponse émerge. L'aversion à la perte est neurologiquement 2x plus puissante que la promesse de gain (Kahneman)."},{c:'g',b:'Douleurs identitaires vs relationnelles',t:" : Identitaires : 'Je ne veux pas être quelqu'un qui rate ses opportunités.' / 'Je veux prouver que je suis capable.' Relationnelles : être présent pour sa famille, ne plus dépendre de la validation d'un patron. Ces deux types touchent l'image que la personne a d'elle-même — les plus puissants."}],ex:{l:'Questions pour pousser la réflexion',t:"'Comment tu te sentirais si demain ce problème n'existait plus ?' / 'Qu'est-ce qui t'empêche de prendre les mesures nécessaires pour le régler ?' / 'En quoi ça t'a affecté concrètement ?' + Miroir sur chaque réponse importante."},gold:{l:'Reformulation clé',t:"'Qu'est-ce que tu pourrais gagner ?' → Remplace par : 'Qu'est-ce que tu perds à rester là où tu es ?' La douleur est l'émotion la plus puissante dans ce contexte. Sans elle, la décision n'aura pas lieu."}},
{n:'05',tc:'g',tag:'Phase 4 — 25-30 min',t:"Coût de l'inaction, momentum et validation",i:"Avant de présenter la solution, trois étapes dans cet ordre : faire verbaliser le coût de l'inaction, créer le momentum, valider la découverte. Ces trois étapes transforment la conversation en engagement.",pts:[{c:'g',b:'Le coût de l\'inaction — il doit le verbaliser lui-même',t:" : 'Qu'est-ce qui se passe si rien ne change ?' / 'Si on se projette dans 2, 5 ou 10 ans et que rien n'a changé — tu vois quoi ?' → Silence. Le laisser répondre. Ne jamais remplir le vide. Miroir sur ce qu'il dit."},{c:'g',b:'Le momentum — pourquoi maintenant',t:" : 'Qu'est-ce qui fait qu'aujourd'hui tu prends cet appel, et pas il y a 6 mois ?' / 'Qu'est-ce qui ferait que dans 6 mois tu regrettes de ne pas avoir avancé maintenant ?' Le prospect qui verbalise son propre momentum devient l'auteur de la décision."},{c:'g',b:'La validation avec ses mots exacts',t:" : 'Si j'ai bien compris, tu veux [ses mots], tu te sens bloqué par [ses mots], et ce que tu ne veux plus c'est [sa formulation de la douleur profonde]. Est-ce que je me trompe ?' → Il dit oui → Tu as son engagement."},{c:'g',b:'La projection future',t:" : 'Décris-moi à quoi ressemble ton quotidien si on résout ça ensemble.' / 'Dans 6 mois, quand tu regardes en arrière sur cette décision...' / 'C'est quoi la première personne que tu appelles le jour où t'atteins [objectif] ?' L'effet de dotation (Kahneman) : ce qu'on possède mentalement a plus de valeur."}],ex:{l:'Phrase de transition vers la prescription',t:"'Tu sais, quand tu m'as dit [reprend son problème avec ses mots] — et que tu ressens [reprend son émotion]... il semble qu'on ait mis le doigt sur ce que tu cherches vraiment. Est-ce que tu penses que ça pourrait être la solution pour toi ?'"},gold:null},
{n:'06',tc:'g',tag:'Phase 5a — 30-40 min',t:"La prescription — construire le pitch qui lui appartient",i:"La prescription n'est pas un pitch. Un pitch, tu le prépares à l'avance et tu le récites. Une prescription, tu la construis en temps réel à partir de ce que le prospect t'a dit. C'est ça la différence entre un vendeur et un closer.\n\nAvant d'annoncer quoi que ce soit, il y a une question clé à poser — la transition pré-pitch. Elle sert deux choses à la fois : collecter les dernières informations qui manquent, et faire en sorte que le prospect co-construise mentalement sa solution avant même que tu la présentes.",pts:[{c:'g',b:"La question de transition — pré-pitch",t:" : 'Si tu pouvais dessiner l\'accompagnement idéal — celui qui prendrait exactement en compte ce que tu viens de me dire, ce que tu as déjà essayé, ce qui n\'a pas fonctionné et ce qu\'il t\'a manqué — qu\'est-ce que tu mettrais dedans ?' → Silence. Laisse-le répondre. Ce qu\'il dit maintenant est l\'ossature de ton pitch. Tu ne fais que valider et structurer ce qu\'il vient de construire lui-même."},{c:'g',b:"Pourquoi cette question change tout",t:" : neurochimiquement, quand le prospect décrit lui-même la solution idéale, son cerveau active l\'effet de dotation (Kahneman) — il commence à se projeter dans quelque chose qui lui appartient. Tu n\'as plus à le convaincre d\'acheter quelque chose d\'externe. Tu lui montres que ce qu\'il a décrit, c\'est exactement ce que tu proposes."},{c:'g',b:"Construire le pitch personnalisé",t:" : ton pitch se construit à partir de 4 éléments qu\'il t\'a donnés pendant l\'appel. 1. Ce qu\'il a déjà essayé — tu montres que tu évites les mêmes erreurs. 2. Ce qui n\'a pas fonctionné — tu expliques pourquoi ton approche est différente. 3. Ce qu\'il lui a manqué — tu montres que tu l\'apportes. 4. Ce qu\'il vient de dire sur l\'idéal — tu lui montres que tu proposes exactement ça. Ce n\'est pas un pitch générique sur ton programme. C\'est une prescription taillée pour lui."},{c:'g',b:"Court, dialogué, pas de partage d\'écran",t:" : le pitch doit durer 5 à 7 minutes maximum. Pas plus. Pourquoi ? Parce qu\'au-delà, tu perds la connexion — le prospect passe en mode réception passive. Si tu partages un écran, il lit à la place d\'écouter. Le pitch se fait en dialogue, pas en monologue. Après chaque pilier : 'Tu vois ce que je veux dire ?' / 'Ça parle à ta situation ?' Ces mini-validations maintiennent la connexion et te signalent si tu es sur la bonne voie."},{c:'g',b:"Valider le véhicule avant d\'annoncer le prix",t:" : avant le prix, une dernière validation obligatoire. 'Est-ce que tu penses que ce qu\'on vient de voir peut t\'emmener à [ses objectifs] ? Pourquoi ?' → Attends un oui verbal clair. Pas un 'ouais pourquoi pas' — un oui engagé. Si tu n\'as pas ce oui, tu ne continues pas. Tu creuses ce qui bloque."}],ex:{l:"Script de transition pré-pitch",t:"'Avant de te présenter ce qu\'on propose — j\'ai une question. Si tu pouvais dessiner l\'accompagnement parfait pour toi, celui qui prendrait en compte tout ce que tu viens de me dire, qu\'est-ce que tu mettrais dedans ?' → Écoute → Note → Puis : 'Ce que je vais te montrer, c\'est exactement ce que tu viens de décrire.'"},gold:{l:"La règle du pitch",t:"Un bon pitch ne dure pas longtemps. Il est précis, personnalisé, et dialogué. Le prospect doit parler autant que toi pendant la présentation. Si tu parles seul pendant 15 minutes, tu as perdu la dynamique — et probablement la vente."}},
{n:'07',tc:'g',tag:'Phase 5b — 40-55 min',t:"Annonce du prix, objections et traitement",i:"L\'annonce du prix n\'est pas un moment dramatique. C\'est un détail logistique après une décision déjà prise émotionnellement — si la découverte a bien été faite et le véhicule validé.\n\nMais à partir de 1000-2000€ et au-delà, l\'amygdale s\'active automatiquement. Le prospect bascule dans sa zone de peur. Et là, les objections sortent — pas parce qu\'il ne veut pas, mais parce que son cerveau cherche une sortie.",pts:[{c:'g',b:"Annoncer le prix — simple et calme",t:" : 'L\'investissement pour ça c\'est [X].' Silence. Ne justifie pas. Ne sur-explique pas. Celui qui parle en premier après l\'annonce du prix perd."},{c:'g',b:"La première objection — ne pas y répondre",t:" : c\'est le piège classique. Une objection sort immédiatement après le prix — 'c\'est beaucoup', 'j\'avais pas prévu ça', 'je dois réfléchir'. Ton premier réflexe va être de répondre. Ne le fais pas. La première objection qui sort après le prix n\'est presque jamais la vraie. C\'est une réaction automatique de l\'amygdale — une demande de sécurité déguisée en résistance. Si tu réponds directement, tu entres dans une négociation qui n\'a pas lieu d\'être."},{c:'g',b:"Revalider le véhicule — avant tout",t:" : avant de traiter quoi que ce soit, une seule question. 'En toute transparence — est-ce que tu te sens aujourd\'hui face aux bonnes personnes pour atteindre tes objectifs, une bonne fois pour toutes ?' → Silence. Sa réponse détermine tout ce qui suit."},{c:'g',b:"Si le véhicule est validé à 100%",t:" : 'Parfait. Alors là je t\'entends bien — qu\'est-ce qui t\'empêche d\'avancer maintenant ?' → Silence → Miroir sur sa réponse → La vraie objection émerge. Dans la plupart des cas, si la découverte a été bien faite, il n\'y a qu\'une seule vraie objection. Et c\'est souvent le budget."},{c:'g',b:"Si c\'est un vrai problème de budget — entrer dans les finances avec permission",t:" : 'Tu m\'as dit que tu étais aligné à 100% sur la solution. Est-ce que je peux te poser une question sur le côté financier ?' → Il dit oui → 'Qu\'est-ce qui se passe concrètement avec le budget — tu n\'as pas les fonds du tout, ou c\'est une question de timing ou de montant ?' → Écoute. Selon la réponse, tu proposes. Mais la règle absolue : ne jamais mettre quelqu\'un dans le rouge. L\'objectif c\'est un inconfort positif — assez d\'engagement pour qu\'il soit sérieux, pas assez pour qu\'il soit en stress financier."},{c:'g',b:"L\'inconfort positif vs la boule au pied",t:" : un prospect qui s\'étire un peu financièrement est plus engagé — il a un intérêt direct à ce que ça marche. Mais un prospect qui fait tapis et n\'a plus rien derrière va être en down, ne sera plus à 100%, et risque d\'abandonner dans 2 mois. Tu ne vends pas pour le fermer — tu vends pour qu\'il obtienne ses résultats. Si ça ne peut pas fonctionner financièrement, dis-le lui."}],ex:{l:"Script post-prix",t:"[Objection sort] → Silence 3s → 'En toute transparence — est-ce que tu te sens aujourd\'hui face aux bonnes personnes pour atteindre tes objectifs, une bonne fois pour toutes ?' → [Il dit oui] → 'Alors qu\'est-ce qui t\'empêche d\'avancer maintenant ?' → Miroir → Écoute."},gold:{l:"Les 5 règles du closer",t:"1. Détachement total — tu diagnostiques, tu ne supplies pas. 2. Silence = or — après chaque question calibrée, tu attends. 3. Ses mots + mirroring — utilise exactement ce qu\'il a dit. 4. Valide le véhicule avant TOUT. 5. Jamais couper la poire en deux."}},
