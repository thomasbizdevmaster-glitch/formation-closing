<body>
<div id="root"></div>
<script>
var ADMIN='THOMAS_ADMIN';
var CU=null,CM=0,CT='cours',PROG={};
var DEF_ST=[{name:'Élève',code:'CLOSING25',initials:'CL'}];
function lProg(c){try{var s=localStorage.getItem('p_'+c);return s?JSON.parse(s):{}}catch(e){return{}}}
function sProg(c,d){try{localStorage.setItem('p_'+c,JSON.stringify(d))}catch(e){}}
function lSt(){try{var s=localStorage.getItem('stu_v2');return s?JSON.parse(s):DEF_ST}catch(e){return DEF_ST}}
function sSt(l){try{localStorage.setItem('stu_v2',JSON.stringify(l))}catch(e){}}
function key(m,c){return m+'_'+c}
function login(){
  var code=document.getElementById('ci').value.trim().toUpperCase();
  if(!code){document.getElementById('cerr').textContent="Entre ton code d'accès.";return}
  if(code===ADMIN){CU={name:'Admin',code:ADMIN,isAdmin:true};PROG={};renderApp();return}
  var st=lSt(),s=st.find(function(x){return x.code===code});
  if(!s){document.getElementById('cerr').textContent='Code incorrect. Verifie avec ton coach.';return}
  CU=Object.assign({},s);PROG=lProg(code);renderApp();
}
function logout(){CU=null;PROG={};CM=0;CT='cours';renderLogin()}
function tick(m,c,e){
  if(e)e.stopPropagation();
  var k=key(m,c);PROG[k]=!PROG[k];sProg(CU.code,PROG);
  var el=document.getElementById('tk-'+m+'-'+c);
  if(el){el.classList.toggle('done',PROG[k]);el.innerHTML=PROG[k]?'&#10003;':'';}
  refreshBars();
}
function tickCk(k){
  PROG[k]=!PROG[k];sProg(CU.code,PROG);
  document.querySelectorAll('[data-ck="'+k+'"]').forEach(function(el){
    el.classList.toggle('done',!!PROG[k]);
    var b=el.querySelector('.ckb');if(b)b.innerHTML=PROG[k]?'&#10003;':'';
  });
}
function toggleCh(m,c){
  var b=document.getElementById('bd-'+m+'-'+c),h=document.getElementById('hd-'+m+'-'+c),a=document.getElementById('ar-'+m+'-'+c);
  if(!b)return;var o=b.classList.contains('open');
  b.classList.toggle('open',!o);if(h)h.classList.toggle('open',!o);if(a)a.classList.toggle('open',!o);
}
function toggleA(i){
  var b=document.getElementById('ab-'+i),a=document.getElementById('aa-'+i);
  if(!b)return;var o=b.classList.contains('op');b.classList.toggle('op',!o);if(a)a.classList.toggle('op',!o);
}
var MODS={
1:{cat:'Fondations',title:'Mindset & <span class="ag">Identite</span>',desc:"Le closing est un metier de performance. Comme un sportif de haut niveau, ce sont la discipline, la constance et les répétitions qui font la difference — pas le talent.",
chs:[
{n:'00',tc:'g',tag:'Intro — Le metier de Closer',t:"Pourquoi le Closing est un sport de haut niveau",i:"Avant de rentrer dans la technique, je veux que tu comprennes quelque chose de fondamental sur ce metier. Le closing, c'est un metier de performance. Exactement comme un sport. Et comme dans n'importe quel sport, ce n'est pas le talent brut qui fait les résultats — c'est la discipline, la constance, et la capacite a répéter les bons gestes encore et encore, même quand ça ne marche pas, même quand tu as une mauvaise serie, même quand tu doutes.\n\nUn boxeur ne devient pas champion en lisant des livres sur la boxe. Il devient champion en montant sur le ring, en encaissant des coups, en analysant ses echecs, et en revenant le lendemain. C'est exactement ce que tu vas faire.\n\nLe closer débutant cherche la bonne formule, le script parfait, la technique qui va tout changer. Le closer qui performe comprend que ce n'est pas ce qu'il dit qui fait la difference — c'est l'état dans lequel il est quand il le dit, la constance avec laquelle il applique les principes, et la profondeur avec laquelle il comprend son prospect.\n\nCe que ce programme va te donner, c'est la méthode. Mais la méthode sans répétition, c'est de la theorie. Et la theorie ne paie pas de commission. Ce qui paie, c'est d'aller sur le terrain, d'appliquer, de se tromper, de debriefer, et de recommencer. Chaque appel est une session d'entrainement. Chaque objection est une répétition. Chaque non est une donnee.",pts:[{c:'g',b:'La discipline avant la technique',t:" : un closer qui applique une méthode correcte a 80% chaque jour bat un closer qui applique une méthode parfaite une fois sur trois. La régularité bat le genie."},{c:'g',b:'La répétition creatrice de sens',t:" : les 50 premiers appels, tu appliques. Les 100 suivants, tu comprends pourquoi ça marche. A partir de 200 appels, tu commences a sentir les conversations. C'est la que tout change."},{c:'g',b:'Le débrief comme outil de progression',t:" : après chaque appel, 10 minutes. Qu'est-ce qui a bien marche ? Qu'est-ce que j'aurais pu creuser ? Quel était mon état interne ? Sans ce débrief, tu repetes les memes erreurs."}],ex:{l:'La regle des 100 appels',t:"Tes 100 premiers appels, tu les rates. C'est normal. C'est prevu. C'est nécessaire. Ne cherche pas a les réussir — cherche a apprendre quelque chose sur chacun. Le closer qui accepte ça avance 3 fois plus vite que celui qui veut performer des le premier jour."},gold:{l:'Ce que ce programme exige de toi',t:"Une chose. Une seule. Que tu appliques. Pas que tu comprennes — ça c'est là partie facile. Que tu appliques, que tu te trompes, que tu notes, et que tu recommences. C'est le seul chemin vers la performance."}},
{n:'01',tc:'g',tag:'Definition',t:"Ce qu'est vraiment le closing",i:"Le closing, ce n'est pas de la vente. Et comprendre cette distinction va changer complètement ta façon d'aborder chaque appel.\n\nUn vendeur cherche a convaincre. Son énergie est focalisee sur comment amener l'autre a dire oui. Il pousse. Il présente. Il argumente. Et le prospect le sent — et se ferme.\n\nUn closer cherche a comprendre. Son énergie est focalisee sur le prospect — sur ce qu'il vit, ce qu'il ressent, ce qu'il veut vraiment. Et paradoxalement, c'est cette approche qui crée le oui — parce que le prospect a l'impression d'avoir décidé tout seul. Parce que c'est exactement ce qui s'est passe.\n\nPense a un médecin. Quand tu arrives dans son cabinet, il ne te vend pas une ordonnance. Il te pose des questions. Il t'examine. Il écoute. Et seulement une fois qu'il a compris ce dont tu as besoin, il prescrit. Si l'ordonnance n'est pas nécessaire, il ne la prescrit pas — même si çà lui couterait une consultation. C'est ça l'integrite du diagnostic. C'est exactement cette posture que tu dois adopter sur chaque appel.",pts:[{c:'g',b:'Diagnostiquer avant de prescrire',t:" : tu ne parles jamais de ton programme avant d'avoir compris en profondeur la situation du prospect. Jamais. Meme si tu sens qu'il est interesse. Meme si tu sens que ça matche. Tu continues a creuser."},{c:'g',b:'Detachement total du résultat',t:" : la vente se sent quand tu en as besoin. Quand tu as besoin du oui, tu parles trop vite, tu remplis les silences, tu sur-expliques. Et le prospect détecte ça avant que tu aies dit un mot — son amygdale analyse ton état en millisecondes."},{c:'g',b:'Servir d abord',t:" : ton seul objectif sur cet appel, c'est d'aider cette personne a prendre la meilleure décision pour elle. Pas pour toi. Pour elle. Meme si la meilleure décision est de ne pas travailler avec toi."}],ex:{l:'Analogie médecin',t:"Imagine un médecin qui, des que tu pousses la porte, te dit : 'Vous avez besoin d'une operation. Ca coute 5000 euros.' Sans t'examiner. Sans t'écouter. Tu t'en irais en courant — et tu aurais raison. C'est pourtant exactement ce que font la plupart des closers débutants : ils pitchent avant de comprendre. Ne sois pas ce médecin-la."},gold:{l:'Les 3 regles absolues',t:"1. Tu es la pour servir le prospect dans son meilleur interet. 2. Les meilleures décisions pour lui sont généralement en dehors de sa zone de confort. 3. Ton prospect va se battre corps et ame pour rester dans cette zone de confort. → Ton job : l'aider a voir ce que lui-même ne voit pas encore."}},
{n:'02',tc:'g',tag:'Mindset',t:"L'identité du closer — force vs besoin",i:"80% du travail du closer se passe avant de dire un mot. C'est l'état interne. C'est l'endroit depuis lequel tu parles.\n\nQuand tu arrives sur un appel en mode besoin — tu as besoin de cette commission, tu as besoin qu'il dise oui, tu as besoin d'être aime et validé — tout ce que tu dis sonne faux. Pas parce que tu mens. Parce que ton cerveau gère sa propre douleur en même temps qu'il essaie de gérer celle du prospect. Et ça, le prospect le sent avant que tu aies dit quoi que ce soit.\n\nLa neurochimie du mode besoin : cortisol élève + testosterone basse = hierarchie sociale inversee. En termes simples : celui qui a besoin perd le pouvoir. Le prospect détecte inconsciemment que tu es en position basse — et il ne fait pas confiance aux gens en position basse pour prendre de bonnes décisions.\n\nEn revanche, quand tu arrives en puissance calme — detache du résultat, focalise uniquement sur la transformation du prospect — quelque chose de different se passe. Tu peux poser les vraies questions. Tu peux tenir les silences. Tu peux accueillir la resistance sans te defendre. Et le prospect, inconsciemment, te fait confiance.\n\nCette posture ne s'improvise pas. Elle se travaille avant chaque appel, elle se construit avec le temps, et elle ne sera jamais acquise une fois pour toutes. C'est comme un muscle — tu dois l'entretenir.",pts:[{c:'g',b:'Les dettes émotionnelles qui tuent la performance',t:" : besoin d'être aime/validé = cherche a plaire plutot qu'a être utile. Peur du rejet = surexplique, evite les silences, cherche des signaux de validation. Besoin de la commission = mode besoin activé, détecte immédiatement par l'amygdale du prospect."},{c:'g',b:'Puissance calme — ce que ça ressemble concrètement',t:" : tu poses une question difficile et tu attends. Silence de 15 secondes. Tu ne le remplis pas. Le prospect finit par parler. Tu reponds lentement, sans urgence. Tu accueilles une objection comme une information, pas comme une attaque. Tu dis non si le programme ne correspond pas."},{c:'g',b:'HeartMath — la science derriere',t:" : le coeur envoie ses signaux au cerveau plus vite que l'inverse. Ton état interieur précède ta parole. Le prospect ressent ton état avant que tu aies dit un mot — pas parce qu'il est intuitif, mais parce que son système nerveux lit le tien."}],ex:{l:'Test de congruence',t:"Avant ton prochain appel, pose-toi cette question : si je savais avec certitude que cette personne va dire non a la fin — est-ce que je ferais quand même cet appel avec la même qualité d'écoute et de présence ? Si la réponse est non, tu es en mode besoin. Travaille ça avant de décrocher."},gold:{l:'Question fondamentale a te poser régulièrement',t:"'Si j'enlevais la commission de l'equation — est-ce que je ferais encore ce travail ?' Si la réponse est oui, tu travailles depuis un endroit sain. Si c'est non ou hesitant, c'est un signal important a prendre au serieux."}},
{n:'03',tc:'g',tag:'Protocole',t:"Le rituel pre-appel — les 3 étapes obligatoires",i:"La préparation d'un appel de closing ne commence pas quand tu decroches. Elle commence 10 a 15 minutes avant. Ce protocole n'est pas optionnel — c'est la difference entre un appel ou tu es vraiment present et un appel ou tu geres ta propre anxiete pendant que le prospect parle.\n\nAmy Cuddy (Harvard) a démontré que la posture haute pendant 2 minutes avant une situation de performance diminue significativement le cortisol et augmente la testosterone. Tu n'as pas besoin d'attendre d'être confiant pour performer — tu performes pour devenir confiant.\n\nLe protocole en 3 étapes, dans cet ordre précis :",pts:[{c:'g',b:'1. Energie',t:" : recharger sa batterie physique. Coherence cardiaque (4 secondes inspire, 6 secondes expire, pendant 3 minutes). Debout, dos droit. Quelques mouvements si nécessaire. L'objectif : être dans son corps, pas dans sa tete."},{c:'g',b:'2. Intention',t:" : définir clairement pourquoi tu es la. 'Je viens pour diagnostiquer et servir, pas pour vendre.' Dit à voix haute. Pas dans ta tete — à voix haute. Ca ancre l'intention dans le corps. Puis : 'Mon seul objectif aujourd'hui est de comprendre cette personne mieux qu'elle ne se comprend elle-même.'"},{c:'g',b:'3. Adaptation',t:" : lire le profil du prospect avant l'appel. Ce que tu sais de lui, son contexte, ses enjeux probables. Identifier les angles possibles. Puis : lacher complètement le résultat. Ce qui se passe sur cet appel n'est pas une mesure de ta valeur."}],ex:{l:'Le mantra pre-appel',t:"Debout, dos droit. 'Mon seul objectif aujourd'hui : comprendre cette personne mieux qu'elle ne se comprend elle-même.' x 3. Puis silence de 30 secondes. Tu decroches seulement quand tu es vraiment la."},gold:null},
{n:'04',tc:'g',tag:'Analyse',t:"Les 3 erreurs fatales — et pourquoi elles arrivent",i:"Ces erreurs ne viennent pas d'un manque de technique. Elles viennent d'un mauvais état interne. Et c'est pour ça qu'elles sont si difficiles a corriger — ce n'est pas ce que tu fais qui est en cause, c'est l'endroit depuis lequel tu le fais.\n\nChaque erreur est un signal. Si tu te retrouves a faire l'une de ces trois choses, c'est que ton système nerveux est passe en mode survie. La bonne nouvelle : une fois que tu sais reconnaître ces signaux, tu peux te recalibrer en temps reel.",pts:[{c:'g',b:'Erreur 1 — Tuer le silence',t:" : le silence après une question importante, c'est le prospect qui reflechit. C'est exactement ce que tu veux. Quand tu le combles, tu interromps son processus de réflexion, tu envoies un signal de malaise, et tu perds la position haute. La regle : après chaque question importante, attends. Meme si c'est 20 secondes. Meme si c'est inconfortable. C'est dans ce silence que les vraies réponses emergent."},{c:'g',b:'Erreur 2 — Parler plus de 40% du temps',t:" : si tu parles plus que ton prospect, tu vends. Tu ne closes pas. Le ratio ideal : 30% toi, 70% lui. Sur tes prochains appels, compte mentalement. Des que tu te surprends a faire de longs monologues, c'est que tu n'as pas assez creuse en découverte — et tu compenses avec du pitch."},{c:'g',b:'Erreur 3 — Repondre immédiatement aux objections',t:" : répondre sans pause, c'est le pattern du closer sous pression. L'amygdale du prospect le lit comme : 'il a peur, il se defend.' 2 à 3 secondes de pause avant de répondre a une objection montrent que tu accueilles — pas que tu te defends. Cette pause change complètement la dynamique de la conversation."}],ex:{l:'Cas concret — les 3 erreurs en sequence',t:"Prospect : 'Je sais pas, j'ai besoin d'y réfléchir.' Debutant (erreur 1+2+3) : repond immédiatement, explique pendant 3 minutes pourquoi c'est une bonne décision, remplit tous les silences. Resultat : le prospect se ferme. Closer : 3 secondes de silence, puis : 'Reflechir a quoi exactement ?' Silence. Le prospect parle. Tu ecoutes. La vraie objection emerge."},gold:null}
]},
2:{cat:'Neurosciences',title:'Neurosciences & <span class="ag">Decision</span>',desc:"Le cerveau émotionnel décide en premier — toujours. 9 piliers. Le PDF de reference est disponible en bas de ce module.",
chs:[
{n:'01',tc:'g',tag:'Pilier 1 — Cerveau émotionnel',t:"L'amygdale décide en premier",i:"Imagine que ton cerveau est une maison à deux étages. Au rez-de-chaussée, un gardien — rapide, instinctif, émotionnel. À l'étage, un analyste — lent, logique, rationnel. Le gardien décide si la porte s'ouvre ou se ferme. L'analyste arrive après — uniquement pour justifier. | <b>L'amygdale — le gardien</b> Petite structure au centre du cerveau, de la taille d'une amande. Son seul rôle : détecter en millisecondes si la situation est une menace ou une opportunité. Elle ne réfléchit pas — elle réagit. Sur un appel, elle évalue dès les premières secondes : 'Cette personne est-elle en position de force ou de besoin ?' Si elle tranche menace, aucun argument ne passe. | <b>Le cortex préfrontal — l'analyste</b> La partie avant du cerveau, juste derrière le front. Logique, analyse, prise de recul. Mais il entre en jeu APRÈS l'amygdale. Antonio Damasio l'a démontré cliniquement : des patients avec des lésions du cortex préfrontal analysaient parfaitement une situation mais étaient incapables de décider. Sans émotion, pas de décision. La logique ne convainc pas — elle valide. | <b>Le cortisol — ce que ton corps trahit</b> Le cortisol c'est l'hormone du stress. Quand tu arrives sur un appel avec un besoin de commission ou une peur du rejet, ton corps en libère. Ta voix change légèrement, tes silences sont moins stables, ta posture se referme. Ton prospect ne l'analyse pas consciemment — mais l'amygdale le capte en temps réel. Un closer en mode besoin perd avant d'avoir parlé. | <b>Système 1 et Système 2 — Kahneman</b> Daniel Kahneman, Prix Nobel : Système 1 = rapide, automatique, émotionnel (l'amygdale). Système 2 = lent, analytique, rationnel (le cortex préfrontal). Le Système 1 décide. Le Système 2 justifie. Quand tu argumentes longuement, tu t'adresses au mauvais système. La décision est déjà prise.",pts:[{c:'g',b:'Application directe',t:"'Qu\'est-ce que tu ne vivrais plus si dans 6 mois rien n\'a changé ?' → Active l\'amygdale sur la perte. Kahneman l\'a mesuré : perdre fait 2x plus mal que gagner fait du bien. La décision est prise bien avant la présentation de l\'offre."}],ex:{l:'Application directe',t:"'Qu'est-ce que tu ne vivrais plus si dans 6 mois rien n'a change ?' -> Active l'amygdale sur la perte. 10x plus puissant qu'une promesse de gain. La présentation de l'offre ne declenche pas la décision — elle la confirme ou l'infirme."},gold:{l:'Bannir absolument',t:"'Imagine ce que tu peux gagner.' -> Remplace par : 'Qu'est-ce que ça te coute de rester la ou tu es ?' (Kahneman/Tversky). Le prospect a déjà décidé avant que tu ne présentés ton offre. Ton role : créer les conditions emotionnelles qui permettent a son cerveau de dire oui."}},
{n:'02',tc:'g',tag:'Pilier 2 — Dettes emotionnelles',t:"Les dettes émotionnelles du closer",i:"<b>Ce qui se passe dans ton cerveau quand tu as besoin de closer</b> Quand tu arrives sur un appel avec une pression — besoin de commission, peur du rejet, attachement au résultat — ton amygdale s'active. Elle libère du cortisol (hormone du stress) et réduit l'activité du cortex préfrontal. Résultat concret : tu écoutes moins bien, tu remplis les silences par nervosité, tu sur-expliques face aux objections. | <b>La neurochimie de la hiérarchie sociale</b> Le rapport testostérone/cortisol détermine la posture perçue. Ratio élevé (testostérone haute, cortisol bas) = posture haute, voix stable, tolérance au silence. Ratio faible (cortisol dominant) = posture basse, voix qui monte, malaise face aux objections. Ce ratio est lisible — inconsciemment — par l'amygdale de ton prospect en quelques secondes. | Les dettes émotionnelles — tout ce qui n'est pas encore réglé en soi — coûtent cher en performance. Quand tes dettes sont actives, ton cerveau gère sa propre douleur pendant que tu es censé gérer celle du prospect.",pts:[{c:'g',b:'Besoin d être validé',t:" : cherche a être AIME plutot qu'UTILE — perd sa posture immédiatement."},{c:'g',b:'Peur de l echec / du rejet',t:" : surexplique, evite les silences, cherche des signaux de validation constamment."},{c:'g',b:'Besoin de la commission',t:" : mode besoin activé — détecte immédiatement par l'amygdale du prospect. Neurochimie : cortisol élève + testosterone basse = hierarchie sociale inversee. Celui qui a besoin perd le pouvoir."}],ex:{l:'Ce que ça demande concrètement',t:"Identifier ses propres declencheurs émotionnels avant chaque appel. Travailler ses blessures passees — la connaissance de soi est un outil de performance. Coherence cardiaque entre les appels pour recharger sa batterie. Arriver sur chaque appel dans l'ordre : énergie -> intention -> adaptation."},gold:null},
{n:'03',tc:'g',tag:'Pilier 3 — Cadre cognitif',t:"Le cadre cognitif du prospect",i:"Ton prospect n'arrive jamais vierge. Il arrive avec un historique complet : achats regrettes, promesses non tenues, closers déjà croises. Tout ça s'est encode sous forme de schémas cognitifs automatiques — son cadre cognitif. Ce cadre filtre tout ce que tu vas dire avant même que tu le dises. Quand tu attaques une croyance centrale, le cerveau reagit exactement comme s'il subissait une douleur physique — la croyance se renforce biologiquement. Ton prospect arrive avec une remorque. Ton premier travail : comprendre ce qu'elle contient.",pts:[{c:'g',b:'3 questions de diagnostic (dans cet ordre)',t:" : 1. 'Qu'est-ce que tu as déjà essaye pour résoudre ça ?' -> revele le schéma dominant. 2. 'Qu'est-ce qui fait que jusque-la tu n'as pas encore regle ça ?' -> revele la croyance de resistance centrale. 3. 'Comment est-ce que tu saurais qu'une décision est la bonne pour toi ?' -> revele le critere de coherence."},{c:'g',b:'Erreur 1 — Contredire',t:" : 'Notre programme est different...' -> activé la vigilance neurologique, mode protection, la croyance se renforce."},{c:'g',b:'Erreur 2 — Surexpliquer',t:" : noyer sous les arguments -> sature le cortex préfrontal, consolide le cadre que tu voulais deplacer."}],ex:{l:'Croyances frequentes derriere les objections',t:"'Je n'ai pas le temps' = croyance sur ses priorites ou peur de l'echec. 'C'est trop cher' = rapport a la valeur de soi. 'J'ai besoin d'en parler a mon partenaire' = peur de la responsabilite personnelle. 'Je vais y réfléchir' = manque de confiance ou peur de l'engagement. 'J'ai déjà essaye des trucs similaires' = blessure passee non resolue."},gold:{l:'Question d anomalie',t:"'Qu'est-ce qui t'a amene a accepter cet appel aujourd'hui, alors que tu aurais pu decliner ?' -> Le prospect accede a là partie de lui qui contredit son propre filtre. La flamme subsiste toujours."}},
{n:'04',tc:'g',tag:'Pilier 4 — Aversion a la perte',t:"Aversion a la perte & urgence authentique",i:"Mise en lumiere par Kahneman et Tversky (Prix Nobel 2002). L'aversion a la perte est l'un des mécanismes neurologiques les plus puissants. Perdre 50 000 fait deux fois plus mal que gagner 50 000 fait du bien. Ratio stable : perdre 1000 = douleur equivalente a ne pas gagner 2000 a 2500. C'est précisément l'aversion a la perte qui crée l'urgence authentique — pas les bonus, pas les deadlines artificielles.",pts:[{c:'g',b:"Cout de l'inaction",t:" : 'Si dans 6 mois tu n'as pas change ça, que t'aura-t-il coute en temps, argent, opportunités ?'"},{c:'g',b:'La fenetre qui se ferme',t:" : 'Quand est-ce que le moment sera meilleur que maintenant ?'"},{c:'g',b:'Projection dans le regret',t:" : 'Dans 1 an, qu'est-ce que tu veux te dire sur ce que tu as décidé aujourd'hui ?'"}],ex:null,gold:{l:'Principe fondamental',t:"Ne lui vends pas ce qu'il va gagner. Montre-lui ce qu'il perd chaque jour qu'il attend. Gain 1000 = ressenti +10. Perte 1000 = ressenti -20 a -25. Signer un programme a 3000 = excitation moderee. Rater l'opportunité a 3000 = regret intense."}},
{n:'05',tc:'g',tag:'Pilier 5 — Travailler avec le cadre',t:"Travailler avec le cadre — les 3 étapes",i:"Une fois le cadre cognitif lu, la regle est simple : ne jamais attaquer la croyance frontalement. Entrer dans le cadre d'abord — puis le deplacer. Methode en 3 étapes, toujours dans cet ordre précis.",pts:[{c:'g',b:'1. Valider l expérience',t:" : accueillir le filtre sans le combattre. Formules : 'Tu as potentiellement...' / 'J'imagine que...' / 'Qu'est-ce qui te fait dire ça ?' L'amygdale baisse la garde. Valider n'est pas être d'accord — c'est montrer que tu comprends."},{c:'g',b:'2. Introduire l anomalie',t:" : introduire une information qui ne rentre pas dans le cadre. Creer un doute, une incoherence. Le cerveau va chercher comment integrer cette incoherence : c'est le début du deplacement."},{c:'g',b:'3. Proposer un nouveau schéma par le comportement',t:" : ne pas dire 'je suis different'. Le montrer — par ta posture, tes silences, tes questions precises, ton détachement du résultat. Posture de médecin : tu diagnostiques, tu ne suppliques pas."}],ex:{l:'Ce que ça donne en pratique',t:"Des questions spécifiques creent une micro-surprise qui ouvre le prospect plutot que d'activer sa méfiance. Le cerveau met a jour son schéma base sur ce qu'il voit, pas sur ce qu'on lui dit. L'état d'ouverture génère est obligatoire pour créer l'urgence."},gold:null},
{n:'06',tc:'g',tag:'Pilier 6 — 12 Variables',t:"Les 12 variables que le prospect évalue",i:"Le cerveau du prospect recueille des données sur 12 variables (vocales, comportementales, structurelles) pour construire son jugement — et décider si tu es en position de force ou de besoin. Ces signaux sont traités par le Système 1 : inconsciemment et instantanément. Les 3 variables d'ancrage prioritaires : Silence · Cadence et tonalité · Détachement du résultat.",pts:[{c:'g',b:'1. Cadence vocale',t:" : voix lente et posée = système parasympathique activé, cortisol réduit chez le prospect. Voix rapide et tendue = signal d'alerte. Gérer ton rythme tout au long de l'appel — surtout dans les moments de tension."},{c:'g',b:'2. Gestion du silence',t:" : le silence indique qui est le plus à l'aise. Combler le silence = signal de malaise. Après une question difficile : le silence génère une pression interne chez le prospect lui-même — laisse-la travailler."},{c:'g',b:'3. Intonation en fin de phrase',t:" : une affirmation qui sonne comme une question (intonation montante) = insécurité perçue. Une intonation descendante en fin d'affirmation = marqueur de posture haute. Travaille ce point sur tes enregistrements."},{c:'g',b:'4. Vitesse de réponse aux objections',t:" : répondre immédiatement = tu te défends. 2 à 3 secondes de pause avant de répondre = tu accueilles. Cette pause seule change la perception du prospect sur ta posture."},{c:'g',b:'5. Vocabulaire utilisé',t:" : les mots choisis révèlent l'état interne. Trop de qualificatifs excessifs = sur-compensation. Vocabulaire neutre et factuel = confiance naturelle. Utilise ses mots à lui, pas les tiens."},{c:'g',b:'6. Formulation des questions',t:" : questions ouvertes = curiosité sincère et posture haute. Questions fermées répétées = interrogatoire ou anxiété. La qualité de tes questions révèle la qualité de ta présence."},{c:'g',b:'7. Gestion des interruptions',t:" : couper le prospect = impatience ou anxiété. Laisser les silences sans intervenir = maîtrise. Quand il s'arrête, attends encore 2 secondes avant de parler."},{c:'g',b:'8. Réactivité aux signaux émotionnels',t:" : un closer en mode besoin ne détecte pas les signaux émotionnels — il est focalisé sur son script. Un closer en puissance calme entend ce qui est dit ET ce qui n'est pas dit. Le non-dit est souvent plus important."},{c:'g',b:'9. Posture physique (appels vidéo)',t:" : dos droit, regard caméra, environnement neutre = sérieux et présence. Penché en avant = anxiété ou désir de convaincre. La posture physique impacte directement la neurochimie : assis droit = plus de testostérone, moins de cortisol."},{c:'g',b:'10. Cohérence verbal et non-verbal',t:" : dire 'je suis totalement détaché du résultat' avec une voix qui tremble = incohérence détectée immédiatement. Le cerveau du prospect compare en permanence ce que tu dis et comment tu le dis."},{c:'g',b:'11. Gestion des moments de pression',t:" : quand le prospect dit quelque chose d'inconfortable — ta réaction dans les 3 premières secondes dit tout. Agitation = besoin. Calme = force."},{c:'g',b:'12. Congruence globale — la variable méta',t:" : le cerveau est spécialisé pour détecter l'incohérence entre ce qu'une personne dit et ce qu'elle fait. Un état interne instable annule les 11 autres variables. La congruence vient de l'intérieur — elle ne se joue pas."}],ex:{l:"Grille d'auto-confrontation à faire sur chaque appel",t:"Quel était mon état interne avant l'appel ? Quel schéma cognitif actif j'ai détecté dans les 3 premières minutes ? À quel moment ai-je involontairement contredit son cadre ? Quelle anomalie aurait pu perturber le schéma ? Sur quelle variable était ma plus grande lacune ? Quelle était la 'petite flamme' du prospect ?"},gold:null},
{n:'07',tc:'g',tag:'Pilier 7 — Posture & état interne',t:"Posture, leadership & état interne",i:"L'état interne represente 80% du travail du closer. C'est la premiere chose que le prospect va lire — et elle ne peut pas être cachee. La bonne nouvelle : la posture peut être travaillée. La mauvaise : elle n'est jamais acquise une fois pour toutes. L'intention n'est pas une technique — c'est une posture profonde qui se ressent. Ton focus avant l'appel décide lequel tu seras.",pts:[{c:'g',b:'Closer en mode besoin',t:" : focalise commission, ressent la pression, surexplique face a la resistance, recherche des signaux de validation, remplit les silences par nervosite, se justifie quand attaque."},{c:'g',b:'Closer en puissance calme',t:" : focalise transformation, detache du résultat — présence totale, accueille la resistance comme une donnee, arrive avec neutralite : 'Je viens pour toi, pas pour moi'."},{c:'g',b:'Protocole pre-appel (dans cet ordre)',t:" : 1. Energie — coherence cardiaque, respiration, mouvement. 2. Intention — 'Je viens pour diagnostiquer et servir, pas pour vendre'. 3. Adaptation — lire le profil, identifier les angles, lacher le résultat."},{c:'g',b:'Citation fondatrice',t:" : 'Aide le prospect avec l'intention et l'humilite que tu aurais envers ta propre famille.'"}],ex:{l:'Synthese — Cartographie d un appel',t:"Pre-appel : énergie + intention. Ouverture 0-5 min : évaluation menace ou sécurité. Diagnostic 5-15 min : 3 questions de cartographie dans l'ordre. Gestion du cadre 15-30 min : valider -> anomalie -> nouveau schéma. Amplification 25-35 min : quantifier le cout de l'inaction. Presentation offre 35-45 min : donner les arguments pour justifier la décision. Closing 45-55 min : retour Système 1, la décision finale est toujours émotionnelle."},gold:{l:'Citation du guide',t:"'Le meilleur closing ne se sent pas. Le prospect a l'impression d'avoir décidé tout seul. Parce que c'est exactement ce qui s'est passe.'"}},
{n:'08',tc:'g',tag:'Pilier 8 — Biochimie',t:"La biochimie de la performance",i:"Les 12 variables (Pilier 06) sont toutes basées sur ton état interne. Et l'état interne, ce n'est pas du mindset abstrait — c'est de la biochimie : mesurable, prévisible, actionnable. Quatre molécules pilotent ta performance sur un appel. Le prospect ne perçoit pas directement ta confiance — il perçoit l'état de ton système nerveux.",pts:[{c:'g',b:'Cortisol — hormone du stress',t:" : niveau élève = perte de précision, silences percus comme des signaux négatifs. Tu deviens réactif plutot que directif."},{c:'g',b:'Dopamine — la présence réelle',t:" : faible taux = appels en mode automatique, voix plate, curiosite éteinte. Genère par l'anticipation d'une récompense sincere."},{c:'g',b:'Ratio Testostérone / Cortisol',t:" : détermine si une objection te déstabilise ou non. Ratio favorable = voix stable, tolérance au silence. Ratio défavorable = voix qui monte, malaise face aux objections."},{c:'g',b:'Ocytocine — la connexion',t:" : régule la confiance interpersonnelle. Écoute plus réelle, moins simulée. Activee par des interactions positives avant l'appel et l'absence de conflits non résolus."},{c:'g',b:'La respiration — ton seul levier d entrée volontaire',t:" : cohérence cardiaque : inspire 4 temps, expire 6 temps — 2 minutes suffisent avant un appel. Utilisable aussi en direct face à un prospect stressé pour l'aider à se calmer."}],ex:{l:'Les 3 profils neurochimiques — identifie le tien',t:"Cortisol dominant : performant en conditions normales, perd en précision quand l'enjeu monte. Levier : réduire les déclencheurs 30 min avant l'appel. | Dominant déficitaire : solide sur les premiers appels, baisse après plusieurs appels difficiles consécutifs. Levier : micro-victoires intentionnelles. | Suractivation sympathique : parle trop vite, n'accepte pas les silences. Levier : ancrage physique avant l'appel, réduire caféine et conflits."},gold:{l:'Principe fondamental',t:"L'état interne se prépare bien avant l'appel — parfois des la veille. La paix intérieure, c'est de la bande passante cognitive disponible pour le prospect."}},
{n:'09',tc:'g',tag:'Pilier 9 — Cerveau prédictif',t:"Le cerveau prédictif & la décision sécure",i:"Toutes les séances précédentes répondent à une seule question fondamentale : comment réduire neurologiquement la menace liée à la décision ? Le closing est l'art de rendre une décision neurologiquement sûre. Le cerveau humain (Karl Friston, 'machine bayésienne') anticipe constamment ce qui va arriver et réagit à ses propres prédictions. Quand une personne entre dans un cadre commercial, elle anticipe une tentative de manipulation — avant même le début de l'échange.",pts:[{c:'g',b:'La réactance psychologique',t:" : quand le prospect se sent contraint, son cerveau perçoit une menace sur sa liberté de décision. Il cesse de traiter l'offre pour reprendre le controle. Laisser toujours au prospect l'impression qu'il garde le controle et possède une porte de sortie."},{c:'g',b:'La charge cognitive',t:" : la mémoire de travail ne peut traiter que 4 a 7 éléments sous le stress. Trop d'informations = le prospect choisit l'option la moins coûteuse cognitivement : ne pas décider. Regle des 3 : ne présenter que 3 éléments majeurs."},{c:'g',b:'Douleur certaine vs amélioration incertaine',t:" : le cerveau préfère souvent rester dans une douleur connue plutot que choisir une amélioration incertaine. Un prospect qui ne peut pas visualiser le parcours après l'achat génère un pic de stress. Décris les premieres 48h apres le oui."},{c:'g',b:'L erreur de prédiction & le pattern interrupt',t:" : si ton discours est trop prévisible, le cerveau passe en pilotage automatique. Une rupture de pattern réactive l'attention. L'intérêt réel porté à la personne crée une rupture de schéma plus puissante que n'importe quelle technique."},{c:'g',b:'La permission inversée',t:" : 'Je veux juste que tu sois clair avec moi — si tu sens que ce n'est pas pour toi, dis-le maintenant.' Cette technique désactive la réactance, calme l'alarme neurologique et laisse le cortex préfrontal évaluer logiquement."}],ex:{l:'Zone de sécurité vs zone de menace',t:"MENACE : pression sur la liberté de choix, trop d'informations, parcours post-achat flou, discours prévisible. SÉCURITÉ : prospect en controle, 3 éléments clairs, visualisation précise du parcours client, pattern interrupt authentique, permission inversée."},gold:{l:'Principe final',t:"Le closing est l'art de rendre une décision neurologiquement sûre. Ton rôle n'est pas de convaincre — c'est d'éliminer les raisons de ne pas décider."}}
]},
3:{cat:'Psychologie',title:'Profils <span class="ag">DISC + PCM</span>',desc:"Chaque prospect est cable differemment. Si tu utilises le mauvais canal, ton message ne passe pas — même s'il est parfait. Source : Guide Closing Profils Psychologiques Complet (DISC + PCM).",
chs:[
{n:'01',tc:'g',tag:'Detection',t:"Detecter un profil en 3 minutes",i:"Le Process Communication Model (PCM), developpe par Taibi Kahler pour la NASA, identifié 6 types de personnalité bases sur les besoins psychologiques. Contrairement au DISC, le PCM identifié ce dont ton prospect a BESOIN pour se sentir en sécurité et décider. Chaque type a un canal de communication privilegie — si tu utilises le mauvais canal, ton message ne passe pas, même s'il est parfait.",pts:[{c:'g',b:'Vitesse',t:" : rapide = Dominant / Influent / Promoteur. Lent = Stable / Analytique / Imagineur."},{c:'g',b:'1er sujet',t:" : Resultats/ROI = Dominant. Reves/lifestyle = Influent. Famille/sécurité = Stable. Questions/logique = Analytique. Valeurs/ethique = Perseverant. Silence = Imagineur."},{c:'g',b:'Ton',t:" : Ferme/direct = Dominant. Chaleureux/enthousiaste = Influent. Doux/lent = Stable. Neutre/factuel = Analytique. Convaincu/moral = Perseverant. Calme/minimal = Imagineur."},{c:'g',b:'3 niveaux de stress PCM a détecter',t:" : Niveau 1 (Driver) : legere tension — recuperable avec le bon canal. Niveau 2 (Masque) : mode defensif — il ne t'entend plus. Niveau 3 (Desespoir) : rupture totale — appel perdu, ne force plus."}],ex:{l:'Regle de triangulation',t:"D -> chiffres et résultats. I -> vision et enthousiasme. S -> sécurité et douceur. C -> méthode et preuves. Un seul critere ne suffit pas — triangule vitesse + 1er sujet + ton."},gold:null},
{n:'02',tc:'g',tag:'DISC Rouge',t:"Dominant / Promoteur PCM",i:"Besoin : Challenge, action immédiate, impact direct sur les résultats. Canal : Directif — phrases courtes, sans tournures polies. Stress : Impatient -> manipulateur -> raccroche. Pose la question du prix des les 5 premieres minutes. Compare mais décide vite une fois convaincu. Max 12 min. Chiffres d'abord. Canal directif PCM.",pts:[{c:'g',b:"Ce qu'il veut entendre",t:" : ROI, rapidite, controle."},{c:'g',b:'Ce qui le ferme',t:" : trop d'émotions, trop de process, trop de temps perdu."},{c:'g',b:'Signaux de detection',t:" : ton ferme et direct, phrases courtes, coupe la parole, demande le ROI concret immédiatement."}],ex:{l:'Scripts calibres (Promoteur PCM)',t:"'Directement — mes élèves font en moyenne 1500 EUR de profit net au 3eme mois.' | 'Je vais pas te faire perdre de temps. T'es la pour un résultat précis.' | 'T'as pas besoin que je te convainque. Est-ce que c'est maintenant ou pas ?' | '3 étapes, 1 résultat. T'es in ou pas ?' | 'Voila les chiffres. Voila ce que ça te coute de ne pas agir maintenant.' | 'Les gens qui ont ton profil closent en général au 1er appel. Qu'est-ce qui te retient ?'"},gold:{l:'A ne jamais faire',t:"Sur-expliquer ou répéter. Hesiter sur le prix. Canal trop doux — il perd interet immédiatement."}},
{n:'03',tc:'g',tag:'DISC Vert',t:"Stable / Empathique PCM",i:"Besoin : Etre reconnu en tant que personne. Canal : Nourricier. 2 appels souvent necessaires.",pts:[{c:'g',b:'Canal nourricier',t:" : commence par l'humain avant le business."},{c:'g',b:'Son levier',t:" : sa famille. \"Ta famille — ils savent que tu cherches une solution ?\""},{c:'g',b:'Ne jamais brusquer',t:" : construis la confiance d'abord."}],ex:{l:'Phrase',t:"\"Je veux pas que tu dises oui parce que tu te sens oblige.\""},gold:{l:'A ne jamais faire',t:"Pression directe. Ultimatums. Canal directif."}},
{n:'04',tc:'g',tag:'DISC Bleu',t:"Analytique / Analyseur PCM",i:"Besoin : Reconnaissance de sa logique. Canal : Interrogatif. Pose beaucoup de questions precises.",pts:[{c:'g',b:"Ce qu'il demande",t:" : preuves, méthode, donnees."},{c:'g',b:'Son objection',t:" : \"J'ai besoin de plus d'informations\" = pas encore convaincu."}],ex:{l:'Script',t:"\"Voila exactement comment chaque semaine est structuree. Tu veux rentrer dans le detail ?\""},gold:{l:'A ne jamais faire',t:"Envoyer des PDFs — renforce la procrastination. Etre defensif."}},
{n:'05',tc:'g',tag:'Avance',t:"Profils terrain — Mefiant & Fuyant",i:"Mefiant : blessure passee. Valider sa méfiance comme une force. Fuyant : déjà en stress niveau 2. Ne pas forcer.",pts:[{c:'g',b:'Mefiant',t:" : \"T'as raison d'être méfiant. La majorite des formations en ligne sont des arnaques. Je suis d'accord.\""},{c:'g',b:'Fuyant',t:" : \"Reflechir a quoi exactement ? Une seule chose.\""},{c:'g',b:'Date précise',t:" : \"Je te propose jusqu'a vendredi.\""}],ex:{l:'Question miroir',t:"\"T'as peur de quoi — que ça ne marche pas, ou que ça marche et que ça change ta vie ?\""},gold:null}
]},
4:{cat:'Structure',title:"Structure de <span class='ag'>l'Appel</span>",desc:"6 phases declinables en 1 ou 2 appels. Un appel sans structure, c'est une conversation. Avec structure, c'est un closing. Source : Processus de Vente Thomas.",
chs:[
{n:'00',tc:'g',tag:"Avant l'appel",t:"Phase 0 — La préparation mentale",i:"La plupart des closers débutants preparent leur pitch. Les closers qui performent preparent leur état interne. Ce n'est pas la même chose.\n\nAvant chaque appel, tu dois répondre a une seule question : est-ce que je suis vraiment la pour aider cette personne, ou est-ce que je suis la pour ma commission ? La réponse a cette question va determiner tout ce qui suit — tà voix, tes silences, ta façon de reagir aux objections, ton détachement du résultat.\n\nTu es la pour aider ton prospect a trouver son problème — conscient ou non — et l'aider a prendre la meilleure décision pour lui. Pas pour toi. Pour lui. Meme si la meilleure décision est de ne pas travailler avec toi.",pts:[{c:'g',b:'Regle 1',t:" : tu es la pour servir le prospect dans son meilleur interet. Pas dans le tien. Pas dans celui de l'infopreneur. Dans le sien."},{c:'g',b:'Regle 2',t:" : les meilleures décisions pour lui sont généralement en dehors de sa zone de confort. C'est inconfortable d'investir, de s'engager, de changer."},{c:'g',b:'Regle 3',t:" : ton prospect va se battre corps et ame pour rester dans sa zone de confort. Ton role n'est pas de le pousser dehors — c'est de l'aider a voir pourquoi il vaut mieux en sortir."}],ex:{l:'La bonne question a te poser avant de décrocher',t:"'Si je savais avec certitude que cette personne va dire non — est-ce que je ferais quand même cet appel avec la même qualité d'écoute et de présence ?' Si oui, tu es pret. Si non, travaille l'état avant de décrocher."},gold:null},
{n:'01',tc:'g',tag:'0-5 min',t:"Phase 1 — La connexion humaine",i:"Les 90 premieres secondes definissent l'état émotionnel de tout l'appel. Ce qui se passe dans ces 90 secondes est traite par le Système 1 du prospect — automatiquement, inconsciemment. Son amygdale repondra a une seule question : est-ce que je peux faire confiance a cette personne ?\n\nTu ne pitches pas. Tu ne présentés pas. Tu ne parles pas de toi. Tu connectes. Le focus est entierement sur lui — sur pourquoi il est la, sur ce qu'il ressent, sur ce qu'il cherche.\n\nTrois outils simples a maitriser :",pts:[{c:'g',b:'Le cadrage de l appel',t:" : expliquer le deroulé en 2 phrases retire l'anxiete cognitive du prospect. 'Je vais d'abord prendre le temps de vraiment comprendre ta situation, et si je pense qu'on peut t'aider, je t'expliquerai comment. Est-ce que ça te va ?' Ca positionné la conversation comme un diagnostic, pas comme une vente."},{c:'g',b:'Le mirroring',t:" : répéter les 2-3 derniers mots du prospect avec une legere intonation montante. C'est une technique issue du FBI (Chris Voss). Elle force le prospect a continuer a parler et a approfondir. Exemple : prospect dit 'j'ai l'impression d'être bloque'. Tu repetes doucement : 'bloque ?' Il va développer."},{c:'g',b:'La question de permission',t:" : 'Si a un moment tu as des questions, tu m'arretes quand tu veux.' Petit geste, impact enorme. Ca retire la pression, ça signale que tu n'es pas la pour forcer, et ça augmente immédiatement la confiance."}],ex:{l:'Ouverture type',t:"'Avant qu'on rentre dans le vif du sujet, dis-moi — comment tu t'es retrouve la aujourd'hui ? Qu'est-ce qui t'a amene a vouloir faire quelque chose de different ?' Puis silence. Tu ecoutes vraiment."},gold:null},
{n:'02',tc:'g',tag:'5-25 min',t:"Phases 2-3 — Decouverte & Vrais problèmes",i:"C'est ici que 80% du travail se fait. Et c'est paradoxalement la phase que les débutants rushent le plus — parce qu'ils ont hate de parler de leur programme.\n\nPhase 2 : tu comprends la situation actuelle. Qu'est-ce qu'il fait ? Ou en est-il ? Qu'est-ce qu'il a déjà essaye ? Tu accumules de la data sans juger, sans interpreter, sans projeter.\n\nPhase 3 : tu identifies les vrais problèmes. La regle absolue : tu ne nommes jamais la douleur a sa place. Si tu la nommes, elle ne lui appartient plus — et elle perd de sa force. C'est lui qui doit la mettre en mots. Ton role : poser les bonnes questions et tenir l'espace.",pts:[{c:'g',b:'Situation actuelle',t:" : 'Qu'est-ce que tu fais concrètement en ce moment pour changer ta situation ?' / 'Comment tu decrirais exactement ou tu en es aujourd'hui ?' / 'Qu'est-ce que tu as déjà mis en place ?' Ecoute. Note mentalement. Ne commente pas encore."},{c:'g',b:'Impact émotionnel',t:" : 'Concretement, ça t'impacte comment au quotidien ?' / 'Comment tu te sens par rapport a ça ?' / 'Qu'est-ce que ça te coute vraiment de ne pas avoir résolu ça ?' Ces questions font passer du symptome a la vraie douleur."},{c:'g',b:'Le label émotionnel',t:" : quand tu sens une émotion forte derriere les mots : 'On dirait que c'est quelque chose qui pese depuis un moment...' Silence. Tu n'affirmes pas — tu proposes une interpretation douce. S'il validé, tu as accede a la vraie douleur."}],ex:{l:'La transition vers la phase 3',t:"'Quand tu m'as dit [ses propres mots] — et que tu ressens [son émotion nommee par lui]... il semble qu'on ait peut-être mis le doigt sur ce que tu cherches vraiment a changer. Est-ce que je me trompe ?' Il confirme. Tu as son engagement."},gold:null},
{n:'03',tc:'g',tag:'25-40 min',t:"Phases 4-5 — Vision & Cout de l'inaction",i:"Phase 4 : tu aides le prospect a visualiser concrètement le futur qu'il veut. Pas en termes abstraits — en termes sensoriels, concrets, vivants. L'effet de dotation (Kahneman) : ce qu'on possede mentalement a déjà de la valeur. En faisant projeter le prospect, tu créés un attachement au futur qu'il perdrait en ne decidant pas.\n\nPhase 5 : tu retournes a la douleur. Tu fais verbaliser lui-même ce qui se passe s'il ne change rien. Jamais de façon agressive. Jamais comme un argument de vente. Tu poses la question, et tu te tais. C'est lui qui dit les mots. Ces mots, prononces par lui, ont 10 fois plus de poids que si c'est toi qui les avais dit.",pts:[{c:'g',b:'Ancrage émotionnel fort',t:" : 'C'est quoi la premiere personne que tu appelles le jour ou tu atteins cet objectif ? Qu'est-ce que tu lui dis ? Comment tu te sens a ce moment-la ?' Laisse-le construire cette image mentalement."},{c:'g',b:"Cout de l'inaction",t:" : 'Si on se projette dans un an et que rien n'a change — tu vois quoi ? Ca ressemble a quoi ton quotidien ?' Silence absolu après. Meme 20-30 secondes. Ne remplis jamais ce silence."},{c:'g',b:'La regle du silence',t:" : qui parle en premier après une question difficile perd la position haute. Ton silence montre que tu es à l'aise avec l'inconfort. Ca, en soi, crée de la confiance."}],ex:{l:'Formulation exacte du cout d inaction',t:"'T'as déjà explore ce que ça donnerait si dans 12 mois, t'es exactement au même endroit qu'aujourd'hui ?' Pause. 'Qu'est-ce qui se passe pour toi a ce moment-la ?' Pause. Il repond. Il se vend lui-même."},gold:null},
{n:'04',tc:'g',tag:'40-55 min',t:"Phase 6 — La prescription",i:"Tu as diagnostique. Tu as compris. Tu as validé. Maintenant, et seulement maintenant, tu prescris.\n\nL'attitude est celle d'un médecin qui sort son ordonnance après un examen complet — pas d'un vendeur qui attendait de pitcher depuis le début. Cette difference se ressent immédiatement.\n\nLe pitch doit être court. 5 a 7 minutes maximum. Pas un monologue — un dialogue. Tu présentés un élément, tu verifes que ça resonne. Tu passes au suivant. Structure : Prix (annonce tot pour éviter le choc en fin) → Les piliers (en lien direct avec ce qu'il t'a dit vouloir) → Le comment (la livraison concrete) → L'engagement (ce que toi tu t'engages a faire ET ce que tu attends de lui).",pts:[{c:'g',b:'Prise de temperature avant de pitcher',t:" : 'Est-ce que tu penses que ce qu'on vient de voir ensemble peut t'emmener a [ses objectifs dans ses mots] ?' Il dit oui. Cet oui est le premier engagement. Tu pitches uniquement après cet oui."},{c:'g',b:'La fermeture',t:" : 'Est-ce que tu es pret a aller la ?' Puis silence absolu. Pas 5 secondes. Aussi longtemps que nécessaire. C'est le silence le plus important de l'appel. Celui qui parle en premier perd."},{c:'g',b:"Signal d'achat — le reconnaître",t:" : quand le prospect commence a parler au present ('avec ça je pourrais...', 'donc concrètement je ferais...') — la décision est déjà prise mentalement. C'est le moment de fermer. Doucement, directement."}],ex:null,gold:{l:'Les 5 regles du closer',t:"1. Detachement total — tu diagnostiques, tu ne supplies pas. 2. Silence = or — après chaque question importante, tu attends. 3. Ses mots, pas les tiens — utilisé exactement ce qu'il t'a dit. 4. Valider le vehicule avant de répondre aux objections — toujours. 5. Jamais couper la poire en deux — le prix, c'est le prix."}},
{n:'05',tc:'g',tag:'Post-appel',t:"Gérer un non proprement — l'art de la sortie",i:"Un non bien gere vaut mieux qu'un oui force. Un oui force, c'est un prospect qui va demander un remboursement, qui va être un mauvais élève, et qui va dire du mal de toi. Un non propre, c'est une relation preservee, une porte ouverte, et parfois un oui dans 3 mois.\n\nIl y a deux types de non très differents : 'non maintenant' et 'non jamais'. Ton premier travail est de les distinguer. Parce que la conversation qui suit n'est pas la même.",pts:[{c:'g',b:'Qualifier le non',t:" : 'Je respecte complètement. Est-ce que c'est un non definitif, ou c'est plutot une question de timing ?' Cette question seule t'evite de perdre des prospects qui auraient dit oui dans 6 semaines."},{c:'g',b:'La sortie propre',t:" : remercier sincèrement pour le temps et l'ouverture. Ne pas insister. Ne pas relancer immédiatement. Ne pas sur-expliquer pourquoi il a tort. Laisser une porte ouverte sans la forcer : 'Si dans quelques semaines quelque chose évolue dans ta situation, tu peux revenir vers moi sans aucune gene.'"},{c:'g',b:'Le suivi 48h après',t:" : un message court, humain, pas commercial. 'J'espere que notre echange t'a apporte quelque chose, même si on ne travaille pas ensemble pour le moment. Si tu as des questions, je suis la.' Ce message seul t'a déjà recupere des prospects 3 semaines plus tard."}],ex:{l:'Script de sortie propre',t:"'Je respecte ta décision complètement. On a eu une belle conversation — j'espere qu'elle t'a apporte de la clarte, même si c'est pas le bon moment. La porte reste ouverte de mon cote, sans aucune pression.'"},gold:null}
]},
5:{cat:'Decouverte',title:"Phase de <span class='ag'>Decouverte</span>",desc:"La découverte, c'est 80% du travail. Si tu la rates, tout le reste s'effondre. Source : Decouverte Closing v4 — L'art des questions ouvertes + Processus de Vente Thomas.",
chs:[
{n:'01',tc:'g',tag:'Principe fondateur',t:"Pourquoi la découverte empeche les objections",i:"Voila quelque chose que la plupart des closers débutants ne comprennent pas : les objections en fin d'appel ne sont presque jamais des problèmes de prix ou de timing. Ce sont des symptomes d'une découverte incomplete.\n\nQuand le prospect dit 'j'ai besoin d'y réfléchir' a la fin — ça veut dire que tu n'as pas suffisamment creuse sa douleur. Quand il dit 'c'est trop cher' — ça veut dire que tu n'as pas suffisamment ancre la valeur par rapport a ce qu'il t'a dit vouloir. Quand il dit 'j'en parle a ma femme' — ça veut dire que tu n'as pas identifié les vrais decideurs assez tot.\n\nUne découverte complete resout les objections avant qu'elles apparaissent. C'est pour ça que c'est 80% du travail.",pts:[{c:'g',b:'Les 3 couches de la douleur',t:" : surface (ce qu'il dit : 'je veux gagner plus d'argent') -> cause (pourquoi : 'parce que je n'arrive pas a me degager de mon emploi') -> racine (ce que çà lui coute vraiment : 'je n'ai pas le temps pour ma famille et ça me ronge'). La vraie douleur est toujours a la 3e couche. Si tu t'arretes a la premiere, tu traités le symptome."},{c:'g',b:'La regle des 5 pourquoi',t:" : chaque réponse du prospect mérite une relance. 'J'ai pas le temps.' -> 'Pas le temps pour quoi ?' -> 'Pour me former.' -> 'Qu'est-ce qui prend tout ton temps ?' -> 'Mon travail.' -> 'Et si ton travail prenait moins de place, qu'est-ce qui changerait pour toi ?' La vraie info est toujours au 4e ou 5e niveau."},{c:'g',b:'Ne jamais nommer la douleur a sa place',t:" : si tu dis 'donc ce que tu veux vraiment, c'est la liberté financiere' — tu viens de lui voler sa douleur. Ca ne lui appartient plus. Elle perd de sa force. C'est lui qui doit mettre les mots dessus. Ton role : poser la question qui l'y amene."}],ex:{l:'Exemple de creusage sur 5 niveaux',t:"'J'ai pas le temps.' -> 'Pas le temps pour quoi exactement ?' -> 'Pour me former et changer de situation.' -> 'Qu'est-ce qui prend tout ton temps en ce moment ?' -> 'Mon boulot, je fais 50h par semaine.' -> 'Et si tu faisais toujours 50h dans 2 ans — ça ressemble a quoi ta vie ?' Silence. Il repond. La on touche la vraie douleur."},gold:{l:'Reformulation cle a ancrer',t:"'Qu'est-ce que tu pourrais gagner ?' -> 'Qu'est-ce que tu perds a rester la ou tu es ?' L'aversion a la perte est neurologiquement 2x plus puissante que la promesse de gain."}},
{n:'02',tc:'g',tag:'Questiologie — 5 categories',t:"Les questions de creusage",i:"Ce document ne donne pas un script. Il t'aide a comprendre comment poser des questions ouvertes pour faire parler, creuser et comprendre en profondeur. Une bonne découverte repose sur des questions ouvertes, de l'écoute et du creusage. Ce n'est pas la quantite de questions qui compte, mais la profondeur des réponses que tu obtiens.",pts:[{c:'g',b:'1. Comprendre la situation actuelle',t:" : 'Qu'est-ce qui t'a amene a prendre cet appel aujourd'hui ?' / 'Comment tu decrirais ta situation actuelle ?' / 'A quoi ressemble ton quotidien en ce moment ?' / 'Qu'est-ce qui te fait dire que c'est le bon moment pour changer ?'"},{c:'g',b:'2. Identifier les blocages',t:" : 'Qu'est-ce qui te bloque aujourd'hui selon toi ?' / 'Pourquoi tu penses que ça n'a pas encore fonctionne ?' / 'A quel moment tu ressens le plus de difficulté ?' / 'Qu'est-ce qui te fait te dire que ça ne fonctionne pas ?'"},{c:'g',b:'3. Explorer les actions passees',t:" : 'Qu'est-ce que tu as déjà mis en place pour changer ça ?' / 'Comment tu t'y es pris jusqu'a aujourd'hui ?' / 'Pourquoi tu penses que ça n'a pas donne les résultats attendus ?' / 'Qu'est-ce qui, selon toi, a manque dans ce que tu as fait ?'"},{c:'g',b:'4. Responsabiliser',t:" : 'Avec du recul, qu'est-ce que tu aurais pu faire differemment ?' / 'Selon toi, qu'est-ce qui dependait de toi dans cette situation ?' / 'Qu'est-ce que tu es pret a faire differemment aujourd'hui ?'"},{c:'g',b:'5. Aller chercher l émotion et le vrai pourquoi',t:" : 'Pourquoi c'est important pour toi aujourd'hui ?' / 'Comment tu te sens par rapport a ça aujourd'hui ?' / 'Qu'est-ce que ça representerait pour toi de réussir ?' / 'Qu'est-ce qui te fait vraiment vouloir changer maintenant ?'"}],ex:{l:'Sequence type',t:"Ouverte -> écoute -> miroir -> écoute -> ouverte plus précise -> écoute -> validation fermee. Mirroring constant. Reprendre ses mots. Silence après chaque question importante."},gold:null},
{n:'03',tc:'g',tag:'Psychologie',t:"Identifier la vraie douleur",i:"La vraie douleur n'est jamais financiere. Elle est toujours identitaire ou relationnelle. L'argent est le symptome — jamais la cause.",pts:[{c:'g',b:'Douleurs identitaires',t:" : \"Je veux pas être quelqu'un qui rate ses opportunités.\""},{c:'g',b:'Douleurs relationnelles',t:" : liberté pour être present, prouver quelque chose a quelqu'un."},{c:'g',b:'Amorces',t:" : \"Comment tu te sens par rapport a ça ?\" / \"En quoi ça t'a affecte concrètement ?\""}],ex:{l:'Question cle',t:"\"Qu'est-ce que tu ne vivrais plus si dans 12 mois, rien n'a change ?\" -> Silence. Active l'amygdale sur la perte."},gold:null},
{n:'04',tc:'g',tag:'Technique',t:"La projection future",i:"Apres la découverte, avant la présentation. L'effet de dotation (Kahneman) : ce qu'on possede mentalement a plus de valeur.",pts:[{c:'g',b:'La question de vision',t:" : \"Decris-moi a quoi ressemble ton quotidien si on resout ça ensemble.\""},{c:'g',b:"L'ancrage temporel",t:" : \"Dans 6 mois, quand tu regardes en arriere sur cette décision...\""},{c:'g',b:'La premiere personne',t:" : \"C'est quoi la premiere personne que tu appelles le jour ou t'atteins [objectif] ?\""}],ex:{l:'Projection type',t:"\"A quoi ressemble ton mardi matin dans 6 mois ? Qu'est-ce que tu fais, avec qui, depuis ou ?\""},gold:null},
{n:'05',tc:'g',tag:'Transition',t:"Valider la découverte",i:"Le résumé-validation : pont entre découverte et présentation. Reformule avec ses mots — pas les tiens.",pts:[{c:'g',b:'Ses mots',t:" : ses expressions exactes. S'il a dit \"prisonnier de mon job\" — tu redis ça."},{c:'g',b:'La validation',t:" : \"Est-ce que j'ai bien compris ?\" -> il dit oui -> tu as son engagement."}],ex:{l:'Resume-validation',t:"\"Tu veux [X], tu te sens bloque par [Y], et ce que tu ne veux plus c'est [Z]. Est-ce que je me trompe ?\""},gold:null},
{n:'06',tc:'t',tag:'Momentum - Fin de découverte',t:"Le Momentum — Pourquoi maintenant ?",i:"Le momentum, c'est l'urgence authentique crée par la clarte sur le cout de l'attente. S'intégré en fin de découverte, après avoir creuse la vraie douleur. L'objectif : que le prospect verbalise lui-même pourquoi aujourd'hui est le bon moment.",pts:[{c:'t',b:'Ce que ça fait',t:" : le prospect qui verbalise son propre momentum devient l'auteur de la décision. Il ne peut plus se defausser sur le timing."},{c:'t',b:"Lien avec le cout d'inaction",t:" : le momentum va plus loin. Il ne dit pas 'tu perds' — il dit 'quel signal t'a amene a agir ?'"},{c:'t',b:'Regle',t:" : ne jamais créer le momentum artificiellement. Il doit venir de lui."}],ex:{l:'Analogie — Le marcheur au carrefour',t:"Quelqu'un marche depuis des mois vers un carrefour. Aujourd'hui il est devant. Il peut continuer tout droit — même chemin, même résultat. Il peut prendre a gauche — inconnu, mais different. La question n'est pas 'est-ce risque de tourner ?' — c'est 'est-ce que tu es pret a admettre que tout droit ne mene nulle part ?'"},tbox:{l:'Questions Momentum',pts:["Qu'est-ce qui fait qu'aujourd'hui tu prends cet appel, et pas il y a 6 mois ?","Si tu n'avais pas pris cet appel aujourd'hui, qu'est-ce qui se passait a la place ?","Qu'est-ce qui ferait que dans 6 mois tu regrettes de ne pas avoir avance maintenant ?","Quand tu imagines dans 3 mois — tu preferes être en train d'apprendre, ou encore en train de chercher ?","C'est quoi le signal qui t'a dit que c'était le moment de faire quelque chose de different ?"]},gold:null},
{n:'07',tc:'r',tag:'Objection preventive - Fin de découverte',t:"\"Je vais me lancer seul d'abord\"",i:"L'une des objections les plus courantes — et les plus dangereuses si elle n'est pas traitee en amont. Sur Internet, il y a de la valeur. Le but : que le prospect verbalise lui-même pourquoi le gratuit ne suffit pas pour lui.",pts:[{c:'r',b:'Ne jamais critiquer YouTube',t:" : \"T'as raison, il y a de la valeur la-dedans. Est-ce que ça t'a suffi jusqu'ici ?\""},{c:'r',b:'Faire verbaliser le manque',t:" : \"Qu'est-ce qui t'a empeche jusqu'ici de trouver ce que tu cherches seul ?\""},{c:'r',b:'La vraie question',t:" : est-ce qu'il cherche de l'information — ou une transformation ? Ce sont deux choses differentes."}],ex:{l:'Analogie — Le bricoleur et l\'architecte',t:"Tu peux regarder des videos YouTube pour renover ta maison. Des tutoriels, des plans gratuits. Mais il y a un moment ou ce que tu construis ne tient pas — parce qu'il te manque la logique d'ensemble. Pas les briques. La structure. C'est la que tu appelles un architecte."},tbox:{l:'Questions Solo / Autodidacte',pts:["Est-ce que jusqu'ici le fait de chercher seul t'a amene la ou tu veux aller ?","Qu'est-ce qui t'a manque dans ce que tu as trouve seul ?","Si tu pouvais trouver tout ça gratuitement sur YouTube, pourquoi tu n'aurais pas déjà commence ?","Qu'est-ce que tu cherches vraiment — de l'information, ou du résultat ?","C'est quoi la difference entre quelqu'un qui a regarde 100 videos sur le closing et quelqu'un qui close ?"]},gold:{l:'Differentiation finale',t:"\"L'information existe partout. Ce que tu cherches, c'est savoir exactement quoi faire, dans quel ordre, avec quelqu'un qui te dit stop quand tu te trompes.\""}}
]},
6:{cat:'Avance',title:"Fausses croyances & <span class='ag'>Objections</span>",desc:"Les objections ne sont pas des ennemies. Elles sont des signaux. La méthode : Accueillir -> Creuser -> Recadrer. Dans cet ordre, toujours.",
chs:[
{n:'01',tc:'g',tag:'Fondations',t:"Ce qu'est vraiment une objection",i:"La majorite des closers débutants traitent les objections comme des obstacles a surmonter. Les closers qui performent les traitent comme des donnees a comprendre.\n\nUne objection n'est presque jamais ce qu'elle dit être. 'C'est trop cher' ne veut pas dire que le prospect n'a pas d'argent — ça veut dire qu'il ne voit pas encore la valeur. 'J'ai besoin d'y réfléchir' ne veut pas dire qu'il a besoin de temps — ça veut dire qu'il lui manque quelque chose pour décider.\n\nLa seule vraie objection, c'est l'argent — quand le prospect n'a genuinement pas les moyens. Toutes les autres sont des symptomes d'une découverte incomplete. Si tu as bien creuse, si tu as vraiment compris la douleur et fait verbaliser le cout de l'inaction — les objections n'arrivent presque plus.",pts:[{c:'g',b:'Ecran de fumee vs objection reelle',t:" : une objection de surface cache presque toujours quelque chose d'autre. Avant de répondre, creuse : 'Quand tu dis [objection], tu veux dire quoi exactement pour toi ?' La vraie objection emerge toujours au 2e ou 3e niveau."},{c:'g',b:'Signal d interet',t:" : un prospect qui objecte est encore dans la conversation. Il cherche une raison de dire oui. Ton job : l'aider a trouver cette raison. Un prospect qui n'est pas interesse raccroche — il n'objecte pas."},{c:'g',b:'La pause avant de répondre',t:" : répondre immédiatement a une objection, c'est le pattern du closer sous pression. Ca dit : 'J'avais prevu ta question et j'ai une réponse prete.' 2 à 3 secondes de silence d'abord. Ca dit : 'J'entends ce que tu dis, je prends ça au serieux.'"}],ex:{l:'Diagnostic avant de traiter',t:"Avant de répondre a n'importe quelle objection, pose toujours cette question : 'En dehors de ça, est-ce qu'il y a autre chose qui te ferait hesiter ?' Tu traités toutes les objections en une fois — pas une par une."},gold:null},
{n:'02',tc:'g',tag:'Croyance 1',t:"\"C'est une arnaque\" — l'armure contre la deception",i:"Cette objection est l'une des plus delicates — parce qu'elle n'est presque jamais rationnelle. Elle vient d'une blessure émotionnelle, souvent pas la sienne. Cette personne a vu quelqu'un se faire avoir, ou elle a construit une identité autour de 'moi je me fais pas manipuler'.\n\nLa regle absolue : ne jamais defendre. Des que tu te defendes, tu confirmes qu'il y a quelque chose a defendre. Le prospect lit ça immédiatement et se ferme davantage.\n\nA la place, entres dans son cadre. Valide sa méfiance. Puis deplaces-le.",pts:[{c:'g',b:'Etape 1 — Valider la méfiance',t:" : 'Tu as raison d'être prudent. La majorite des formations en ligne sont du vent. C'est une bonne posture.' Ca desarme. Il ne s'attendait pas a ça."},{c:'g',b:'Etape 2 — Entrer dans sa définition',t:" : 'Quand tu dis arnaque, c'est quoi pour toi concrètement ? Qu'est-ce qui ferait qu'une formation est legitime a tes yeux ?' Il te donne ses criteres. Tu peux maintenant y répondre avec ses propres mots."},{c:'g',b:'Etape 3 — Creuser la liberté',t:" : 'Tu m'as parle de liberté financiere tout a l'heure. C'est quoi exactement ta définition de ça ?' Cette question le ramene a ce qu'il veut vraiment — et crée une tension entre sa méfiance et son désir."}],ex:{l:'Analogie de l enfant et du velo',t:"'Un enfant qui a vu son ami tomber du velo peut refuser d'apprendre a faire du velo pendant des annees. Ce n'est pas sa chute qu'il porte — c'est la mémoire d'une chute. Est-ce que c'est possible que tu portes la méfiance de quelqu'un d'autre ?'"},gold:{l:'Script de traitement complet',t:"'Qu'est-ce qui aujourd'hui, concrètement, pourrait t'aider a voir que ce qu'on fait n'est pas du reve qu'on vend ? Je te pose la question sincèrement.' Puis silence. Il va te donner exactement ce dont il a besoin pour se convaincre."}},
{n:'03',tc:'g',tag:'Croyances 2&3',t:"\"C'est risque\" & \"J'ai pas eu les opportunités\"",i:"Ces deux objections ont un point commun : elles semblent rationnelles, mais elles sont emotionnelles.\n\n'C'est risque' peut être deux choses complètement differentes. Soit un risque financier reel — et dans ce cas tu le respectes et tu ne forces pas. Soit une peur émotionnelle deguisee en calcul — la peur de s'engager, la peur de l'echec, la peur de se faire juger. Avant de répondre, tu dois savoir lequel des deux tu as en face de toi.\n\n'J'ai pas eu les opportunités' est une façon de proteger son ego. Si c'est la faute des circonstances, je reste intact. Cette croyance empeche toute responsabilisation — et donc toute progression.",pts:[{c:'g',b:'Qualifier le risque d abord',t:" : 'Quand tu parles de risque — c'est financier ou c'est plus la peur de t'engager et de ne pas voir les résultats ?' Cette question seule change toute la suite de la conversation."},{c:'g',b:'L analogie avion',t:" : 'Quelqu'un peut refuser de prendre l'avion a cause du risque — mais conduire sur l'autoroute chaque matin sans y penser. Statistiquement, l'autoroute est bien plus dangereuse. Le risque n'est pas calcule — il est ressenti. Est-ce que c'est possible que ça soit pareil ici ?'"},{c:'g',b:'Miroir sur les opportunités',t:" : 'Si demain matin quelqu'un te deposait l'opportunité parfaite — financee, sans risque, garantie — qu'est-ce qui se passerait en toi ?' S'il trouve encore une raison de ne pas y aller, l'objection n'est pas les opportunités."}],ex:null,gold:{l:'Recadrage sur le vrai risque',t:"'Le vrai risque, des fois, c'est pas d'investir. C'est de rester exactement la ou tu es dans 12 mois et de se demander pourquoi on n'a rien change. Quel est le cout de ne rien faire ?'"}},
{n:'04',tc:'g',tag:'Croyance 4',t:"\"Tu me garantis que je vais réussir ?\"",i:"Cette question est un transfert de responsabilite. C'est humain — completemet humain. Cette personne veut que quelqu'un d'autre porte le risque de son choix. Elle a peur que si ça ne marche pas, ce soit sa faute. Alors elle cherche quelqu'un a qui remettre cette responsabilite.\n\nTon job n'est pas de lui donner cette garantie — parce que tu ne peux pas l'honorer honnement. Et si tu la donnes, tu créés une dynamique toxique des le depart : elle va tout attendre de toi et ne rien faire elle-même.\n\nTon job est de nommer ce transfert avec bienveillance — et de le renvoyer vers elle.",pts:[{c:'g',b:'Reponse honnete et directe',t:" : 'Non. Et je vais être transparent : personne ne peut te garantir ça. Moi-même je ne peux pas me garantir que je serai la demain matin. Si quelqu'un te dit qu'il peut te garantir le succès — fuis.'"},{c:'g',b:'Ce que tu garantis',t:" : 'Ce que je peux te garantir, c'est ma présence, ma méthode, mon engagement total a cote de toi. Je serai la à chaque étape. Mais le résultat — il depend de toi autant que de moi. C'est un partenariat, pas une delegation.'"},{c:'g',b:'L analogie du professeur de natation',t:" : 'Le meilleur professeur de natation peut t'apprendre tous les mouvements, corriger chaque geste, être present à chaque session. Mais la piscine ne nage pas a ta place.'"}],ex:null,gold:{l:'Question de responsabilisation',t:"'La vraie question, c'est pas est-ce que je te garantis. C'est : est-ce que toi, tu t'engages vraiment ? Parce que si l'engagement est total de ton cote, les chances de reussite sont incomparablement plus elevees.' Silence. Il doit répondre."}},
{n:'05',tc:'g',tag:'Methode universelle',t:"Le cadre des 3 temps — applicable a toutes les objections",i:"Peu importe l'objection, le cadre est toujours le même. Toujours dans cet ordre. Ne jamais sauter une étape.\n\n1. ACCUEILLIR — 2. CREUSER — 3. RECADRER\n\nL'erreur la plus commune : sauter directement au recadrage. Ca ne fonctionne pas parce que le prospect n'a pas ete entendu. Et quelqu'un qui ne se sent pas entendu ne peut pas entendre.",pts:[{c:'g',b:'1. Accueillir — valider l émotion',t:" : jamais 'je comprends' seul — ça sonne automatique. Plutot : 'C'est une question que je trouve vraiment legitime.' / 'Je suis content que tu souleves ça, parce que c'est important.' Jamais valider la croyance — valider l'émotion."},{c:'g',b:'2. Creuser — remonter a la source',t:" : une seule question, ouverte, qui va plus loin. 'Quand tu dis [objection] — qu'est-ce qui te fait penser ça concrètement ?' / 'C'est quoi derriere ça ?' / 'Ca vient d'ou cette impression ?' La vraie objection est toujours en dessous."},{c:'g',b:'3. Recadrer — élargir la perspective',t:" : jamais 'tu as tort'. Toujours 'et si on regardait ça sous un angle different ?' Le recadrage ne contredit pas — il propose une autre façon de voir. Le prospect doit avoir l'impression que la nouvelle perspective lui appartient."}],ex:null,gold:{l:'L intention derriere la méthode',t:"Si tu travailles avec une vraie intention de servir, le challenge devient un cadeau — pas une pression. Le prospect le ressent. Et c'est cette intention qui fait toute la difference entre un closer qui ferme et un closer qui aide."}}
]},
7:{cat:'Performance',title:"Ferocite & <span class='ag'>Flow</span>",desc:"L'excellence a toujours un cout. Ce module construit l'état de performance optimal comme une habitude. Sources : Le Flow (module 4) + La Tenacite + La Passion + La Journee Feroce + L'Habitude de Ferocite.",
chs:[
{n:'01',tc:'g',tag:'Neurosciences',t:"Le Flow — Etat de performance optimal",i:"McKinsey : 5x plus productif dans le Flow. Definition technique : un état de conscience optimal dans lequel tu te sens au mieux de ta forme et performes au mieux de tes capacites. Ces moments d'attention totalement soutenue et d'absorption complete. L'action et la conscience commencent a fusionner. Le sens de soi-même s'evanouit. Le temps se dilate ou s'accelere. Hypofrontalite transitoire : dans le Flow, tu utilises MOINS de cerveau. 5 neurochimiques liberes simultanement : noradrenaline, dopamine, serotonine, anandamide, endorphines.",pts:[{c:'g',b:'Ondes cerebrales',t:" : Beta (état normal) -> Alpha -> frontiere Alpha-Theta -> Gamma (moment aha). Dans le Flow, tu es en permanence au bord du maximum de créativité."},{c:'g',b:'Declencheur universel',t:" : le Flow suit la concentration. Il ne peut se produire que lorsque toute ton attention est ici et maintenant — pas sur la commission."},{c:'g',b:'Le Flow n est pas force',t:" : c'est un état que l'on invite, en creant les bonnes conditions. Tout ce qu'on developpe dans ce programme augmente mecaniquement la quantite de Flow dans ta vie."}],ex:{l:'Lien direct avec le closing',t:"Quand tu es vraiment present face a quelqu'un — quand tu l'ecoutes sans préparer ta réponse — cette qualité de présence se ressent et crée une qualité de connexion que la technique seule ne peut pas produire. La science du Flow remonte aux annees 1870. McKinsey : dans le Flow, la productivite augmente de 500%."},gold:null},
{n:'02',tc:'g',tag:'Motivation',t:"La passion — Commencer par la curiosite",i:"La passion ne commence pas avec la certitude — elle commence avec la curiosite. Curiosite et peur utilisent la même molecule (noradrenaline) dans des directions opposees.",pts:[{c:'g',b:'Grit (Duckworth)',t:" : grit = passion x persévérance. La passion se regenere quand la volonte s'epuise."},{c:'g',b:'La liste des 25',t:" : 25 choses qui te rendent profondement curieux. Sois spécifique."}],ex:null,gold:null},
{n:'03',tc:'g',tag:'Tenacite',t:"La volonte & la persévérance",i:"La volonte est une ressource limitée. Tu te reveilles avec ta reserve maximale et elle s'erode. Mange le crapaud en premier.",pts:[{c:'g',b:'Mange le crapaud',t:" : ta tache la plus difficile avec ton énergie maximale."},{c:'g',b:'Resets partiels',t:" : sieste (max 40 min), exercice, meditation."},{c:'g',b:'Les 4%',t:" : pousser legerement au-dela de sa zone de confort."}],ex:{l:'William James',t:"\"L'être humain vit habituellement bien en dessous de ses limites. C'est une habitude d'inferiorite par rapport a son moi complet.\""},gold:null},
{n:'04',tc:'g',tag:'Mindset',t:"Controle des pensees",i:"L'amygdale est biaisee vers le négatif : 6 a 9 informations négatives pour chaque positive. Mais ça se recalibre.",pts:[{c:'g',b:'Gratitude',t:" : 3 choses le soir. Developpe l'une. Effets après 2-3 semaines."},{c:'g',b:'Meditation',t:" : 4 jours pour les premiers benefices. 2 semaines pour élargir le gap pensee-émotion."},{c:'g',b:'Tenir parole a soi-même',t:" : la parole donnee a soi-même a le même poids que la parole donnee a quelqu'un d'autre."}],ex:null,gold:null},
{n:'05',tc:'g',tag:'Operationnel',t:"La journee feroce",i:"Ce que tu fais toujours vs ce que tu ne fais jamais. Ta vie est définie autant par tes non que par tes oui.",pts:[{c:'g',b:'Toujours',t:" : routines precises alignees avec ton purpose, sans exception."},{c:'g',b:'Jamais',t:" : frontieres claires qui protegent ton énergie."},{c:'g',b:'La regle absolue',t:" : tu n'ecris dans ta liste que ce que tu vas vraiment faire."}],ex:null,gold:null}
]},
8:{cat:'Croissance',title:"Performer & <span class='ag'>Grandir</span>",desc:"Concret et operationnel. Passer de la pratique a la professionnalisation.",
chs:[
{n:'01',tc:'g',tag:'Operationnel',t:"Trouver tes premiers clients",i:"La regle des 100 appels : tes 100 premiers, tu les rates. C'est normal, prevu, nécessaire.",pts:[{c:'g',b:'Canaux',t:" : LinkedIn, groupes d'infopreneurs, bouche a oreille."},{c:'g',b:'Message',t:" : \"Je suis closer spécialisé en [niche]. Vous cherchez quelqu'un ?\""},{c:'g',b:'Positionner ton profil',t:" : le marche doit te trouver, pas l'inverse."}],ex:{l:'Premier pas',t:"Contacte 5 infopreneurs aujourd'hui. Pas demain."},gold:null},
{n:'02',tc:'g',tag:'Operationnel',t:"Construire ton CRM",i:"Un closer sans CRM, c'est un chef sans recette.",pts:[{c:'g',b:'Colonnes',t:" : Nom / Source / Statut / Date / Profil DISC / Commission."},{c:'g',b:'Scoring psycho',t:" : note chaque prospect sur son profil DISC, ses objections, son urgence."},{c:'g',b:'Debrief',t:" : 10 minutes après chaque call."}],ex:null,gold:null},
{n:'03',tc:'g',tag:'Performance',t:"Analyser tes appels",i:"Les meilleurs closers reecoulent leurs appels. Pas pour se juger — pour se calibrer. Ratio : 30% toi / 70% prospect.",pts:[{c:'g',b:'Les 6 questions',t:" : état interne ? schéma détecte ? quand ai-je contredit ? quelle anomalie ? variable faible ? petite flamme ?"},{c:'g',b:'Outils',t:" : Fathom, Fireflies.ai ou Otter.ai pour analyser le ratio."}],ex:null,gold:null},
{n:'04',tc:'g',tag:'Leadership',t:"Passer au niveau superieur",i:"Le meilleur closing ne se sent pas. Le prospect a l'impression d'avoir décidé tout seul.",pts:[{c:'g',b:'Specialisation',t:" : le marche doit te trouver."},{c:'g',b:'Personal branding',t:" : LinkedIn, contenu, preuves sociales."},{c:'g',b:'Le mentoring',t:" : enseigner force a maitriser."}],ex:{l:'Question finale',t:"\"Dans 12 mois, tu veux voir que tu as vraiment commence — ou que tu t'es encore prepare ?\""},gold:null}
]}
};
var ANC=[
{n:'00',tc:'p',tag:'Fondations',t:"Comprendre l'ancrage",i:"L'ancrage crée une tension entre ce que le prospect a dit être et ce qu'il est tente de faire. C'est lui qui resout cette tension — en ta faveur.",pts:[{c:'p',b:'Engagement (Cialdini)',t:" : une fois qu'une personne se definit à voix haute, le cerveau protege cette image."},{c:'p',b:'Dissociation sociale',t:" : le cerveau definit 'qui je suis' autant par opposition que par similitude."},{c:'p',b:'Synchronie neuronale',t:" : quand tu exposes ta vulnérabilité, la méfiance baisse."}],ex:{l:'Règle absolue',t:"Un ancrage mal incarne fait l'effet inverse. Il doit sonner naturel — jamais calcule."},gold:{l:'Important',t:"Un ancrage ne se cite jamais explicitement en closing. Il se reactive implicitement : 'Est-ce que la, c'est aligne pour toi ?'"},scripts:null},
{n:'01',tc:'p',tag:'Format 1 - Connexion',t:"Ancre directe — le signal identitaire",i:"Tu poses une question qui force le prospect a se définir lui-même. Peu importe la réponse — tu gagnes soit une ancre reutilisable, soit une information diagnostique precieuse.",pts:[{c:'p',b:'Timing optimal',t:" : connexion ou début de diagnostic."},{c:'p',b:'Profil adapte',t:" : fonctionne bien avec les profils D et I."},{c:'p',b:'Lien découverte',t:" : la réponse oriente immédiatement la suite."}],ex:null,gold:null,scripts:'s1'},
{n:'02',tc:'t',tag:'Format 2 - Diagnostic',t:"Ancre par contraste — la dissociation sociale",i:"Tu decris un groupe négatif sans parler de lui. Il se dissocie activement. Si ensuite il hesite, c'est lui qui doit gérer l'incoherence.",pts:[{c:'p',b:'Timing optimal',t:" : fin de diagnostic ou transition vers la présentation."},{c:'p',b:'Mecanisme',t:" : le prospect ne peut plus objecter de la même façon."},{c:'p',b:'Variante découverte',t:" : 'La plupart des gens dans cette situation ont essaye 2-3 choses seuls... 6 mois plus tard au même endroit. T'as l'impression d'être dans ce pattern ?'"}],ex:null,gold:null,scripts:'s2'},

{cl:'s2',lb:"Script — Le pattern seul sans méthode",tx:"La plupart des gens que je vois dans cette situation ont déjà essaye 2-3 choses seuls. Et 6 mois plus tard, ils sont exactement au même endroit. T'as l'impression d'être dans ce pattern ?",no:"Si oui -> il verbalise son propre blocage. Si non -> il te donne exactement ce qui le differencie."}
